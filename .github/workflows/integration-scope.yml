# integration-scope — L2: the targeted, label-gated integration gate.
#
# SECURITY MODEL (read before editing):
#   * plain pull_request, NOT pull_request_target. Fork PRs get no secrets; the
#     run-matrix job additionally guards on head.repo == benchflow-ai/benchflow.
#   * detect-scope holds NO secrets (contents: read) and is a cheap green no-op
#     when no rollout is needed, so this whole workflow can be UNCONDITIONALLY
#     REQUIRED in branch protection even though it normally only does real work
#     when the 'integration:medium' label is present.
#   * plan + review-pack load the planner/grader/harness from TRUSTED ORIGIN/MAIN
#     via sparse checkout; only src/benchflow (code-under-test) comes from PR head.
#   * RESIDUAL (per Q6 — accepted): run-matrix carries ALL keys (provider incl.
#     DEEPSEEK + DAYTONA + reviewer) in the pypi-internal-preview environment.
#     The PR-head orchestrator runs `bench` on the host; the verdict is computed
#     only by the trusted-main grader in the separate review-pack job.
name: integration-scope

on:
  workflow_dispatch:
    inputs:
      scope:
        description: Scope override (auto|low-3|medium-3|high-3|nine|expanded|custom).
        type: string
        default: auto
      custom_tasks:
        description: Comma-separated task ids for scope=custom.
        type: string
        default: ""
  pull_request:
    types: [labeled, opened, synchronize, reopened]

# Cancel superseded L2 runs on the same PR head SHA.
concurrency:
  group: integration-scope-${{ github.event.pull_request.head.sha || github.event.inputs.scope || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ----------------------------------------------------------------------------
  # detect-scope — NO secrets. Green no-op unless real work is needed AND (on the
  # pull_request path) the 'integration:medium' label is present. Keeps the
  # required check cheap and unconditionally green when there is nothing to run.
  # ----------------------------------------------------------------------------
  detect-scope:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_run: ${{ steps.scope.outputs.should_run }}
      base_ref: ${{ steps.refs.outputs.base_ref }}
      head_sha: ${{ steps.refs.outputs.head_sha }}
    steps:
      - name: Resolve refs + label gate
        id: refs
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref || github.ref_name }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          EVENT_NAME: ${{ github.event_name }}
          HAS_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'integration:medium') }}
        run: |
          set -euo pipefail
          echo "base_ref=$BASE_REF" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          # workflow_dispatch always proceeds to planning; the pull_request path
          # only does real work when the medium label is present.
          if [ "$EVENT_NAME" = "workflow_dispatch" ] || [ "$HAS_LABEL" = "true" ]; then
            echo "gate_open=true" >> "$GITHUB_OUTPUT"
          else
            echo "gate_open=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        if: steps.refs.outputs.gate_open == 'true'
        with:
          ref: ${{ steps.refs.outputs.base_ref }}
          fetch-depth: 0
          sparse-checkout: |
            .github
            tests/integration
          sparse-checkout-cone-mode: false

      - name: Fetch PR head SHA for the diff
        if: steps.refs.outputs.gate_open == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ steps.refs.outputs.head_sha }}
        run: git fetch --no-tags origin "$HEAD_SHA" || true

      - name: Set up Python
        if: steps.refs.outputs.gate_open == 'true'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"

      - name: Decide whether real work is needed
        id: scope
        env:
          GATE_OPEN: ${{ steps.refs.outputs.gate_open }}
          BASE_REF: ${{ steps.refs.outputs.base_ref }}
          HEAD_SHA: ${{ steps.refs.outputs.head_sha }}
          SCOPE_INPUT: ${{ github.event.inputs.scope || 'auto' }}
          CUSTOM_TASKS: ${{ github.event.inputs.custom_tasks || '' }}
        run: |
          set -euo pipefail
          if [ "$GATE_OPEN" != "true" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::integration:medium label absent — L2 passes as a green no-op"
            exit 0
          fi
          if [ ! -f .github/scripts/integration_matrix.py ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::trusted base does not contain integration_matrix.py yet; bootstrap PR passes L2 as a green no-op"
            exit 0
          fi
          ARGS=( --base-ref "$BASE_REF" --head-sha "$HEAD_SHA" --diff-from-git
                 --scope "$SCOPE_INPUT" --out matrix.json )
          if [ -n "$CUSTOM_TASKS" ]; then
            ARGS+=( --custom-tasks "$CUSTOM_TASKS" )
          fi
          set +e
          python .github/scripts/integration_matrix.py "${ARGS[@]}"
          rc=$?
          set -e
          if [ "$rc" -eq 2 ]; then
            REASON=$(jq -r '.rejected_overflow // "scope overflow"' matrix.json 2>/dev/null || echo "scope overflow")
            echo "::error::integration scope overflow: $REASON"
            exit 1
          elif [ "$rc" -ne 0 ]; then
            echo "::error::scope planner failed (exit $rc)"
            exit "$rc"
          fi
          NCELLS=$(jq '.matrix | length' matrix.json)
          SCOPE=$(jq -r '.scope // "none"' matrix.json)
          if [ "$SCOPE" = "none" ] || [ "$NCELLS" -eq 0 ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::no rollout needed (scope=$SCOPE) — L2 green no-op"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  # ----------------------------------------------------------------------------
  # plan — TRUSTED main planner. contents: read, NO secrets. Re-runs the planner
  # to produce the authoritative matrix.json (3-6 targeted cells). Fails on the
  # planner's exit-2 hard-ceiling overflow.
  # ----------------------------------------------------------------------------
  plan:
    needs: detect-scope
    if: needs.detect-scope.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    # Run under the same env that run-matrix uses so the credential filter
    # below can see the real provider secrets (DEEPSEEK/GEMINI/OPENAI/Bedrock).
    environment: pypi-internal-preview
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.emit.outputs.matrix }}
      head_sha: ${{ steps.plan.outputs.head_sha }}
      has_cells: ${{ steps.emit.outputs.has_cells }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          ref: ${{ needs.detect-scope.outputs.base_ref }}
          fetch-depth: 0
          # pyproject.toml + README.md + src so `uv pip install .` below can build
          # benchflow (hatchling) for the credential filter; uv.lock so the
          # setup-uv cache key resolves. The planner itself is pure stdlib and
          # needs only .github.
          sparse-checkout: |
            .github
            tests/integration
            pyproject.toml
            uv.lock
            README.md
            src
          sparse-checkout-cone-mode: false

      - name: Fetch PR head SHA for the diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ needs.detect-scope.outputs.head_sha }}
        run: git fetch --no-tags origin "$HEAD_SHA"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3.2.4
        with:
          enable-cache: true

      - name: Plan integration scope (trusted)
        id: plan
        env:
          BASE_REF: ${{ needs.detect-scope.outputs.base_ref }}
          HEAD_SHA: ${{ needs.detect-scope.outputs.head_sha }}
          SCOPE_INPUT: ${{ github.event.inputs.scope || 'auto' }}
          CUSTOM_TASKS: ${{ github.event.inputs.custom_tasks || '' }}
        run: |
          set -euo pipefail
          ARGS=( --base-ref "$BASE_REF" --head-sha "$HEAD_SHA" --diff-from-git
                 --scope "$SCOPE_INPUT" --out matrix.json )
          if [ -n "$CUSTOM_TASKS" ]; then
            ARGS+=( --custom-tasks "$CUSTOM_TASKS" )
          fi
          set +e
          python .github/scripts/integration_matrix.py "${ARGS[@]}"
          rc=$?
          set -e
          if [ "$rc" -eq 2 ]; then
            REASON=$(jq -r '.rejected_overflow // "scope overflow"' matrix.json 2>/dev/null || echo "scope overflow")
            echo "::error::integration scope overflow: $REASON"
            exit 1
          elif [ "$rc" -ne 0 ]; then
            echo "::error::scope planner failed (exit $rc)"
            exit "$rc"
          fi
          # head_sha output now (matrix is emitted AFTER the credential filter).
          echo "head_sha=$(jq -r '.head_sha' matrix.json)" >> "$GITHUB_OUTPUT"
          echo "Planned scope=$(jq -r '.scope' matrix.json) cells=$(jq '.matrix | length' matrix.json)"

      # Install benchflow so the credential filter can import
      # benchflow.agents.env. The planner above is pure (MiniYaml-safe) and
      # needs nothing; only this env-aware step needs the package.
      - name: Install benchflow (for the credential filter)
        # uv pip install into the setup-python interpreter (--system). The filter
        # is fail-open by design, so a failed install must NOT block the plan —
        # warn and let the filter pass the matrix through unfiltered.
        run: uv pip install --system --quiet . || echo "::warning::benchflow install failed; credential filter will fail-open (matrix unfiltered)"

      # Drop any planned cell whose agent+model credential is absent from this
      # environment BEFORE run-matrix consumes the matrix, so un-keyed agents
      # never spin up a (doomed, sandbox-burning) cell that would log as a
      # false-red slot. Fails OPEN: if benchflow import fails the matrix passes
      # through unchanged. Credentials come from the pypi-internal-preview env.
      - name: Filter uncredentialed cells (env-aware)
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AWS_BEARER_TOKEN_BEDROCK: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}
          AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
        run: |
          set -euo pipefail
          python .github/scripts/filter_credentialed_cells.py \
            --matrix matrix.json --out matrix.json
          SKIPPED=$(jq -c '.skipped_uncredentialed // []' matrix.json)
          if [ "$SKIPPED" != "[]" ]; then
            echo "::notice::credential filter skipped uncredentialed cells: $SKIPPED"
          fi

      - name: Emit filtered matrix output
        id: emit
        run: |
          set -euo pipefail
          N=$(jq '.matrix | length' matrix.json)
          echo "matrix=$(jq -c '.matrix' matrix.json)" >> "$GITHUB_OUTPUT"
          echo "Run matrix cells=$N (after credential filter)"
          # Empty matrix after credential filtering (NO provider key for ANY
          # planned cell) must SKIP run-matrix/review-pack as a green no-op — NOT
          # hard-fail fromJson([]) ("matrix must define at least one combination")
          # into a false 'not mergeable' verdict on a PR with no real regression.
          if [ "$N" -eq 0 ]; then
            echo "has_cells=false" >> "$GITHUB_OUTPUT"
            echo "::warning::all planned cells filtered out (no provider credentials available) — passing as a green no-op; nothing ran"
          else
            echo "has_cells=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload matrix plan
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        with:
          name: integration-scope-matrix
          path: matrix.json
          if-no-files-found: error
          retention-days: 14

  # ----------------------------------------------------------------------------
  # run-matrix — runs every planned cell via tests/integration scenarios.run_eval
  # (trusted-main harness; PR-head src/benchflow). environment pypi-internal-
  # preview carries ALL keys (provider incl. DEEPSEEK + DAYTONA + reviewer) per
  # Q6 — the documented residual. Aggregate sandbox concurrency comes from the
  # plan caps. One matrix leg per cell.
  # ----------------------------------------------------------------------------
  run-matrix:
    needs: [detect-scope, plan]
    if: >-
      needs.detect-scope.outputs.should_run == 'true' &&
      needs.plan.outputs.has_cells == 'true' &&
      github.repository == 'benchflow-ai/benchflow' &&
      (github.event_name == 'workflow_dispatch' ||
       github.event.pull_request.head.repo.full_name == 'benchflow-ai/benchflow')
    runs-on: ubuntu-latest
    environment: pypi-internal-preview
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        cell: ${{ fromJson(needs.plan.outputs.matrix) }}
    timeout-minutes: ${{ matrix.cell.timeout_minutes }}
    env:
      # ALL keys present here per Q6 (provider + DAYTONA + reviewer). Residual is
      # accepted because the verdict is computed only by trusted-main grader.
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
      GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
      GLM_BASE_URL: ${{ secrets.GLM_BASE_URL }}
      QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
      QWEN_BASE_URL: ${{ secrets.QWEN_BASE_URL }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY || secrets.BF_TOKEN }}
      LITELLM_BASE_URL: ${{ secrets.LITELLM_BASE_URL || 'http://llm-proxy.eval.all-hands.dev/v1' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GITHUB_MODELS_TOKEN: ${{ secrets.GITHUB_MODELS_TOKEN || github.token }}
      DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_KEY }}
      CELL_JSON: ${{ toJson(matrix.cell) }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          ref: ${{ needs.detect-scope.outputs.base_ref }}
          fetch-depth: 0

      - name: Overlay PR-head src/benchflow (code-under-test)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ needs.plan.outputs.head_sha }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin "$HEAD_SHA"
          git checkout "$HEAD_SHA" -- src/benchflow

      - name: Select integration provider
        run: python .github/scripts/select_integration_provider.py

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3.2.4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev --extra judge --extra sandbox-daytona --locked

      - name: Run the cell (trusted-main scenarios.run_eval)
        env:
          # The provider-select step wrote OPENAI_*=DeepSeek into the job env for
          # the DeepSeek agent-judge. The gated-native codex-acp rollout (gpt,
          # OpenAI Responses) KEEPS ambient OPENAI_* (it does not recompute them
          # in resolve_agent_env), so it would otherwise auth its rollout against
          # DeepSeek and fail. Restore the REAL OpenAI creds for codex-acp cells
          # ONLY — every DeepSeek cell keeps the job env unchanged (no-op), and the
          # later agent-judge step keeps the DeepSeek OPENAI_* from $GITHUB_ENV.
          OPENAI_API_KEY: ${{ matrix.cell.agent == 'codex-acp' && secrets.OPENAI_API_KEY || env.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ matrix.cell.agent == 'codex-acp' && 'https://api.openai.com/v1' || env.OPENAI_BASE_URL }}
        run: |
          uv run python - <<'PY'
          import json
          import os
          import pathlib
          import sys

          sys.path.insert(0, "tests/integration")
          import scenarios  # trusted-base harness

          cell = json.loads(os.environ["CELL_JSON"])
          cid = cell["id"]
          jobs_dir = pathlib.Path("jobs/integration-scope") / cid
          jobs_dir.mkdir(parents=True, exist_ok=True)

          extra = [
              "--skill-mode", cell.get("skill_mode", "no-skill"),
              "--usage-tracking", "required",
              "--agent-idle-timeout", str(cell.get("agent_idle_timeout", 240)),
          ]
          outcome = scenarios.run_eval(
              jobs_dir=jobs_dir,
              agent=cell["agent"],
              sandbox=cell.get("sandbox", "docker"),
              model=cell.get("model") or None,
              include=(cell["task"],),
              concurrency=1,
              extra_args=tuple(extra),
              source_repo="benchflow-ai/skillsbench",
              source_path="tasks",
              source_ref="main",
          )
          print(f"cell={cid} rc={outcome.returncode} jobs_dir={jobs_dir}")
          # A non-zero bench exit is recorded; the trusted grader (review-pack
          # job) is the authority, so we do not fail the leg here.
          PY

      - name: Upload cell jobs
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        with:
          name: integration-scope-jobs-${{ strategy.job-index }}
          path: jobs/integration-scope
          if-no-files-found: ignore
          retention-days: 14

  # ----------------------------------------------------------------------------
  # review-pack — TRUSTED grader. always() so it grades whatever rolled out.
  # Builds review-pack via build_integration_review_pack.py (the FAIL-CLOSED
  # gate), runs codex_review.py as an ADVISORY stricter-only signal
  # (continue-on-error: codex is NOT required at L2), upserts the sticky PR
  # comment, and fails (red check) when the deterministic pack is not mergeable.
  # ----------------------------------------------------------------------------
  review-pack:
    needs: [detect-scope, plan, run-matrix]
    if: always() && needs.detect-scope.outputs.should_run == 'true' && needs.plan.outputs.has_cells == 'true'
    runs-on: ubuntu-latest
    environment: pypi-internal-preview
    permissions:
      contents: read
      pull-requests: write
    env:
      # Judge key for the LLM-judge gates inside the review pack. No rollout
      # fan-out keys here.
      LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY || secrets.BF_TOKEN }}
      LITELLM_BASE_URL: ${{ secrets.LITELLM_BASE_URL || 'http://llm-proxy.eval.all-hands.dev/v1' }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GITHUB_MODELS_TOKEN: ${{ secrets.GITHUB_MODELS_TOKEN || github.token }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          ref: ${{ needs.detect-scope.outputs.base_ref }}
          fetch-depth: 0

      - name: Download matrix plan
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: integration-scope-matrix
          path: .

      - name: Download all cell jobs
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        continue-on-error: true
        with:
          pattern: integration-scope-jobs-*
          merge-multiple: true
          path: jobs/integration-scope

      - name: Select judge provider
        run: python .github/scripts/select_integration_provider.py

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3.2.4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev --extra judge --locked

      - name: Build the integration review pack (the gate)
        id: pack
        run: |
          set -euo pipefail
          set +e
          uv run python .github/scripts/build_integration_review_pack.py \
            --matrix matrix.json \
            --artifacts jobs/integration-scope \
            --out review-pack
          rc=$?
          set -e
          echo "pack_exit=$rc" >> "$GITHUB_OUTPUT"
          if [ "$rc" -eq 0 ]; then
            echo "conclusion=success" >> "$GITHUB_OUTPUT"
          else
            echo "conclusion=failure" >> "$GITHUB_OUTPUT"
          fi
          if [ ! -f review-pack/verdict.md ]; then
            mkdir -p review-pack
            printf '## Integration review\n\nThe review pack failed before writing a verdict (exit %s).\n' "$rc" > review-pack/verdict.md
          fi

      # ADVISORY-ONLY at L2: codex can make the verdict stricter but is NOT
      # required (no fail-closed). A missing reviewer key just yields no codex
      # signal here.
      # The host codex CLI (`codex exec`) the advisory reviewer drives.
      - name: Install codex CLI
        continue-on-error: true
        run: npm install -g @openai/codex@0.141.0

      - name: Codex equivalence review (advisory)
        id: codex
        continue-on-error: true
        env:
          # Pass 1 judge uses the DeepSeek OPENAI_* (provider-select wrote it to
          # $GITHUB_ENV). The host `codex exec` (Pass 2) gets the REAL OpenAI key
          # via CODEX_API_KEY — codex_review.py isolates the CLI env (real key +
          # default OpenAI base) so the judge clobber never leaks into codex auth.
          CODEX_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Run the codex composer on DeepSeek-v4-pro (codex_review.py routes a
          # deepseek model through a chat-completions provider; DeepSeek can't
          # serve the OpenAI Responses API + tool_search that small models reject).
          CODEX_MODEL: deepseek-v4-pro
        run: |
          set +e
          uv run python .github/scripts/codex_review.py \
            --review-pack review-pack \
            --artifacts jobs/integration-scope \
            --deterministic-verdict "$(cat review-pack/verdict.md | grep -ioE 'mergeable with quarantines|not mergeable|mergeable' | head -1 || echo '')" \
            --findings-out review-pack/codex_findings.json \
            --codex-out review-pack/codex_output.txt
          echo "codex rc=$?"

      - name: Upsert review-pack PR comment
        if: always() && github.event.pull_request.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          MARKER: "<!-- integration-review-pack -->"
        run: |
          set -euo pipefail
          BODY_FILE="$RUNNER_TEMP/review-comment.md"
          {
            printf '%s\n\n' "$MARKER"
            cat review-pack/verdict.md
          } > "$BODY_FILE"
          EXISTING_ID=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" --paginate \
            --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" | head -1 || echo "")
          if [ -n "$EXISTING_ID" ]; then
            gh api -X PATCH "repos/${REPO}/issues/comments/${EXISTING_ID}" \
              -F body=@"$BODY_FILE" >/dev/null
            echo "Updated review-pack comment $EXISTING_ID"
          else
            gh api -X POST "repos/${REPO}/issues/${PR_NUMBER}/comments" \
              -F body=@"$BODY_FILE" >/dev/null
            echo "Posted new review-pack comment"
          fi

      - name: Upload review pack
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        with:
          name: integration-scope-review-pack
          path: review-pack
          if-no-files-found: ignore
          retention-days: 14

      - name: Enforce the deterministic review-pack verdict (gate)
        if: always()
        env:
          PACK_EXIT: ${{ steps.pack.outputs.pack_exit }}
        run: |
          if [ "${PACK_EXIT}" != "0" ]; then
            echo "::error::integration review verdict not mergeable (review_pack exit ${PACK_EXIT})"
            exit 1
          fi
          echo "integration review verdict: mergeable"
