name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege defaults — elevate per-job only when a step needs more.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3.2.4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev --extra sandbox-daytona --extra sandbox-modal --locked

      - name: Lint
        run: uv run ruff check src tests

      - name: Format check
        run: uv run ruff format --check src tests

      - name: Type check
        run: uv run ty check

      - name: Test
        run: uv run python -m pytest tests/

      - name: Audit locked dependencies for known advisories
        # Runs against the same locked deps the test job just installed.
        # `--no-deps` because pip-audit shouldn't re-resolve; the lockfile is the source of truth.
        run: |
          uv export --locked --extra dev --extra sandbox-daytona --extra sandbox-modal --format requirements-txt --no-hashes --output-file /tmp/req-audit
          uv run --with pip-audit pip-audit -r /tmp/req-audit --no-deps --disable-pip
