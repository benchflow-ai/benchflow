# Full agent parity (Haiku 4.5) — benchflow side.
#
# Same 172-task set as the oracle parity (parity-full-oracle-benchflow.yaml)
# but with claude-agent-acp + Haiku 4.5 via Claude OAuth. Pair with
# parity-full-haiku-harbor.yaml for the head-to-head agent-parity
# measurement.

tasks_dir: /tmp/parity-full-tasks
jobs_dir: ../jobs/parity-full-haiku-benchflow
agent: claude-agent-acp
model: claude-haiku-4-5-20251001
environment: daytona
concurrency: 16
max_retries: 1
