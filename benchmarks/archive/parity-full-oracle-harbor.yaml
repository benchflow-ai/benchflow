# Full oracle parity (Harbor side).
#
# Same 172 tasks as parity-full-oracle-benchflow.yaml — head-to-head.
# Harbor-format JobConfig. Harbor's built-in `oracle` agent runs
# solution/solve.sh and lets Harbor's own Verifier score the result.

jobs_dir: /workspace/repos/benchflow/jobs/parity-full-oracle-harbor
n_concurrent_trials: 16
n_attempts: 1

environment:
  type: daytona

agents:
  - name: oracle

datasets:
  - path: /tmp/parity-full-tasks
