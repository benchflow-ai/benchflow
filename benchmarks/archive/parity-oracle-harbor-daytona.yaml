# Oracle parity: Harbor side (Daytona).
# Docker-backed Harbor fails in DinD because Harbor's DockerEnvironment
# doesn't translate host paths for the host Docker daemon. Moving both
# parity runs to Daytona produces a clean apples-to-apples comparison.

jobs_dir: /workspace/repos/benchflow/jobs/parity-oracle-harbor-daytona
n_concurrent_trials: 4
n_attempts: 1

environment:
  type: daytona

agents:
  - name: oracle

datasets:
  - path: /tmp/parity-oracle-tasks
