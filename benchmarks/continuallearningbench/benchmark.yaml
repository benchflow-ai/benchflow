name: continuallearningbench
description: >
  ContinualLearningBench — sequential task evaluation measuring agent
  adaptation and improvement across instances
url: https://github.com/pgasawa/continual-learning-bench
paper: null
repo: https://github.com/pgasawa/continual-learning-bench
author: "Parth Asawa, Chris Glaze, Gabe Orlanski et al."
converted_by: BenchFlow

tasks:
  count: 3
  categories:
    - exploitable_poker
    - database_exploration
    - cohort_studies
  tags: [continual-learning, sequential, adaptation, online-learning]

conversion:
  script: benchflow.py
  source_format: "Python task classes with ContinualLearningTask interface"
  default_task_format: task-md
  task_formats: [legacy, task-md]
  has_oracle_solutions: false
  oracle_notes: >
    ContinualLearningBench has no static file-level oracle. Native task.md
    output records oracle evidence in oracle/README.md and uses the original
    sequential environment plus reward function as dynamic ground truth.

verification:
  method: script
  reward: proportional
  aggregation: per-task

environment:
  base_image: "python:3.13-slim"
  platform: linux/amd64
  allow_internet: true
  cpus: 2
  memory_mb: 4096
  storage_mb: 10240

parity:
  structural:
    tasks_tested: 3
    passed: 3
  eval_pipeline:
    tasks_tested: 3
    passed: 3
  native_task_md:
    tasks_tested: 3
    passed: 3
