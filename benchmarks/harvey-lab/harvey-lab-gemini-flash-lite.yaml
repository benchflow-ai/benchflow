# Harvey LAB benchmark — Gemini agent on all tasks.
#
# Harvey LAB tasks require conversion before running (task.json → task.toml).
# Use run_harvey_lab.py which handles download + conversion, or convert manually
# with benchflow.py and pass -t <converted-dir>.
agent: gemini
model: gemini/gemini-3.1-flash-lite-preview
environment: docker
concurrency: 4
