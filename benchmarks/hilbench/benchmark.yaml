# benchmark.yaml — standard benchmark descriptor for BenchFlow.
#
# Every benchmark in benchmarks/<name>/ ships this file. It declares what
# the benchmark is, where it comes from, how tasks are verified, and
# parity validation results.

name: hilbench
description: "HILBench — 100 SWE baseline tasks across 4 repositories (ansible, protonmail/webclients, navidrome, flipt-io/flipt)"
url: https://github.com/scale-ai/hil-bench
paper: https://arxiv.org/abs/2604.09408
dataset: https://huggingface.co/datasets/ScaleAI/hil-bench
author: Scale AI
converted_by: BenchFlow

# Tasks
tasks:
  count: 100
  task_types: [swe]
  modes: [baseline]  # full_info and ask_human not yet supported
  repositories:
    - ansible/ansible (40 tasks)
    - protonmail/webclients (29 tasks)
    - navidrome/navidrome (16 tasks)
    - flipt-io/flipt (15 tasks)

# Conversion
conversion:
  script: benchflow.py  # CLI: --output-dir, --limit, --overwrite, --task-ids, --task-format
  source_format: HuggingFace dataset (ScaleAI/hil-bench)
  default_task_format: task-md
  task_formats: [legacy, task-md]
  has_oracle_solutions: true
  oracle_notes: >
    The dataset includes ground_truth_answer gold patches. The converter keeps
    legacy and native outputs format-specific: solution/solve.sh applies
    solution/solve.patch in legacy packages, while oracle/solve.sh applies
    oracle/solve.patch in native task.md packages.
  docker_image_pinned: false  # uses repo-specific docker image tarballs from HuggingFace

# Verification
verification:
  method: deterministic_unit_tests
  reward: partial_credit      # passed_tests / total_tests
  aggregation: per-test       # each test scored individually
  test_source: "HuggingFace dataset (ScaleAI/hil-bench) — test_patch field"

# Environment
environment:
  base_images: "ubuntu:22.04 (repo loaded from HF image tarballs)"
  platform: linux/amd64
  cpus: 2
  memory_mb: 4096
  storage_mb: 20480

# Parity
parity:
  structural:
    description: "All generated task directories have required files and valid metadata"
    tasks_tested: 100
    passed: 100
    checks:
      - required files present for legacy or task.md layouts
      - task.toml/task.md has valid structure and hilbench/ prefix
      - test_patch.diff and tests_to_pass.json are verifier-local
      - native task.md output includes verifier/verifier.md and oracle/solve.sh
