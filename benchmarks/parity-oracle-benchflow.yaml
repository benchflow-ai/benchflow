# Oracle parity: benchflow side.
# Runs 10 skillsbench tasks with the oracle agent (no LLM calls — runs
# solution/solve.sh directly) through benchflow's vendored Task/Verifier.
# Pair with parity-oracle-harbor.yaml for the head-to-head.

tasks_dir: /tmp/parity-oracle-tasks
jobs_dir: ../jobs/parity-oracle-benchflow
agent: oracle
environment: docker
concurrency: 4
max_retries: 0
