<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BenchFlow v0.5 — Dashboard</title>
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="12" fill="%232b6cb0"/><path d="M18 18h28v8H28v8h16v8H28v12H18z" fill="%23fbfbfa"/></svg>' />
<style>
  :root {
    --bg: #fbfbfa; --panel: #ffffff; --ink: #1c1c1a; --muted: #6b6b66;
    --line: #e3e3df; --accent: #2b6cb0; --good: #2f855a; --bad: #c53030;
    --warn: #b7791f; --chip: #f0f0ee; --side: #f5f5f3;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; background: var(--bg); color: var(--ink); display: flex;
    font: 14px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  code, .mono { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }

  /* ---- sidebar ---- */
  aside {
    width: 236px; flex: none; background: var(--side);
    border-right: 1px solid var(--line); height: 100vh; position: sticky; top: 0;
    overflow-y: auto; padding: 18px 12px;
  }
  .brand { font-size: 16px; font-weight: 700; padding: 0 8px; letter-spacing: -.2px; }
  .brand span { color: var(--muted); font-weight: 500; }
  .gen { color: var(--muted); font-size: 11px; padding: 4px 8px 14px; line-height: 1.5; }
  nav a {
    display: block; padding: 7px 10px; border-radius: 6px; cursor: pointer;
    color: var(--muted); font-size: 13px; text-decoration: none; user-select: none;
  }
  nav a:hover { background: #ecece9; color: var(--ink); }
  nav a.active { background: var(--accent); color: #fff; font-weight: 600; }
  nav a.sub {
    padding: 5px 10px 5px 22px; font-size: 12px;
  }
  nav a.sub:hover { background: #ecece9; }
  nav a.sub.active { background: #dce8f5; color: var(--accent); }
  nav .grouphd {
    font-size: 10px; text-transform: uppercase; letter-spacing: .6px;
    color: #9b9b95; padding: 14px 10px 4px;
  }
  nav .count { float: right; opacity: .7; font-variant-numeric: tabular-nums; }

  /* ---- main ---- */
  main { flex: 1; min-width: 0; overflow-x: hidden; padding: 26px 30px 70px; }
  h1.page { margin: 0 0 2px; font-size: 19px; letter-spacing: -.2px; }
  .sub-ttl { color: var(--muted); margin-bottom: 18px; font-size: 13px; }
  .sub-ttl code { white-space: normal; overflow-wrap: anywhere; word-break: break-word; }
  h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .5px;
       color: var(--muted); margin: 26px 0 10px; }
  h2:first-of-type { margin-top: 6px; }

  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .card { background: var(--panel); border: 1px solid var(--line);
          border-radius: 8px; padding: 14px 16px; overflow-x: auto; }
  .stat { flex: 1; min-width: 150px; }
  .stat .big { font-size: 25px; font-weight: 700; letter-spacing: -.5px; }
  .stat .lbl { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .4px; }
  .repo-line {
    margin: -6px 0 16px; color: var(--muted); font-size: 12px;
    display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
  }
  .sync-banner {
    margin: 0 0 14px; padding: 8px 10px; border: 1px solid #f0dab0;
    border-radius: 6px; background: #fdf8ee; color: var(--warn);
    display: flex; gap: 8px; flex-wrap: wrap; align-items: baseline;
    font-size: 12px;
  }
  .sync-banner b { color: var(--ink); font-weight: 600; }
  .text-link {
    color: var(--accent); text-decoration: none;
    border-bottom: 1px solid #bfd7f3;
  }
  .text-link:hover { border-bottom-color: var(--accent); }
  .text-link:focus-visible {
    outline: 2px solid #bfd7f3; outline-offset: 2px; border-radius: 2px;
  }
  .muted { color: var(--muted); }
  .good { color: var(--good); } .bad { color: var(--bad); }
  .warn { color: var(--warn); } .accent { color: var(--accent); }
  .chip { display: inline-block; background: var(--chip); border-radius: 4px;
          padding: 1px 7px; font-size: 11px; margin: 1px 3px 1px 0; color: var(--muted); }
  .chip.p { background: #e6effb; color: var(--accent); }
  .chip.lnk { cursor: pointer; }
  .chip.lnk:hover { background: #d8e6f6; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; }
  .dot.shipped, .dot.resolved { background: var(--good); }
  .dot.partial, .dot.open { background: var(--warn); }
  .dot.backlog { background: #c9c9c4; }
  .dot.active { background: var(--accent); }
  .dot.muted { background: var(--muted); }
  .num-mono { font-variant-numeric: tabular-nums; }

  /* concept map */
  .flow { text-align: center; }
  .flow .box { display: inline-block; background: var(--panel); border: 1px solid var(--line);
               border-radius: 8px; padding: 10px 16px; }
  .flow .arrow { color: var(--muted); font-size: 18px; margin: 4px 0; }
  .kernel { border-color: var(--accent) !important; background: #f3f8fd !important; }
  .planes { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: 12px; }
  .plane { text-align: left; }
  .plane .nm { font-weight: 700; }
  .plane .rl { color: var(--accent); font-size: 12px; }
  .plane .dt { color: var(--muted); font-size: 12px; margin-top: 4px; }
  .plane .han { color: var(--muted); font-size: 11px; margin-top: 6px; font-style: italic; }
  .exec { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; }
  .exec .kd { font-size: 10px; letter-spacing: .5px; padding: 1px 6px; border-radius: 3px;
              background: var(--chip); color: var(--muted); margin-left: 6px; }
  .exec .kd.PRIMITIVE { background: #e6effb; color: var(--accent); }
  .exec .kd.DERIVED { background: #eaf6ee; color: var(--good); }
  .caps { display: grid; grid-template-columns: repeat(auto-fit, minmax(330px, 1fr)); gap: 12px; }
  .cap .hd { display: flex; align-items: baseline; gap: 8px; }
  .cap .num { background: var(--ink); color: #fff; border-radius: 50%; width: 22px; height: 22px;
              display: inline-flex; align-items: center; justify-content: center;
              font-size: 12px; font-weight: 700; flex: none; }
  .cap .fit { color: var(--muted); font-size: 12.5px; margin-top: 6px; }
  .legend { color: var(--muted); font-size: 12px; margin-top: 8px; }

  /* tables */
  table { border-collapse: collapse; width: 100%; font-size: 13px; }
  th, td { text-align: left; padding: 7px 10px; border-bottom: 1px solid var(--line); }
  th { color: var(--muted); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .4px; }
  tr:hover td { background: #faf9f7; }
  .barwrap { background: var(--line); border-radius: 4px; height: 8px; overflow: hidden; width: 100%; }
  .bar { height: 100%; background: var(--good); }
  details { margin: 2px 0; }
  summary { cursor: pointer; }
  summary::-webkit-details-marker { color: var(--muted); }
  .ticket-board {
    display: grid; grid-template-columns: minmax(300px, 430px) minmax(0, 1fr);
    gap: 14px; height: calc(100dvh - 206px);
  }
  .ticket-list-pane,
  .ticket-detail-pane {
    border: 1px solid var(--line); border-radius: 8px; background: var(--panel);
    min-height: 0; overflow: hidden;
  }
  .ticket-list-pane { display: flex; flex-direction: column; }
  .ticket-list-scroll { overflow: auto; min-height: 0; padding: 10px; }
  .ticket-group { margin-bottom: 12px; }
  .ticket-group-hd {
    display: flex; gap: 8px; align-items: baseline; flex-wrap: wrap;
    color: var(--muted); font-size: 11px; padding: 4px 2px 6px;
    text-transform: uppercase; letter-spacing: .4px;
  }
  .ticket-row {
    width: 100%; border: 1px solid transparent; border-radius: 6px;
    background: transparent; color: var(--ink); text-align: left; cursor: pointer;
    padding: 9px 10px; margin: 0 0 5px; display: grid;
    grid-template-columns: 8px minmax(0, 1fr); gap: 8px; align-items: start;
    font: inherit;
  }
  .ticket-row > span { min-width: 0; }
  .ticket-row:hover { background: #faf9f7; border-color: var(--line); }
  .ticket-row.active { background: #edf5ff; border-color: #bfd7f3; }
  .ticket-row .dot { margin: .45em 0 0; }
  .ticket-row-head {
    display: flex; gap: 8px; align-items: baseline; min-width: 0;
  }
  .ticket-row .tid { white-space: nowrap; color: var(--accent); font-weight: 700; flex: none; }
  .ticket-row .ttitle { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
  .ticket-row .tmeta { color: var(--muted); font-size: 11.5px; margin-top: 2px; }
  .ticket-detail-pane { overflow: auto; padding: 18px 20px; }
  .ticket-detail-top { display: flex; gap: 10px; align-items: baseline; flex-wrap: wrap; }
  .ticket-detail-title {
    font-size: 19px; font-weight: 700; line-height: 1.25; margin: 8px 0 12px;
    overflow-wrap: anywhere;
  }
  .progress-meter { display: grid; gap: 5px; min-width: 160px; }
  .progress-label {
    display: flex; justify-content: space-between; gap: 12px;
    color: var(--muted); font-size: 11px; font-variant-numeric: tabular-nums;
  }
  .progress-label b { color: var(--ink); font-weight: 600; }
  .progress-track {
    height: 8px; border-radius: 999px; overflow: hidden;
    background: color-mix(in srgb, var(--line) 80%, var(--side));
  }
  .progress-fill {
    height: 100%; width: var(--progress, 0%);
    background: var(--accent); border-radius: inherit;
  }
  .ticket-progress { padding: 0 2px 8px; }
  .ticket-detail-progress { margin: 0 0 14px; }
  .ticket-kv {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 8px 14px; margin: 14px 0;
  }
  .ticket-kv div, .ticket-parent, .ticket-linear, .ticket-section {
    border-top: 1px solid var(--line); padding-top: 8px;
    color: var(--muted); font-size: 12px;
  }
  .ticket-kv b, .ticket-parent b, .ticket-linear b, .ticket-section b {
    color: var(--ink); font-weight: 600;
  }
  .ticket-kv div, .ticket-parent, .ticket-linear, .ticket-section { overflow-wrap: anywhere; }
  .ticket-description {
    white-space: pre-wrap; color: var(--ink); font-size: 13px;
    margin-top: 6px; overflow-wrap: anywhere;
  }
  .ticket-comments { display: grid; gap: 8px; margin-top: 8px; }
  .ticket-comment {
    border: 1px solid var(--line); border-radius: 6px;
    background: #fafaf8; padding: 8px 10px;
  }
  .ticket-comment-meta {
    color: var(--muted); font-size: 11px; margin-bottom: 4px;
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .ticket-comment-body {
    white-space: pre-wrap; color: var(--ink); font-size: 12.5px; overflow-wrap: anywhere;
  }
  .ticket-labels { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 10px; }

  /* file-content rendering (shared by the Jobs + Timeline content pane) */
  .fv-note {
    font-size: 11px; color: var(--warn); background: #fdf8ee;
    border: 1px solid #f0dab0; border-radius: 4px; padding: 3px 8px; margin-bottom: 4px;
  }
  .fv-empty { font-size: 12px; color: var(--muted); font-style: italic; }
  pre.code {
    margin: 0; background: #fafaf8; border: 1px solid var(--line); border-radius: 6px;
    padding: 10px 12px; max-height: 360px; overflow: auto;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 12px; line-height: 1.5; color: #2d2d2a; white-space: pre;
    tab-size: 2;
  }
  pre.code.wrap { white-space: pre-wrap; word-break: break-word; }
  .fv-table-wrap {
    border: 1px solid var(--line); border-radius: 6px; overflow: auto; max-height: 360px;
  }
  table.fv-table { font-size: 12px; }
  table.fv-table th, table.fv-table td {
    padding: 4px 9px; white-space: nowrap;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  table.fv-table thead th {
    position: sticky; top: 0; background: var(--side); z-index: 1;
  }
  table.fv-table tbody td { color: #2d2d2a; }
  .fv-jsonl-ln {
    display: flex; gap: 8px; padding: 1px 0; border-bottom: 1px solid #f0f0ee;
  }
  .fv-jsonl-ln:last-child { border-bottom: none; }
  .fv-jsonl-num {
    color: #b4b4ae; flex: none; text-align: right; min-width: 26px;
    user-select: none; font-variant-numeric: tabular-nums;
  }

  /* ---- native-style file tree + two-pane file browser --------------------
     One reusable widget (.fb = file browser) shared by Jobs and Timeline:
     a left .fb-tree of collapsible folder rows + selectable file leaves,
     and a right .fb-viewer that shows the selected file's content.        */
  .fb {
    display: grid; grid-template-columns: minmax(220px, 320px) 1fr;
    gap: 0; border: 1px solid var(--line); border-radius: 8px;
    background: var(--panel); overflow: hidden; min-height: 380px;
  }
  .fb.resizable {
    grid-template-columns: var(--tree-width, minmax(220px, 320px)) 6px minmax(0, 1fr);
  }
  .fb-resizer {
    cursor: col-resize; background: var(--line);
    min-width: 6px; position: relative;
  }
  .fb-resizer::after {
    content: ""; position: absolute; inset: 0 2px;
    background: color-mix(in srgb, var(--muted) 22%, transparent);
    opacity: 0; transition: opacity .12s;
  }
  .fb-resizer:hover::after,
  .fb-resizer.dragging::after { opacity: 1; }
  .fb-tree {
    border-right: 1px solid var(--line); background: var(--side);
    overflow: auto; max-height: 70vh; padding: 6px 0;
  }
  .fb-tree-hd {
    font-size: 10px; text-transform: uppercase; letter-spacing: .6px;
    color: #9b9b95; padding: 6px 12px 4px;
  }
  .fb-viewer {
    overflow: auto; max-height: 70vh; padding: 14px 16px; min-width: 0;
  }
  /* one tree node — a .trow header plus, for folders, a .tchildren block */
  .tnode { }
  .trow {
    display: flex; align-items: center; gap: 6px; cursor: pointer;
    padding: 3px 8px 3px 0; font-size: 12.5px; color: var(--ink);
    user-select: none; white-space: nowrap; position: relative;
    border-radius: 0; min-width: 0;
  }
  .trow:hover { background: #ecece9; }
  .tnode.file.selected > .trow {
    background: #dce8f5; color: var(--accent); font-weight: 600;
  }
  .tnode.file.selected > .trow:hover { background: #d2e1f2; }
  /* indentation guides: a vertical hairline per nesting level */
  .tindent { flex: none; align-self: stretch; display: flex; }
  .tindent i {
    display: block; width: 14px; align-self: stretch;
    border-left: 1px solid var(--line); margin-left: 6px;
  }
  /* rotating chevron — folders only; files get an empty spacer */
  .tchev {
    flex: none; width: 12px; text-align: center; color: #b4b4ae;
    font-size: 9px; transition: transform .12s; line-height: 1;
  }
  .tnode.folder.open > .trow .tchev { transform: rotate(90deg); }
  .tchev.spacer { visibility: hidden; }
  .ticon {
    flex: none; width: 16px; height: 16px;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .ticon svg { display: block; }
  .tnode.folder > .trow .ticon { color: var(--accent); }
  .tnode.file   > .trow .ticon { color: #9b9b95; }
  .tnode.file.selected > .trow .ticon { color: var(--accent); }
  .tlabel {
    overflow: hidden; text-overflow: ellipsis; min-width: 0; flex: 0 1 auto;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  .tnode.folder > .trow .tlabel { font-family: inherit; }
  .tmetatag {
    flex: none; margin-left: 6px; font-size: 10px; color: var(--muted);
    font-variant-numeric: tabular-nums; max-width: 24ch;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .tbadge {
    flex: none; margin-left: 6px; font-size: 9px; letter-spacing: .4px;
    text-transform: uppercase; padding: 0 5px; border-radius: 3px;
    background: var(--chip); color: var(--muted);
  }
  .tbadge.trajectory { background: #e6effb; color: var(--accent); }
  .tbadge.reward { background: #eaf6ee; color: var(--good); }
  .tbadge.result { background: #f3eefb; color: #6b46c1; }
  .tbadge.ok { background: #eaf6ee; color: var(--good); }
  .tbadge.error { background: #fdf1f1; color: var(--bad); }
  .tbadge.verifier { background: #fdf8ee; color: var(--warn); }
  .tchildren { }
  /* the file browser's section header above the tree (group blurb + advisories) */
  .fb-grphd { margin-bottom: 10px; }
  .fb-grphd .glabel { font-weight: 700; }
  .fb-grphd .gblurb { color: var(--muted); font-size: 12px; margin: 3px 0 0; }
  /* the viewer's content header (file path + meta) */
  .fb-viewer-hd {
    display: grid; grid-template-columns: minmax(0, 1fr) auto;
    align-items: start; gap: 10px;
    padding-bottom: 8px; margin-bottom: 10px; border-bottom: 1px solid var(--line);
  }
  .fb-viewer-hd .vleft { min-width: 0; display: grid; gap: 2px; }
  .fb-viewer-hd .vpath {
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 12.5px; font-weight: 600;
    white-space: normal; overflow-wrap: anywhere; word-break: break-word;
  }
  .fb-viewer-hd .vmeta { color: var(--muted); font-size: 11.5px; }
  .fb-viewer-hd .vdate {
    color: var(--muted); font-size: 11.5px; font-variant-numeric: tabular-nums;
    justify-self: end; white-space: nowrap;
  }
  .fb-empty {
    color: var(--muted); font-size: 13px; font-style: italic;
    display: flex; align-items: center; justify-content: center;
    height: 100%; min-height: 240px; text-align: center; padding: 20px;
  }
  /* Jobs is the primary artifact workspace, so its browser should occupy
     the working viewport. Timeline keeps the compact shared defaults below. */
  .jobs-page {
    height: calc(100dvh - 96px); min-height: 0;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .jobs-page .sub-ttl { margin-bottom: 14px; }
  .jobs-browser {
    flex: 1 1 auto; min-height: 0;
  }
  .jobs-browser.fb {
    min-height: 0;
    --tree-width: clamp(260px, 28%, 380px);
    grid-template-columns: var(--tree-width) 6px minmax(0, 1fr);
  }
  .jobs-browser .fb-tree,
  .jobs-browser .fb-viewer {
    height: auto; max-height: none; min-height: 0;
  }
  .jobs-browser .tmetatag { max-width: 32ch; }
  .jobs-browser .trow { overflow: hidden; }
  .jobs-browser .trow .gblurb { display: none; }
  .jobs-browser .trow .chip.lnk { flex: none; }
  .jobs-browser .fb-viewer {
    display: flex; flex-direction: column; min-height: 0; overflow: hidden;
  }
  .jobs-browser .fb-viewer-hd,
  .jobs-browser .fv-note {
    flex: none;
  }
  .jobs-browser .fb-viewer > pre.code,
  .jobs-browser .fb-viewer > .fv-table-wrap {
    flex: 1 1 auto; min-height: 0;
    max-height: none; overflow: auto;
  }
  @media (max-width: 900px) {
    main { padding: 18px 16px 56px; }
    .ticket-board,
    .fb,
    .jobs-browser.fb {
      grid-template-columns: 1fr;
      height: auto;
    }
    .fb-resizer { display: none; }
    .architecture-board { grid-template-columns: 1fr; }
    .architecture-outline { position: static; max-height: 260px; }
    .jobs-page { height: auto; overflow: visible; }
    .jobs-browser .fb-tree,
    .jobs-browser .fb-viewer { max-height: 70vh; }
  }

  /* timeline / experiments */
  .timeline { border-left: 1px solid var(--line); margin-left: 8px; padding-left: 0; }
  .tl { position: relative; padding: 4px 0 14px 22px; }
  .tl .tdot {
    position: absolute; left: -7px; top: 7px; width: 12px; height: 12px;
    border-radius: 50%; background: #c9c9c4; border: 2px solid var(--bg);
  }
  /* experiment-type accent colours */
  .tl.ablation   .tdot { background: var(--accent); }
  .tl.reviewer   .tdot { background: #6b46c1; }
  .tl.skillsbench .tdot { background: var(--good); }
  .tl.swebench   .tdot { background: var(--warn); }
  .tl.scene      .tdot { background: #0d9488; }

  /* architecture markdown tab */
  .architecture-board {
    display: grid; grid-template-columns: minmax(220px, 300px) minmax(0, 1fr);
    gap: 18px; align-items: start;
  }
  .architecture-outline {
    position: sticky; top: 18px; max-height: calc(100dvh - 120px);
    overflow: auto; padding: 10px 0;
  }
  .architecture-outline a {
    display: block; color: var(--muted); text-decoration: none;
    padding: 4px 12px; border-radius: 5px; font-size: 12px;
  }
  .architecture-outline a:hover { background: #ecece9; color: var(--ink); }
  .architecture-outline .lvl-1 { color: var(--ink); font-weight: 700; }
  .architecture-outline .lvl-2 { padding-left: 20px; }
  .architecture-outline .lvl-3,
  .architecture-outline .lvl-4 { padding-left: 32px; font-size: 11px; }
  .architecture-doc {
    max-width: 900px; color: var(--ink);
  }
  .architecture-doc h1,
  .architecture-doc h2,
  .architecture-doc h3 {
    text-transform: none; letter-spacing: 0; color: var(--ink);
  }
  .architecture-doc h1 { font-size: 24px; margin: 0 0 16px; line-height: 1.2; }
  .architecture-doc h2 { font-size: 18px; margin: 28px 0 10px; }

    aside {

</style>

<body>
<aside>
  <div class="brand">BenchFlow <span>v0.5</span></div>
  <div class="gen" id="gen">loading…</div>
  <nav id="nav"></nav>
</aside>
<main id="main"></main>

<script>
const TABS = ["Overview", "Concept map", "Architecture", "Tickets", "Tests", "Jobs", "Daytona", "Advisories", "Timeline"];
let DATA = null, CURRENT = null, SELECTED_TICKET_ID = null, DATA_SIGNATURE = null, SYNC_ERROR = null;
let DAYTONA_TIMER = null, DAYTONA_AVAILABLE = false, DAYTONA_KEY = "";

function el(t, c, h) { const e = document.createElement(t); if (c) e.className = c; if (h !== undefined) e.innerHTML = h; return e; }
function esc(s) { return String(s == null ? "" : s).replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c])); }
function statusClass(s, t) {
  t = (t || "").toLowerCase();
  if (t === "completed") return "shipped";
  if (t === "started") return "active";
  if (t === "unstarted") return "partial";
  if (t === "canceled" || t === "duplicate") return "muted";
  s = (s || "").toLowerCase();
  if (s.includes("review") || s.includes("progress")) return "active";
  if (s === "done" || s === "shipped" || s === "resolved") return "shipped";
  if (s === "partial" || s === "open" || s === "todo") return "partial";
  return "backlog";
}

function dateOnly(v) { return v ? String(v).slice(0, 10) : ""; }
function compactPath(path) {
  const text = String(path || "");
  if (text.length <= 72) return text;
  const parts = text.split("/").filter(Boolean);
  const tail = parts.slice(-4).join("/");
  return "…/" + (tail || text.slice(-68));
}
function shortLinearUrl(url) {
  if (!url) return "";
  const text = String(url);
  const issue = text.match(/\/issue\/([^?#]+)/);
  return issue ? issue[1] : text.replace(/^https?:\/\//, "");
}
function safeLinearUrl(url) {
  const text = String(url || "");
  return /^https:\/\/linear\.app\//.test(text) ? text : "";
}
function linearLink(url, label) {
  const href = safeLinearUrl(url);
  const text = label || shortLinearUrl(url);
  if (!href) return esc(text || "not available");
  return `<a class="text-link" href="${esc(href)}" target="_blank" rel="noopener noreferrer">${esc(text)}</a>`;
}
function progressPct(m, issues) {
  const raw = Number(m && m.progress);
  if (Number.isFinite(raw)) return Math.max(0, Math.min(100, Math.round(raw <= 1 ? raw * 100 : raw)));
  const done = issues.filter(i => (i.status_type || "").toLowerCase() === "completed" || /done/i.test(i.status)).length;
  const active = issues.filter(i => (i.status_type || "").toLowerCase() === "started" || /progress|review/i.test(i.status)).length;
  return Math.round(((done + active * 0.5) / Math.max(1, issues.length)) * 100);
}
function progressMeter(pct, label) {
  const value = Math.max(0, Math.min(100, Math.round(Number(pct) || 0)));
  return `<div class="progress-meter" style="--progress:${value}%">
    <div class="progress-label"><b>${esc(label)}</b><span>${value}%</span></div>
    <div class="progress-track" role="meter" aria-valuemin="0" aria-valuemax="100" aria-valuenow="${value}" aria-label="${esc(label)}">
      <div class="progress-fill"></div>
    </div>
  </div>`;
}
function roadmapTickets(rm) {
  return (rm.milestones || []).flatMap(m =>
    (m.issues || []).map(i => ({ ...i, milestone: {
      id: m.id, name: m.name, status: m.status, progress: m.progress, target_date: m.target_date,
    }})));
}
function ticketPriority(i) {
  return i.priority && i.priority.name ? `P${i.priority.value} ${i.priority.name}` : "";
}
function ticketActive(i) {
  return (i.status_type || "").toLowerCase() === "started" || /progress|review/i.test(i.status || "");
}
function slugifyHeading(text) {
  return String(text || "").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "") || "section";
}
function mdInline(raw) {
  return esc(raw)
    .replace(/`([^`]+)`/g, "<code>$1</code>")
    .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
    .replace(/\*([^*]+)\*/g, "<em>$1</em>");
}
function renderMarkdownTable(lines) {
  const rows = lines.map(line => line.replace(/^\||\|$/g, "").split("|").map(cell => cell.trim()));
  const hasHeader = rows.length > 1 && rows[1].every(cell => /^:?-{3,}:?$/.test(cell));
  const head = hasHeader ? rows[0] : null;
  const body = hasHeader ? rows.slice(2) : rows;
  const thead = head ? `<thead><tr>${head.map(c => `<th>${mdInline(c)}</th>`).join("")}</tr></thead>` : "";
  const tbody = `<tbody>${body.map(row => `<tr>${row.map(c => `<td>${mdInline(c)}</td>`).join("")}</tr>`).join("")}</tbody>`;
  return `<div class="md-table-wrap"><table>${thead}${tbody}</table></div>`;
}
function renderMarkdown(md) {
  const lines = String(md || "").split("\n");
  const out = [], used = {};
  let para = [], list = [], code = [], table = [], inCode = false, codeLang = "";
  const flushPara = () => {
    if (!para.length) return;
    out.push(`<p>${mdInline(para.join(" "))}</p>`);
    para = [];
  };
  const flushList = () => {
    if (!list.length) return;
    out.push(`<ul>${list.map(item => `<li>${mdInline(item)}</li>`).join("")}</ul>`);
    list = [];
  };
  const flushTable = () => {
    if (!table.length) return;
    out.push(renderMarkdownTable(table));
    table = [];
  };
  const flushAll = () => { flushPara(); flushList(); flushTable(); };

  lines.forEach(line => {
    const fence = line.match(/^```(.*)$/);
    if (fence) {
      if (inCode) {
        out.push(`<pre class="code wrap"><code>${esc(code.join("\n"))}</code></pre>`);
        code = []; inCode = false; codeLang = "";
      } else {
        flushAll(); inCode = true; codeLang = fence[1] || "";
      }
      return;
    }
    if (inCode) { code.push(line); return; }
    if (!line.trim()) { flushAll(); return; }
    if (/^\|.+\|$/.test(line.trim())) { flushPara(); flushList(); table.push(line.trim()); return; }

    const heading = line.match(/^(#{1,4})\s+(.+?)\s*$/);
    if (heading) {
      flushAll();
      const level = heading[1].length;
      const title = heading[2].trim();
      const base = slugifyHeading(title);
      const count = used[base] || 0;
      used[base] = count + 1;
      const anchor = count === 0 ? base : `${base}-${count + 1}`;
      out.push(`<h${level} id="${esc(anchor)}">${mdInline(title)}</h${level}>`);
      return;
    }
    const bullet = line.match(/^\s*[-*]\s+(.+)$/);
    if (bullet) { flushPara(); flushTable(); list.push(bullet[1]); return; }
    flushList(); flushTable(); para.push(line.trim());
  });
  if (inCode) out.push(`<pre class="code wrap"><code>${esc(code.join("\n"))}</code></pre>`);
  flushAll();
  return out.join("\n");
}
function dataSignature(d) {
  const jobGroups = d.jobs && d.jobs.groups
    ? d.jobs.groups.map(g => `${g.name}:${g.n_tasks}`).join(",")
    : "";
  return [
    d.generated_at,
    d.roadmap && d.roadmap.source && d.roadmap.source.generated_at,
    d.repo && d.repo.branch,
    d.repo && d.repo.head,
    d.repo && d.repo.changes,
    d.jobs && d.jobs.source && d.jobs.source.path,
    d.jobs && d.jobs.source && d.jobs.source.configured,
    d.jobs && d.jobs.source && d.jobs.source.available,
    d.jobs && d.jobs.source && d.jobs.source.remembered,
    d.jobs && d.jobs.source && d.jobs.source.latest_modified_at,
    d.sync_error,
    d.jobs && d.jobs.total_tasks,
    jobGroups,
  ].join("|");
}

function tabFromLocation() {
  const want = decodeURIComponent(location.hash.slice(1));
  if (want === "Daytona" && !DAYTONA_AVAILABLE) return "Overview";
  return want === "Roadmap" || want === "Tickets" || TABS.includes(want)
    ? want
    : "Overview";
}
function repoLine() {
  const r = DATA.repo;
  const parts = [];
  if (r && r.available) {
    const state = r.dirty ? `${r.changes} changed` : "clean";
    parts.push(`<span class="chip ${r.dirty ? "" : "p"}">${esc(r.branch || "repo")}</span>`);
    parts.push(`<span class="mono">${esc(r.head || "")}</span>`);
    parts.push(`<span>${esc(state)}</span>`);
  }
  const syncError = dataSyncError(DATA);
  if (syncError) parts.push(`<span class="bad">sync failed: ${esc(syncError)}</span>`);
  return parts.length ? `<div class="repo-line">${parts.join("")}</div>` : "";
}
function dataSyncError(d) {
  return SYNC_ERROR || (d && d.sync_error) || null;
}
function syncBanner() {
  const syncError = dataSyncError(DATA);
  if (!syncError) return null;
  return el("div", "sync-banner",
    `<b>Dashboard data is not refreshing.</b><span>${esc(syncError)}</span>`);
}

// ---- file-content viewer (one component, used by Jobs + Timeline) ----------
// A file/artifact object carries: { name, kind, lang, content,
// content_lines, truncated, note?, ignored_by_verifier?, size?, rows? }. Renders an expandable
// <details> that reveals the file's content, formatted by `lang`.

function bytesLabel(n) {
  if (n == null || isNaN(n)) return "";
  if (n < 1024) return n + " B";
  if (n < 1024 * 1024) return (n / 1024).toFixed(1) + " KB";
  return (n / (1024 * 1024)).toFixed(1) + " MB";
}

// Parse CSV with minimal quote handling — enough for the artifact files we show.
function parseCSV(text) {
  const rows = [];
  let row = [], field = "", quoted = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (quoted) {
      if (ch === '"' && text[i + 1] === '"') { field += '"'; i++; }
      else if (ch === '"') quoted = false;
      else field += ch;
    } else if (ch === '"') {
      quoted = true;
    } else if (ch === ",") {
      row.push(field); field = "";
    } else if (ch === "\n" || ch === "\r") {
      if (ch === "\r" && text[i + 1] === "\n") i++;
      row.push(field); field = "";
      if (row.length > 1 || row[0] !== "") rows.push(row);
      row = [];
    } else {
      field += ch;
    }
  }
  if (field !== "" || row.length) { row.push(field); rows.push(row); }
  return rows;
}

function prettyJSON(text) {
  try { return JSON.stringify(JSON.parse(text), null, 2); }
  catch (e) { return text; }  // leave malformed JSON untouched
}

// Build the formatted body for a file's content. Returns a DOM node.
function fileContentBody(file) {
  const lang = file.lang || "text";
  const content = file.content;

  if (content == null) {
    const why = file.kind === "dir" ? "directory — no content"
      : "no preview available (binary or unreadable file)";
    return el("div", "fv-empty", esc(why));
  }
  if (content === "") return el("div", "fv-empty", "empty file");

  // CSV → a real table when it parses to a consistent grid.
  if (lang === "csv") {
    const rows = parseCSV(content);
    if (rows.length) {
      const wrap = el("div", "fv-table-wrap"), tbl = el("table", "fv-table");
      const [head, ...body] = rows;
      const thead = el("thead"), htr = el("tr");
      head.forEach(h => htr.appendChild(el("th", null, esc(h))));
      thead.appendChild(htr); tbl.appendChild(thead);
      const tb = el("tbody");
      body.forEach(r => {
        const tr = el("tr");
        for (let i = 0; i < head.length; i++)
          tr.appendChild(el("td", null, esc(r[i] != null ? r[i] : "")));
        tb.appendChild(tr);
      });
      tbl.appendChild(tb); wrap.appendChild(tbl);
      return wrap;
    }
  }

  // JSONL → one parsed/pretty line per record.
  if (lang === "jsonl") {
    const wrap = el("pre", "code");
    content.split("\n").forEach((raw, i) => {
      if (raw.trim() === "") return;
      let shown = raw;
      try { shown = JSON.stringify(JSON.parse(raw)); } catch (e) { /* keep raw */ }
      const ln = el("div", "fv-jsonl-ln");
      ln.appendChild(el("span", "fv-jsonl-num", String(i + 1)));
      ln.appendChild(el("span", null, esc(shown)));
      wrap.appendChild(ln);
    });
    return wrap;
  }

  // JSON → pretty-printed; everything else → raw monospace.
  const pre = el("pre", "code");
  pre.textContent = lang === "json" ? prettyJSON(content) : content;
  return pre;
}

// ---- reusable native-style file tree + content pane ------------------------
// ONE widget — `fileBrowser` — shared by Jobs and Timeline. A tree is a plain
// nested structure of nodes:
//   folder: { type:"folder", label, badge?, open?, meta?, children:[...] }
//   file:   { type:"file",   label, badge?, meta?, file:<artifact obj> }
// The browser renders a left tree pane + right content pane; clicking a file
// leaf renders that file into the pane via the existing fileContentBody().

// Crisp 14px line-icons — drawn with currentColor so the folder picks up the
// accent and the file the muted grey, no emoji rendering inconsistency.
const FOLDER_SVG =
  '<svg viewBox="0 0 16 16" width="14" height="14" fill="none" ' +
  'stroke="currentColor" stroke-width="1.3" stroke-linejoin="round">' +
  '<path d="M1.8 4.2v8a1 1 0 0 0 1 1h10.4a1 1 0 0 0 1-1V6a1 1 0 0 0-1-1H7.4L6 3.2H2.8a1 1 0 0 0-1 1Z"/></svg>';
const FILE_SVG =
  '<svg viewBox="0 0 16 16" width="14" height="14" fill="none" ' +
  'stroke="currentColor" stroke-width="1.3" stroke-linejoin="round">' +
  '<path d="M3.5 1.8h6L13 5.3v8.9a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V2.8a1 1 0 0 1 .5-1Z"/>' +
  '<path d="M9.3 2v3.4H13"/></svg>';

// Render the selected file into the right-hand viewer pane.
function renderFileInto(viewer, node) {
  viewer.innerHTML = "";
  if (!node) {
    viewer.appendChild(el("div", "fb-empty",
      "Select a file in the tree to view its contents."));
    return;
  }
  const file = node.file;
  const meta = [];
  if (file.lang) meta.push(file.lang);
  if (file.content_lines != null) meta.push(file.content_lines + " lines");
  if (file.rows != null) meta.push(file.rows + " rows");
  if (file.size != null) meta.push(bytesLabel(file.size));
  if (file.ignored_by_verifier) meta.push("ignored by verifier");
  if (node.viewerExtra) meta.push(node.viewerExtra);

  const hd = el("div", "fb-viewer-hd");
  const left = el("div", "vleft");
  const pathText = file.path || node.path || file.name;
  const pathNode = el("span", "vpath", esc(pathText));
  pathNode.title = pathText;
  left.appendChild(pathNode);
  if (meta.length) left.appendChild(el("span", "vmeta", esc(meta.join(" · "))));
  hd.appendChild(left);
  if (file.modified_at) hd.appendChild(el("span", "vdate", esc(file.modified_at)));
  viewer.appendChild(hd);

  if (file.truncated) {
    const shown = (file.content || "").split("\n").length;
    const total = file.content_lines != null ? file.content_lines : shown;
    viewer.appendChild(el("div", "fv-note",
      `truncated — showing first ${shown} of ${total} lines`));
  }
  if (file.note) viewer.appendChild(el("div", "fv-note", esc(file.note)));
  viewer.appendChild(fileContentBody(file));
}

// Build one tree node (folder or file) as a DOM subtree. `depth` drives the
// indentation guides; `ctx` carries the shared selection state + viewer.
function treeNode(node, depth, ctx) {
  const wrap = el("div", "tnode " + node.type);
  if (node.type === "file" && node.file) {
    if (node.file.lang) wrap.dataset.lang = node.file.lang;
    if (node.file.kind) wrap.dataset.kind = node.file.kind;
  }
  const row = el("div", "trow");

  // indentation guides — one hairline per ancestor level
  if (depth > 0) {
    const ind = el("div", "tindent");
    for (let i = 0; i < depth; i++) ind.appendChild(el("i"));
    row.appendChild(ind);
  }
  // rotating chevron (folders) or an invisible spacer (files) — keeps
  // file labels aligned with folder labels at the same depth.
  row.appendChild(el("span", "tchev" + (node.type === "file" ? " spacer" : ""), "▸"));
  // crisp inline-SVG folder / file glyphs — consistent across platforms,
  // no emoji rendering surprises, tuned to the minimal light theme.
  row.appendChild(el("span", "ticon", node.type === "folder" ? FOLDER_SVG : FILE_SVG));

  const label = el("span", "tlabel", esc(node.label));
  row.appendChild(label);
  if (node.meta) row.appendChild(el("span", "tmetatag", esc(node.meta)));
  if (node.badge)
    row.appendChild(el("span", "tbadge " + esc(node.badge.cls || ""),
                       esc(node.badge.text)));
  if (node.headerExtra) {  // e.g. advisory chips on a group folder
    const ex = el("span");
    ex.style.cssText = "margin-left:8px;display:inline-flex;gap:4px;flex-wrap:wrap";
    ex.appendChild(node.headerExtra);
    row.appendChild(ex);
  }
  wrap.appendChild(row);

  if (node.type === "folder") {
    const kids = el("div", "tchildren");
    (node.children || []).forEach(c =>
      kids.appendChild(treeNode(c, depth + 1, ctx)));
    wrap.appendChild(kids);
    const setOpen = (open) => {
      wrap.classList.toggle("open", open);
      kids.style.display = open ? "" : "none";
    };
    setOpen(node.open !== false);   // default expanded
    row.addEventListener("click", () =>
      setOpen(!wrap.classList.contains("open")));
  } else {
    // file leaf — clicking selects it and loads it into the viewer
    row.addEventListener("click", () => {
      if (ctx.selected) ctx.selected.classList.remove("selected");
      wrap.classList.add("selected");
      ctx.selected = wrap;
      node.path = node.path || node.label;
      renderFileInto(ctx.viewer, node);
    });
  }
  return wrap;
}

// The full two-pane file browser. `roots` is an array of top-level tree
// nodes; `opts.treeHeader` is optional DOM placed above the tree (group
// blurb + advisory links). Returns the .fb element.
function fileBrowser(roots, opts) {
  opts = opts || {};
  const fb = el("div", "fb");
  const treePane = el("div", "fb-tree");
  const viewer = el("div", "fb-viewer");
  const ctx = { selected: null, viewer };
  let resizer = null;
  if (opts.resizable) {
    fb.classList.add("resizable");
    resizer = el("div", "fb-resizer");
    if (resizer.setAttribute) {
      resizer.setAttribute("role", "separator");
      resizer.setAttribute("aria-orientation", "vertical");
      resizer.setAttribute("aria-label", "Resize file tree");
    }
    let dragging = false;
    const resizeTo = (clientX) => {
      const rect = fb.getBoundingClientRect();
      const min = 220;
      const max = Math.max(min, Math.min(560, rect.width - 360));
      const width = Math.max(min, Math.min(max, clientX - rect.left));
      fb.style.setProperty("--tree-width", `${Math.round(width)}px`);
    };
    resizer.addEventListener("pointerdown", (e) => {
      dragging = true;
      resizer.classList.add("dragging");
      if (resizer.setPointerCapture) resizer.setPointerCapture(e.pointerId);
      resizeTo(e.clientX);
      e.preventDefault();
    });
    resizer.addEventListener("pointermove", (e) => {
      if (dragging) resizeTo(e.clientX);
    });
    const stopResize = () => {
      dragging = false;
      resizer.classList.remove("dragging");
    };
    resizer.addEventListener("pointerup", stopResize);
    resizer.addEventListener("pointercancel", stopResize);
  }

  if (opts.treeHeader) {
    const hd = el("div", "fb-grphd");
    hd.style.padding = "8px 12px 4px";
    hd.appendChild(opts.treeHeader);
    treePane.appendChild(hd);
  }
  treePane.appendChild(el("div", "fb-tree-hd", opts.treeLabel || "Files"));
  const rootBox = el("div", "tree-root");
  roots.forEach(r => rootBox.appendChild(treeNode(r, 0, ctx)));
  treePane.appendChild(rootBox);

  fb.appendChild(treePane);
  if (resizer) fb.appendChild(resizer);
  fb.appendChild(viewer);

  // auto-select the first file leaf so the viewer is never blank on open
  const firstFile = treePane.querySelector(".tnode.file .trow");
  if (firstFile) firstFile.dispatchEvent(new MouseEvent("click", { bubbles: true }));
  else renderFileInto(viewer, null);
  return fb;
}

// Turn a flat list of artifact files into a nested folder tree by splitting
// each file's name on "/" — so `trajectory/acp_trajectory.jsonl` nests under
// a `trajectory/` folder. `badgeOf` maps a file to an optional badge.
function artifactDisplayName(file) {
  if (!file) return "";
  if (file.name === "rewards.jsonl") return "reward events.jsonl";
  if (file.name === "verifier/reward.txt") return "raw verifier reward.txt";
  if (file.name === "verifier/reward.json") return "raw verifier reward.json";
  if (file.name === "result.json") return "final result.json";
  return String(file.name || "");
}

function artifactMeta(file) {
  if (!file) return null;
  if (file.name === "rewards.jsonl") return "event log";
  if (file.name === "verifier/reward.txt" || file.name === "verifier/reward.json")
    return "sandbox boundary";
  if (file.name === "result.json") return "canonical";
  return file.lang || null;
}

function filesToTree(files, badgeOf) {
  const root = { type: "folder", label: "", children: [] };
  files.forEach(f => {
    const parts = artifactDisplayName(f).split("/");
    let cur = root;
    for (let i = 0; i < parts.length - 1; i++) {
      let dir = cur.children.find(c => c.type === "folder" && c.label === parts[i]);
      if (!dir) { dir = { type: "folder", label: parts[i], children: [] }; cur.children.push(dir); }
      cur = dir;
    }
    const leaf = parts[parts.length - 1];
    cur.children.push({
      type: "file", label: leaf, file: f,
      meta: artifactMeta(f),
      badge: badgeOf ? badgeOf(f) : null,
    });
  });
  return root.children;
}

// ---- Jobs (the jobs/ folder tree, as a native file browser) ---------------

// An artifact's badge in the tree — colour-codes trajectory / reward / result.
function artifactBadge(a) {
  if (a.ignored_by_verifier) return { text: "ignored", cls: "verifier" };
  if (a.name === "rewards.jsonl") return { text: "events", cls: "reward" };
  if (a.name === "verifier/reward.txt" || a.name === "verifier/reward.json")
    return { text: "raw", cls: "reward" };
  if (a.name === "result.json") return { text: "final", cls: "result" };
  if (["trajectory", "reward", "result"].includes(a.kind))
    return { text: a.kind, cls: a.kind };
  return null;
}

function taskOutcomeBadge(outcome) {
  if (outcome === "verifier_errored") return { text: "verifier", cls: "verifier" };
  if (outcome === "errored") return { text: "error", cls: "error" };
  if (outcome === "failed") return { text: "failed", cls: "error" };
  if (outcome === "passed") return { text: "ok", cls: "ok" };
  return { text: "pending", cls: "warn" };
}

// One task → a folder node holding its artifact files (nested by path), plus
// any error / verifier-error pseudo-files so failures stay browsable.
// `firstPath` marks the first-group/first-run/first-task chain that opens
// by default — every other folder starts collapsed, like a real explorer.
function taskNode(tk, firstPath) {
  const status = taskOutcomeBadge(tk.outcome);
  const rewardStr = tk.reward == null ? "no reward" : "reward " + tk.reward;
  const memoryStr = tk.memory_score == null
    ? null
    : "Memory " + Math.round(Number(tk.memory_score) * 100) + "%";
  const children = filesToTree(tk.artifacts || [], artifactBadge);
  // surface task-level errors as readable text leaves inside the task folder
  if (tk.error)
    children.push({ type: "file", label: "ERROR", badge: { text: "error", cls: "error" },
      file: { name: "ERROR", lang: "text", content: tk.error, content_lines: null } });
  if (tk.verifier_error)
    children.push({ type: "file", label: "VERIFIER", badge: { text: "verifier", cls: "verifier" },
      file: { name: "VERIFIER", lang: "text", content: tk.verifier_error, content_lines: null } });
  if (!children.length)
    children.push({ type: "file", label: "(no files)",
      file: { name: "(no files)", content: null } });
  // task-level meta — every field generate.py emits is surfaced here.
  const bits = [rewardStr];
  if (memoryStr) bits.push(memoryStr);
  bits.push(tk.agent);
  if (tk.model && tk.model !== "—") bits.push(tk.model);
  if (tk.environment && tk.environment !== "—") bits.push(tk.environment);
  if (tk.total_time) bits.push(`${tk.total_time}s`);
  if (tk.trajectory_events) bits.push(`${tk.trajectory_events} traj events`);
  if (tk.rollout) bits.push(`#${String(tk.rollout).split("__").pop()}`);
  return {
    type: "folder", label: tk.name,
    meta: bits.join(" · "),
    badge: status, open: !!firstPath, children,
  };
}

// One run → a folder of task folders.
function runNode(run, firstPath) {
  const latest = run.latest_modified_at ? ` · latest ${run.latest_modified_at}` : "";
  const target = (run.targets || []).slice(0, 3).join(", ");
  const signal = (run.signals || []).slice(0, 3).join(", ");
  const tags = [target, signal].filter(Boolean).join(" · ");
  const summary = run.summary || {};
  const summaryBits = [];
  if (summary.total != null && Number(summary.total) !== (run.tasks || []).length)
    summaryBits.push(`${summary.total} benchmark tasks`);
  if (summary.score != null) summaryBits.push(`score ${summary.score}`);
  if (summary.passed != null || summary.failed != null || summary.errored != null || summary.verifier_errored != null)
    summaryBits.push(`${summary.passed || 0} pass/${summary.failed || 0} fail/${summary.errored || 0} err/${summary.verifier_errored || 0} verifier`);
  return {
    type: "folder", label: run.id + "/",
    meta: `${run.tasks.length} rollout row${run.tasks.length === 1 ? "" : "s"}` +
          (summaryBits.length ? ` · ${summaryBits.join(" · ")}` : "") +
          latest +
          (tags ? ` · ${tags}` : ""),
    open: !!firstPath,
    children: (run.tasks || []).map((tk, ti) => taskNode(tk, firstPath && ti === 0)),
  };
}

// One group → a top-level folder. Carries the advisory-correspondence chips
// inline on its row so each group still links to its advisories.
function groupNode(g, gi) {
  const adv = (g.advisories || []);
  let headerExtra = null;
  if (g.blurb || adv.length) {
    const box = el("span");
    box.style.cssText = "display:flex;gap:8px;flex-wrap:wrap;align-items:baseline";
    if (g.blurb) box.appendChild(el("span", "gblurb", esc(g.blurb)));
    adv.forEach(id => {
      const c = el("span", "chip lnk", "▸ " + esc(id));
      c.dataset.adv = id;
      // stop the click from also toggling the folder
      c.addEventListener("click", (e) => { e.stopPropagation(); show("Advisories", id); });
      box.appendChild(c);
    });
    headerExtra = box;
  }
  return {
    type: "folder", label: `${g.label}  (jobs/${g.name}/)`,
    meta: `${g.n_tasks} task${g.n_tasks === 1 ? "" : "s"}` +
          (g.capability ? ` · capability ${g.capability}` : "") +
          (g.latest_modified_at ? ` · latest ${g.latest_modified_at}` : ""),
    headerExtra,
    open: gi === 0,                       // first group expanded by default
    children: (g.runs || []).map((run, ri) => runNode(run, gi === 0 && ri === 0)),
  };
}

function renderJobs() {
  const j = DATA.jobs, wrap = el("div", "jobs-page");
  const source = j.source || {};
  const sourceLabel = source.label || "jobs/";
  const sourcePath = source.path || sourceLabel;
  const sourceDisplay = compactPath(sourcePath);
  const sourceNote = source.configured
    ? " Mirroring external jobs root."
    : "";
  const latestNote = source.latest_modified_at
    ? ` Latest artifact: ${esc(source.latest_modified_at)}.`
    : "";
  const archivedRuns = Number(j.archived_runs || 0);
  const archivedTasks = Number(j.archived_tasks || 0);
  const totalRows = Number(j.total_tasks || 0);
  const totalRowLabel = `${totalRows} rollout row${totalRows === 1 ? "" : "s"}`;
  const archiveParts = [];
  if (archivedRuns) archiveParts.push(`${archivedRuns} low-signal run${archivedRuns === 1 ? "" : "s"}`);
  if (archivedTasks) archiveParts.push(`${archivedTasks} task${archivedTasks === 1 ? "" : "s"}`);
  const archiveNote = archiveParts.length
    ? ` ${archiveParts.join(" and ")} archived.`
    : "";
  wrap.appendChild(el("h1", "page", "Jobs &amp; artifacts"));
  wrap.appendChild(el("div", "sub-ttl",
    `Every rollout under <code title="${esc(sourcePath)}">${esc(sourceDisplay)}</code> — ${totalRowLabel} in ${j.groups.length} groups.` +
    latestNote + archiveNote + sourceNote + ` Browse the tree; click a file to view it. Each group links to its advisories.`));
  if (!j.total_tasks) {
    const hint = source.configured
      ? `No rollout artifacts found under ${esc(sourcePath)}.`
      : `No rollout artifacts found under jobs/. If this is an isolated worktree, set BENCHFLOW_DASHBOARD_JOBS_ROOT to the worktree that owns the git-ignored rollout artifacts.`;
    wrap.appendChild(el("div", "card empty", hint));
    return wrap;
  }
  const roots = j.groups.map((g, gi) => groupNode(g, gi));
  const browser = fileBrowser(roots, { treeLabel: "jobs/", resizable: true });
  browser.id = "jobs-fb";
  browser.classList.add("jobs-browser");
  wrap.appendChild(browser);
  return wrap;
}

// Scroll a job group's folder row into view and flash it. Used by the
// sidebar sub-links and the advisory back-links.
function focusJobGroup(groupName) {
  const j = DATA.jobs || { groups: [] };
  const idx = (j.groups || []).findIndex(g => g.name === groupName);
  if (idx < 0) return;
  const fb = document.getElementById("jobs-fb");
  if (!fb) return;
  const rootNodes = fb.querySelectorAll(".fb-tree > .fb-grphd ~ .tree-root > .tnode.folder, .fb-tree .tree-root > .tnode.folder");
  const node = rootNodes[idx];
  if (!node) return;
  const row = node.querySelector(".trow");
  if (!node.classList.contains("open")) row.dispatchEvent(new MouseEvent("click", { bubbles: true }));
  if (row.scrollIntoView) row.scrollIntoView({ block: "center" });
  row.style.transition = "box-shadow .3s";
  row.style.boxShadow = "inset 0 0 0 2px var(--accent)";
  setTimeout(() => row.style.boxShadow = "", 1400);
}

// ---- Advisories -----------------------------------------------------------
function renderAdvisories(focusId) {
  const adv = DATA.advisories, wrap = el("div");
  wrap.appendChild(el("h1", "page", "Agent advisories"));
  wrap.appendChild(el("div", "sub-ttl", "Source: " + esc(adv.source)));
  const groupName = id => {
    const g = (DATA.jobs.groups || []).find(x => x.name === id);
    return g ? g.label : id;
  };
  function block(title, items) {
    if (!items.length) return;
    wrap.appendChild(el("h2", null, title + " — " + items.length));
    const card = el("div", "card");
    items.forEach(i => {
      const row = el("div", "adv");
      row.id = "adv-" + i.id;
      const corr = [];
      if (i.capability) corr.push(`<span class="chip p">capability ${i.capability}</span>`);
      if (i.group) corr.push(`<span class="chip lnk" data-grp="${esc(i.group)}">▸ jobs/${esc(i.group)}/ — ${esc(groupName(i.group))}</span>`);
      row.innerHTML = `
        <div class="ahd">
          <span class="pill ${esc(i.severity)}">${esc(i.severity)}</span>
          <b>${esc(i.title)}</b>
          <span style="margin-left:auto" class="muted"><span class="dot ${statusClass(i.status)}"></span>${esc(i.status)}</span>
        </div>
        <div class="adet"><span class="mono">${esc(i.id)}</span> · raised by <b>${esc(i.agent)}</b> — ${esc(i.detail)}</div>
        ${corr.length ? `<div class="acorr muted">corresponds to: ${corr.join(" ")}</div>` : ""}`;
      card.appendChild(row);
    });
    wrap.appendChild(card);
  }
  block("Open follow-ups", adv.items.filter(i => i.status === "open"));
  block("Resolved", adv.items.filter(i => i.status !== "open"));
  wrap.querySelectorAll(".chip[data-grp]").forEach(c =>
    c.onclick = () => show("Jobs", null, { jobGroup: c.dataset.grp }));
  if (focusId) setTimeout(() => {
    const t = document.getElementById("adv-" + focusId);
    if (t) { t.scrollIntoView({ block: "center" }); t.style.background = "#fffbe6"; }
  }, 30);
  return wrap;
}

// ---- Timeline (experiments) -----------------------------------------------
function renderTimeline() {
  // `experiments` replaced the old git-commit `timeline` key.
  const exps = (DATA.experiments || []).slice();
  const wrap = el("div");
  wrap.appendChild(el("h1", "page", "Timeline"));
  wrap.appendChild(el("div", "sub-ttl",
    `The v0.5 experiments — ${exps.length} run${exps.length === 1 ? "" : "s"}, newest first.`));
  if (!exps.length) {
    wrap.appendChild(el("div", "card empty", "No experiments found under experiments/ or labs/."));
    return wrap;
  }
  // Newest first; entries without a date sort to the end.
  exps.sort((a, b) => String(b.date || "").localeCompare(String(a.date || "")));

  const card = el("div", "card");
  const line = el("div", "timeline");
  exps.forEach(x => {
    const type = x.type || "other";
    const item = el("div", "tl " + esc(type));
    item.appendChild(el("div", "tdot"));

    const meta = el("div", "tmeta");
    meta.appendChild(el("span", "tpill", esc(type)));
    if (x.date) meta.appendChild(el("span", null, esc(x.date)));
    if (x.source) meta.appendChild(el("code", null, esc(x.source)));
    item.appendChild(meta);

    const files = Array.isArray(x.files) ? x.files : [];
    const totalFiles = x.n_files_total != null ? x.n_files_total : files.length;
    const fileLabel = x.files_truncated
      ? `showing ${files.length} of ${totalFiles} files`
      : `${files.length} file${files.length === 1 ? "" : "s"}`;
    const exp = el("div", "exp");
    const head = el("div");
    head.innerHTML =
      `<span class="ename">${esc(x.name)}</span>` +
      `<span class="muted" style="font-size:12px"> — ${esc(fileLabel)}</span>`;
    exp.appendChild(head);
    if (x.blurb) exp.appendChild(el("div", "eblurb", esc(x.blurb)));

    if (!files.length) {
      exp.appendChild(el("div", "fv-empty", "no files recorded for this experiment"));
    } else {
      // SAME file-tree widget + content pane as Jobs — paths like
      // labs/<name>/<file> nest into folders automatically.
      const roots = filesToTree(files, null);
      exp.appendChild(fileBrowser(roots, { treeLabel: "Files" }));
    }
    item.appendChild(exp);
    line.appendChild(item);
  });
  card.appendChild(line);
  wrap.appendChild(card);
  return wrap;
}

// ---- Daytona (live cloud sandboxes) ---------------------------------------
// Session-only key (in-memory, never persisted): a cloud credential should not
// live in localStorage next to rendered job/artifact content. Blank => the
// server's DAYTONA_API_KEY is used (the normal path).
function daytonaKey() { return DAYTONA_KEY; }
async function pollDaytona() {
  const statusEl = document.getElementById("dy-status");
  const rowsEl = document.getElementById("dy-rows");
  if (!rowsEl || !statusEl) { if (DAYTONA_TIMER) { clearInterval(DAYTONA_TIMER); DAYTONA_TIMER = null; } return; }
  const key = daytonaKey();
  try {
    const r = await fetch("/daytona.json", { headers: key ? { "X-Daytona-Key": key } : {} });
    const d = await r.json();
    if (d.error) { statusEl.innerHTML = `<span class="bad">${esc(d.error)}</span>`; rowsEl.innerHTML = ""; return; }
    const states = Object.entries(d.by_state || {}).map(([k, v]) => `<span class="chip">${esc(k)}: ${v}</span>`).join(" ");
    statusEl.innerHTML = `<b style="font-size:20px">${d.count}</b> active sandboxes &nbsp; ${states} <span class="muted">· as of ${esc(d.as_of)} · auto-refresh 15s</span>`;
    rowsEl.innerHTML = (d.rows || []).map(x =>
      `<tr><td class="mono">${esc(x.id)}</td><td>${esc(x.state)}</td><td class="mono">${esc(x.created)}</td><td>${esc(x.age)}</td><td>${esc(x.target)}</td></tr>`).join("");
  } catch (e) { statusEl.innerHTML = `<span class="bad">fetch error: ${esc(e)}</span>`; }
}
function renderDaytona() {
  if (DAYTONA_TIMER) { clearInterval(DAYTONA_TIMER); DAYTONA_TIMER = null; }
  const wrap = el("div", "wrap");
  wrap.appendChild(el("h1", "page", "Daytona"));
  const k = daytonaKey();
  const keyRow = el("div", "card");
  keyRow.style.cssText = "display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:12px;margin-bottom:12px";
  keyRow.innerHTML =
    `<label>Daytona API key&nbsp;<input id="dy-key" type="password" placeholder="dtn_…" value="${esc(k)}" style="width:340px;padding:4px 8px"></label>` +
    `<button id="dy-save" style="padding:4px 12px;cursor:pointer">Save</button>` +
    `<span id="dy-keyhint" class="muted">${k ? "key set for this session (in memory)" : "blank → uses the saved key or server DAYTONA_API_KEY"}</span>`;
  wrap.appendChild(keyRow);
  const status = el("div"); status.id = "dy-status"; status.textContent = "loading…";
  status.style.cssText = "margin:8px 0 12px";
  wrap.appendChild(status);
  const tbl = el("div", "fv-table-wrap");
  tbl.innerHTML =
    `<table class="fv-table"><thead><tr><th>sandbox id</th><th>state</th><th>created (UTC)</th><th>age</th><th>target</th></tr></thead>` +
    `<tbody id="dy-rows"></tbody></table>`;
  wrap.appendChild(tbl);
  setTimeout(() => {
    const btn = document.getElementById("dy-save");
    if (btn) btn.onclick = () => {
      const v = document.getElementById("dy-key").value.trim();
      DAYTONA_KEY = v;
      const hint = document.getElementById("dy-keyhint");
      // Persist server-side (gitignored dashboard/.daytona_key) so the key
      // survives reloads + server restarts — no localStorage (avoids exfil via
      // rendered job/artifact content). Blank clears the persisted key.
      fetch("/daytona/key", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ key: v }) })
        .then(r => r.json())
        .then(() => { hint.textContent = v ? "key saved — persisted on the server (survives reload)" : "cleared (server key removed)"; })
        .catch(() => { hint.textContent = v ? "key set for this session" : "cleared"; });
      pollDaytona();
    };
    pollDaytona();
    DAYTONA_TIMER = setInterval(pollDaytona, 15000);
  }, 20);
  return wrap;
}

const RENDER = {
  "Overview": renderOverview, "Concept map": renderConcept, "Architecture": renderArchitecture,
  "Tickets": renderRoadmap,
  "Tests": renderTests, "Jobs": renderJobs, "Daytona": renderDaytona,
  "Advisories": renderAdvisories, "Timeline": renderTimeline,
};

// `opts` may carry { jobGroup } to focus a group folder in the Jobs tree.
function show(tab, arg, opts) {
  opts = opts || {};
  if (DAYTONA_TIMER && tab !== "Daytona") { clearInterval(DAYTONA_TIMER); DAYTONA_TIMER = null; }
  if (tab === "Roadmap") tab = "Tickets";
  CURRENT = tab;
  document.querySelectorAll("nav a").forEach(a =>
    a.classList.toggle("active", a.dataset.tab === tab && !a.classList.contains("sub")));
  const main = document.getElementById("main");
  main.innerHTML = "";
  const notice = syncBanner();
  if (notice) main.appendChild(notice);
  main.appendChild(tab === "Advisories" ? renderAdvisories(arg) : RENDER[tab]());
  window.scrollTo(0, 0);
  if (tab === "Jobs" && opts.jobGroup)
    setTimeout(() => focusJobGroup(opts.jobGroup), 40);
  location.hash = encodeURIComponent(tab);
}

function buildNav() {
  const nav = document.getElementById("nav");
  nav.innerHTML = "";
  TABS.forEach(t => {
    if (t === "Daytona" && !DAYTONA_AVAILABLE) return;  // live-server-only feature
    const a = el("a", null, t);
    a.dataset.tab = t;
    a.onclick = () => show(t);
    nav.appendChild(a);
    if (t === "Jobs") {
      // nested sub-links mirroring the jobs/ folder groups
      (DATA.jobs.groups || []).forEach(g => {
        const s = el("a", "sub",
          `jobs/${esc(g.name)}/ <span class="count">${g.n_tasks}</span>`);
        s.onclick = (e) => { e.stopPropagation(); show("Jobs", null, { jobGroup: g.name }); };
        nav.appendChild(s);
      });
    }
  });
}

function updateGenerated(d) {
  const repo = d.repo && d.repo.available
    ? `<br>${esc(d.repo.branch || "")} @ ${esc(d.repo.head || "")}${d.repo.dirty ? ` · ${esc(d.repo.changes)} changed` : ""}`
    : "";
  const syncError = dataSyncError(d);
  const sync = syncError ? `<br><span class="bad">sync failed: ${esc(syncError)}</span>` : "";
  const latestJob = d.jobs && d.jobs.source && d.jobs.source.latest_modified_at
    ? `<br>jobs latest ${esc(d.jobs.source.latest_modified_at)}`
    : "";
  document.getElementById("gen").innerHTML =
    `generated<br>${esc(d.generated_at)}<br>` +
    `${d.summary.tests.passed}/${d.summary.tests.total} tests · ${d.summary.jobs_total} artifacts${repo}${latestJob}${sync}`;
}

function renderCurrent() {
  if (!CURRENT) return;
  const main = document.getElementById("main");
  main.innerHTML = "";
  const notice = syncBanner();
  if (notice) main.appendChild(notice);
  main.appendChild(CURRENT === "Advisories" ? renderAdvisories() : RENDER[CURRENT]());
}

function applyData(d, initial) {
  const previous = DATA_SIGNATURE;
  const hadSyncError = !!dataSyncError(DATA);
  DATA = d;
  DATA_SIGNATURE = dataSignature(d);
  SYNC_ERROR = null;
  updateGenerated(d);
  if (initial || !CURRENT) {
    buildNav();
    show(tabFromLocation());
  } else if (DATA_SIGNATURE !== previous || hadSyncError) {
    buildNav();
    renderCurrent();
  }
}

function loadData(initial) {
  if (window.location.protocol === "file:") {
    if (initial) {
      document.getElementById("main").innerHTML =
        `<div class="card empty">` +
        `<strong>Cannot load data.json over file://</strong><br><br>` +
        `Browsers block fetch() from file:// URLs for security reasons. ` +
        `Use the built-in dev server instead:<br><br>` +
        `<code>python dashboard/serve.py</code><br><br>` +
        `Then open <code>http://localhost:8777</code> in your browser.</div>`;
    }
    return Promise.resolve();
  }
  return fetch("data.json?_=" + Date.now())
    .then(r => {
      if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
      return r.json();
    })
    .then(d => applyData(d, initial))
    .catch(e => {
      if (!initial) {
        SYNC_ERROR = String(e);
        if (DATA) updateGenerated(DATA);
        renderCurrent();
        return;
      }
      document.getElementById("main").innerHTML =
        `<div class="card empty">Could not load data.json — run ` +
        `<code>python dashboard/generate.py</code> then reload.<br><br>` +
        `<span class="bad">${esc(e)}</span></div>`;
    });
}

loadData(true);
setInterval(() => loadData(false), 5000);
// Probe the live-server-only capability endpoint; static deploys 404 here, so
// the Daytona tab only appears when an endpoint actually backs it. Only over
// http(s) — under file:// or non-browser script eval there is no live endpoint.
if (location.protocol === "http:" || location.protocol === "https:") {
  fetch("daytona/available")
    .then(r => { DAYTONA_AVAILABLE = r.ok; })
    .catch(() => { DAYTONA_AVAILABLE = false; })
    .finally(() => { if (DATA) buildNav(); });
}
if (window.addEventListener) {
  window.addEventListener("hashchange", () => {
    if (!DATA) return;
    const tab = tabFromLocation();
    if (tab !== CURRENT) show(tab);
  });
}
</script>
</body>
