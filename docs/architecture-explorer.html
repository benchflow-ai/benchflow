low/learner_store.py","role":"Generation versioning, commit/revert, metric tracking, JSON persistence"},{"path":"src/benchflow/learner_skills.py","role":"Materialize/capture skill directories, build skill_memory_delta records"},{"path":"src/benchflow/_utils/learner_memory.py","role":"Memory-space scoring attachment, reward event JSONL patching, generation metadata"}],"symbols":["LearnerStore","LearnerState","Generation","materialize_skills","capture_skills","skill_memory_delta","attach_memory_score","evolved_skills_for_result"],"connections":["evaluation","rollout","reward_internals","trajectories","learner_skills"],"githubDir":"src/benchflow"},{"id":"adapters_in","title":"Inbound Adapters","tagline":"Foreign task formats \u2192 native manifest","summary":"Translates foreign task formats (Harbor, Terminal-Bench) into the native **EnvironmentManifest** seam via pure Python translation. The adapter reads a directory and returns an **InboundTask** carrying a validated `EnvironmentManifest`, legacy `TaskConfig`, instruction text, and a file map that remaps foreign layouts (root-level Dockerfiles, flat metadata) onto BenchFlow's native structure. Enables **zero-modification adoption** of existing benchmarks (capability #8).","responsibilities":["Detect foreign task format and select appropriate adapter (Harbor vs Terminal-Bench)","Lift instruction text from embedded config into separate `instruction.md`","Remap flat or legacy metadata into native TaskConfig structure","Translate foreign directory layouts (root Dockerfile, solution.sh) to native subtrees","Generate EnvironmentManifest from task config when explicit manifest is absent","Parse and inject Dockerfile build-context source paths for Terminal-Bench compatibility"],"dataflow":"Foreign task directory \u2192 (detect format) \u2192 (translate config, remap files, generate manifest) \u2192 InboundTask","modules":[{"path":"src/benchflow/adapters/inbound.py","role":"Base contract and helpers \u2014 InboundTask dataclass, manifest derivation, native-subtree carry logic"},{"path":"src/benchflow/adapters/harbor.py","role":"Harbor task normalizer \u2014 thin wrapper since Harbor is already native format"},{"path":"src/benchflow/adapters/terminal_bench.py","role":"Terminal-Bench translator \u2014 flat YAML \u2192 structured config, root files \u2192 native subtrees"},{"path":"src/benchflow/compat/harbor_registry.py","role":"Harbor registry inventory and compatibility checks \u2014 load upstream registry, sparse-clone tasks, run health checks"}],"symbols":["InboundTask","HarborAdapter","TerminalBenchAdapter","detect_adapter","manifest_from_task_config","carry_native_subtrees","load_harbor_registry","check_harbor_registry"],"extra":[{"label":"Foreign formats supported","items":["Harbor (task.toml format \u2014 internalized from Harbor upstream)","Terminal-Bench (task.yaml flat YAML \u2014 backward-compatible predecessor)"]},{"label":"Foreign-to-native file remappings","items":["Dockerfile \u2192 environment/Dockerfile","solution.sh \u2192 solution/solve.sh","run-tests.sh \u2192 tests/test.sh","Dockerfile build-context sources \u2192 environment/\u003cpath\u003e"]}],"connections":["manifest","environment_plane","task","contracts"],"githubDir":"src/benchflow/adapters"},{"id":"hosted_env","title":"Hosted Environment Runner","tagline":"Run external Verifiers/PrimeIntellect environments locally","summary":"Executes external **Verifiers-hub** environments (PrimeIntellect) via `vf-eval` in an isolated venv, capturing rollout artifacts in the native contract format (`result.json`, `rewards.jsonl`, `trajectory/acp_trajectory.jsonl`, `config.json`, `timing.json`, `prompts.json`). Reconstructs native `acp_trajectory` events from vf-eval's `results.jsonl`, preserving both **Verifiers evidence** (under `hosted_env/`) and native rollout schema so dashboards and release checks treat hosted runs as first-class (with `source.type=\"hosted_env\"`).","responsibilities":["Parse and validate hosted environment references (primeintellect:owner/name@version)","Set up isolated Python venv and install Verifiers environment via uv and Prime's simple index","Construct vf-eval command with env args, sampling parameters, model normalization","Capture stdout/stderr and extract metrics (reward, tool_calls) and errors","Reconstruct ACP-style trajectory events from vf-eval results.jsonl","Write rollout-contract artifacts matching native Rollout schema with hosted lineage metadata"],"dataflow":"HostedEnvRef + model + config \u2192 (venv setup) \u2192 (vf-eval run) \u2192 (reconstruct artifacts) \u2192 rollout_dir/{result.json, trajectory/, rewards.jsonl, ...}","modules":[{"path":"src/benchflow/hosted_env.py","role":"Core hosted environment runner \u2014 ref parsing, venv setup, vf-eval invocation, artifact reconstruction"},{"path":"src/benchflow/_utils/result_metadata.py","role":"Metrics extraction helpers \u2014 final_metrics_from_agent_result, trajectory_summary_from_events"},{"path":"src/benchflow/diagnostics.py","role":"RolloutDiagnostics schema for hosted-run provenance slots"}],"symbols":["HostedEnvRef","HostedEnvRunConfig","HostedEnvRunResult","run_hosted_env","normalize_verifiers_model","prime_env_list","prime_env_info","_reconstruct_trajectory","_write_run_artifacts"],"extra":[{"label":"Hosted environment provider","items":["primeintellect (Verifiers-hub \u2014 sole supported provider)"]},{"label":"Rollout contract artifacts generated","items":["result.json (scored rollout metadata)","trajectory/acp_trajectory.jsonl (reconstructed ACP events)","rewards.jsonl (reward events matching native schema)","config.json (run configuration with hosted_env block)","timing.json (elapsed seconds)","prompts.json (unique user prompts)","hosted_env/ (forensic vf-eval evidence)"]}],"connections":["evaluation","rollout","trajectories","adapters_out","environment_plane"],"githubDir":"src/benchflow/hosted_env.py"},{"id":"adapters_out","title":"Outbound Trajectory Exporters","tagline":"Scored rollouts \u2192 trainer JSONL and framework formats","summary":"Exports scored trajectories in **Verifiers/ORS JSONL** format consumed by prime-rl, verl, and trainer endpoints. Adapts native ACP-trajectory events and reward dicts to trainer-compatible schemas (OpenAI-style messages, ORS reward response), normalizes non-finite floats, and validates JSON safety. Also bridges **Inspect AI** scenes and **ORS** reward responses so external frameworks can ingest BenchFlow evidence without coupling to the native tree. The trajectory is the architectural seam \u2014 **BenchFlow stops where the gradient starts.**","responsibilities":["Convert ACP trajectory events (user_message, agent_message, tool_call, oracle) to OpenAI chat message format","Split message sequence into (prompt, completion) at first assistant message for Verifiers convention","Adapt VerifyResult (reward + items + events) to ORS schema with JSON-safe floats and validation","Render tool_calls as assistant text blocks preserving semantic content","Fold agent_thought events into prior/following assistant message without breaking role ordering","Write per-rollout trainer/verifiers.jsonl and aggregate job-level verifiers.jsonl"],"dataflow":"(ACP events + rewards + metadata) \u2192 (adapt to message format + ORS schema) \u2192 Verifiers/ORS JSONL record","modules":[{"path":"src/benchflow/trajectories/export.py","role":"Live trainer seam \u2014 ACP-to-messages conversion, VerifyResult-to-ORS mapping, rollout/job JSONL writing"},{"path":"src/benchflow/adapters/ors.py","role":"ORS format mapper \u2014 VerifyResult-to-ORS, RewardEvent-to-ORS, JSON-safety scrubbing"},{"path":"src/benchflow/adapters/inspect_ai.py","role":"Inspect AI bridge \u2014 Scene-to-Inspect-task, Rubric metadata mapping"},{"path":"src/benchflow/_utils/json_safe.py","role":"Non-finite float scrubber (NaN/\u00b1Infinity \u2192 null)"}],"symbols":["trajectory_to_verifiers_record","acp_events_to_messages","reward_map_to_verify_result","write_rollout_v modules":[{"path":"benchmarks/CONVERT.md","role":"Benchmark conversion guide, template, and checklist for new benchmarks"},{"path":"benchmarks/harvey-lab/benchmark.yaml","role":"Descriptor for Harvey LAB (1,251 legal tasks, LLM-as-judge verification)"},{"path":"benchmarks/harvey-lab/benchflow.py","role":"Converter script that generates BenchFlow tasks from Harvey LAB JSON source"},{"path":"benchmarks/programbench/benchmark.yaml","role":"Descriptor for ProgramBench (201 code-reconstruction tasks, unit-test verifier)"},{"path":"benchmarks/harvey-lab/parity_test.py","role":"Side-by-side parity validation (original eval vs BenchFlow verifier on same output)"},{"path":"benchmarks/harvey-lab/parity_experiment.json","role":"Recorded parity results proving conversion preserves benchmark semantics"}],"symbols":["_sanitize_name","_infer_difficulty","_build_task_toml","convert_benchmark"],"extra":[{"label":"Registered Benchmarks","items":["Harvey LAB \u2014 1,251 legal tasks (analyze, draft, review, research)","ProgramBench \u2014 201 program-reconstruction (7 languages: C, Rust, Go, C++, Java, Haskell, Bash)","SkillsBench \u2014 agents-as-skills evaluation","Terminal Bench 2 \u2014 command-line task completion","SWE-bench Verified \u2014 software engineering tasks","Continual Learning Bench \u2014 continual learning scenarios","Opaque Tools Bench \u2014 black-box tool invocation","CLAWS Bench \u2014 code-understanding with LLM","HIL Bench \u2014 human-in-the-loop learning","Follow-up Bench \u2014 multi-round conversation tasks","Chi Bench \u2014 user experience / HCI tasks"]},{"label":"Verification Methods","items":["llm-as-judge (Gemini-based, per-criterion scoring)","deterministic_unit_tests (pytest, partial credit)","script-based (custom shell/Python verifiers)"]}],"connections":["docs","evaluation","reward_plane","dashboard"],"githubDir":"benchmarks"},{"id":"dashboard","title":"Status Dashboard","tagline":"Python + vanilla JS status UI, dependency-free.","summary":"A **single-page, dependency-free web dashboard** (one `index.html`, vanilla JavaScript, Python stdlib only) that mirrors real-time job artifacts (`jobs/`), test results (`junit.xml`), Linear roadmap (live API), and the authored architecture/advisories into a unified `data.json`. Serves on `http://localhost:8777` with live polling and zero-build overhead.","responsibilities":["Poll and aggregate test results from pytest junit.xml","Mirror Linear project tickets (v0.5 roadmap) with live API","Scan jobs/ folder tree (groups \u2192 runs \u2192 tasks \u2192 artifacts) with file contents embedded","Scan experiments/ and labs/ for the experiments timeline","Serve sidebar navigation (Overview, Concept map, Tickets, Tests, Jobs, Advisories, Timeline)","Refresh data.json on startup and when git working tree changes"],"dataflow":"junit.xml + jobs/ tree + Linear API + experiments/ \u2192 generate.py \u2192 data.json \u2192 serve.py + index.html","modules":[{"path":"dashboard/index.html","role":"Single-page UI \u2014 sidebar + seven views, inline CSS + vanilla JS, zero build"},{"path":"dashboard/generate.py","role":"Collects test results, job artifacts, Linear tickets, and authored data into data.json"},{"path":"dashboard/serve.py","role":"HTTP server on :8777, refreshes data.json when repo state changes, auto-opens browser"},{"path":"dashboard/roadmap.py","role":"Fetches and normalizes Linear project data (tickets, statuses, custom fields)"},{"path":"dashboard/daytona_status.py","role":"Live Daytona sandbox status panel (list active instances, count by state, age)"},{"path":"dashboard/jobs_visibility.py","role":"Visibility decision logic for runs/artifacts (public, gated, redacted)"}],"symbols":["resolve_dashboard_jobs_root","collect_roadmap","collect_architecture","snapshot","RunVisibilityContext"],"extra":[{"label":"Dashboard Sections","items":["Overview \u2014 headline stats (tests, capabilities, roadmap, artifacts, experiments)","Concept map \u2014 architecture diagram (kernel, four planes, tree-native execution)","Tickets \u2014 Linear v0.5 project (ticket list + detail view, read-only)","Tests \u2014 live pytest suite results (suite by suite)","Jobs \u2014 rollout artifacts tree (group \u2192 run \u2192 task \u2192 artifacts with inline file contents)","Advisories \u2014 agent review punch lists (cross-linked to capability and job group)","Timeline \u2014 v0.5 experiments (experiments/ + labs/, newest first, fully expandable)"]}],"connections":["tests","evaluation"],"githubDir":"dashboard"},{"id":"labs","title":"Security Validation Labs","tagline":"Proof-of-concept and multi-benchmark security audits.","summary":"**Two research labs** proving the sandbox hardening security story. `benchjack-sandbox-hardening/` is an end-to-end demo blocking three BenchJack exploits (conftest-hook, answer-lookup, pth-injection) against real task definitions. `reward-hack-matrix/` sweeps **666 real tasks** across three production benchmarks under benchwflow 0.2.0 (unhardeneded) vs 0.2.2 (hardened) to quantify exploit prevalence reduction (from 32.6% down to 0.15%).","responsibilities":["Demonstrate BenchJack exploit patterns end-to-end (P1, P2, P7 in hardened environment)","Sweep real benchmark tasks comparing unhardeneded vs hardened verifier behavior","Validate that path lockdown, workspace restore, and pre-verify scrub block known attacks","Produce recorded results proving hardening effectiveness on production benchmarks","Document the threat model and explain out-of-scope verifier-code-quality issues (P3\u2013P6)"],"dataflow":"BenchJack attack patterns + real benchmark tasks \u2192 oracle agent with exploit payloads \u2192 SDK().run() on both versions \u2192 comparative reward analysis","modules":[{"path":"labs/benchjack-sandbox-hardening/README.md","role":"Demo documentation: attack model, pattern registry, three exploits with solution/solve.sh payloads"},{"path":"labs/benchjack-sandbox-hardening/run_comparison.py","role":"End-to-end harness: runs P1/P2/P7 against 0.2.0 vs HEAD, displays blocked/exploited"},{"path":"labs/benchjack-sandbox-hardening/_attack_runner.py","role":"Executes a single attack pattern (conftest hook, answer lookup, or pth injection)"},{"path":"labs/reward-hack-matrix/README.md","role":"Bulk validation: 666 tasks across skillsbench, swebench-verified, terminal-bench-2"},{"path":"labs/reward-hack-matrix/run_matrix.py","role":"Sweep driver (Daytona concurrency 64, 1332 trials, json results)"},{"path":"labs/reward-hack-matrix/sweep_0.2.0_vs_0.2.2.json","role":"Full per-cell results: task \u00d7 version \u00d7 exploit_success breakdown"}],"symbols":["run_comparison","_attack_runner","P1_conftest_hook","P2_answer_lookup","P7_pth_injection","run_matrix"],"extra":[{"label":"BenchJack Patterns","items":["P1 (conftest-hook) \u2014 pytest hook rewriting test bodies to no-ops \u2192 0.2.1+ BLOCKED","P2 (answer-lookup) \u2014 reading locked /solution/ answer key \u2192 0.2.1+ BLOCKED","P3 (eval-injection) \u2014 verifier calls eval() on agent output \u2192 out of scope","P4 (llm-judge-injection) \u2014 prompt injection into judge via unsanitized output \u2192 out of scope","P5 (weak-string-match) \u2014 substring match lets wrong answers pass \u2192 out of scope","P6 (trivial-verifier) \u2014 verifier always returns 1.0 \u2192 out of scope","P7 (pth-injection) \u2014 .pth file forces exit 0 via atexit \u2192 0.2.2+ BLOCKED"]},{"label":"Defense Mechanisms","items":["sandbox_user='agent' default \u2014 oracle/agent runs as non-root","path lockdown \u2014 chown root + chmod 700 on /tests and /solution","build-config snapshot/restore \u2014 setup.py, pyproject.toml snapshotted before agent","full workspace restore \u2014 /testbed_verify canonical copy, dirs_exist_ok merge","pre-verify scrub (CLEANUP_CMD) \u2014 find/delete conftest.py, .pth, sitecustomize.py","VERIFIER_ENV re-pin \u2014 hardened PYTEST_ADDOPTS, PYTHONPATH, PYTHONDONTWRITEBYTECODE"]}],"connections":["sandbox","reward_plane","evaluation","docs"],"githubDir":"labs"},{"id":"tests","title":"Test Suite","tagline":"Unit, integration, conformance, and fixture suite.","summary":"**182 test modules** organized into six categories: unit tests (core logic), conformance proofs (ACP agent smoke test), environment tests (sandbox, state management), integration tests (full rollout lifecycle), fixture libraries (mocked agents, tasks, environments), and trajectory tests (recorded agent traces). Conformance gate blocks releases until every registered agent passes the ACP smoke task against oracle.","responsibilities":["Unit-test core kernel (rollout, reward, trajectory, sandbox, agent, environment)","Conformance-prove every ACP agent (smoke test: single tool call \u2192 reward = 1)","Integration-test full rollout lifecycle (setup \u2192 execute \u2192 verify \u2192 teardown)","Validate environment-plane contracts (snapshot, restore, provision, readiness)","Fixture-provide mocked agents, tasks, and environments for test reuse","Trajectory-ingest and replay recorded agent traces for regresssion"],"dataflow":"Code changes \u2192 pytest suite \u2192 junit.xml \u2192 dashboard test results","modules":[{"path":"tests/conformance/acp_smoke","role":"Minimal deterministic task (ACP handshake, tool call, file write, terminal reward)"},{"path":"tests/conformance/run_conformance.py","role":"Orchestrator: runs smoke task against every registered agent, gates release"},{"path":"tests/conformance/README.md","role":"Release gate for v0.3: every agent must pass or be removed"},{"path":"tests/integration","role":"Full-lifecycle rollouts (setup, execute, verify, cleanup, tree branching)"},{"path":"tests/environment","role":"Sandbox contracts (exec, upload, snapshot, restore, teardown)"},{"path":"tests/fixtures","role":"Reusable mocks: MockTask, MockAgent, MockSandbox, MockEnvironment"},{"path":"tests/trajectories","role":"Recorded agent traces and trace-to-task conversion"}],"symbols":["test_acp","test_sandbox_hardening","test_rollout_bra <script>
/* ============================================================

  {row:4,label:"Plane internals"},{row:5,label:"Data, telemetry & cost"},
  {row:6,label:"Skills, memory & continual learning"},{row:7,label:"The edges — inbound / outbound"},
  {row:8,label:"Surrounding app & research assets"},

const LAYOUT = {

  contracts:{plane:"kernel",icon:"🔌",col:-0.15,row:1}, rollout:{plane:"kernel",icon:"🎬",col:1.25,row:1,hero:true}, evaluation:{plane:"kernel",icon:"📦",col:2.75,row:1},
  scenes_user:{plane:"kernel",icon:"🎭",col:0.45,row:2}, tree:{plane:"kernel",icon:"🌳",col:1.9,row:2},
  agent_plane:{plane:"agent",icon:"🤖",col:-0.1,row:3}, sandbox:{plane:"sandbox",icon:"📦",col:1.25,row:3}, environment_plane:{plane:"environment",icon:"🌐",col:2.6,row:3}, reward_plane:{plane:"reward",icon:"🎯",col:3.95,row:3},
  acp:{plane:"agent",icon:"🔗",col:-0.1,row:4}, hardening:{plane:"sandbox",icon:"🛡️",col:1.25,row:4}, task:{plane:"kernel",icon:"📋",col:2.6,row:4}, reward_internals:{plane:"reward",icon:"⚖️",col:3.95,row:4},
  providers:{plane:"data",icon:"🔀",col:-0.1,row:5}, usage:{plane:"data",icon:"💰",col:1.1,row:5}, trajectories:{plane:"data",icon:"📈",col:2.3,row:5}, traces:{plane:"data",icon:"🧬",col:3.5,row:5},
  skills:{plane:"skills",icon:"🧠",col:0.05,row:6}, skill_eval:{plane:"skills",icon:"📊",col:1.4,row:6}, self_gen:{plane:"skills",icon:"✨",col:2.75,row:6}, learner:{plane:"skills",icon:"🔄",col:4.05,row:6},
  adapters_in:{plane:"edges",icon:"📥",col:0.4,row:7}, hosted_env:{plane:"edges",icon:"☁️",col:1.75,row:7}, adapters_out:{plane:"edges",icon:"📤",col:3.1,row:7}, trainers:{plane:"edges",icon:"⚙️",col:4.45,row:7,ghost:true,badge:"out of scope"},
  benchmarks:{plane:"surround",icon:"🏁",col:-0.15,row:8,badge:"repo"}, dashboard:{plane:"surround",icon:"📺",col:1.0,row:8,badge:"repo"}, labs:{plane:"surround",icon:"🔬",col:2.15,row:8,badge:"repo"}, tests:{plane:"surround",icon:"✅",col:3.3,row:8,badge:"repo"}, docs:{plane:"surround",icon:"📚",col:4.4,row:8,badge:"repo"},
};
const REPO="https://github.com/benchflow-ai/benchflow/tree/main/";

const ARCH_DATA = JSON.parse(document.getElementById('arch-data').textContent);
const NODES = ARCH_DATA.nodes.filter(n=>LAYOUT[n.id]).map(n=>{
  const L=LAYOUT[n.id];
  return Object.assign({}, n, {plane:L.plane, icon:L.icon, col:L.col, row:L.row, hero:!!L.hero, ghost:!!L.ghost, badge:n.badge||L.badge});
});
const EDGES = (ARCH_DATA.edges||[]).filter(e=>LAYOUT[e.from]&&LAYOUT[e.to]);
const TOURS = {}; (ARCH_DATA.tours||[]).forEach(t=>{ TOURS[t.id]={label:t.label, nodes:(t.nodes||[]).filter(id=>LAYOUT[id])}; });

/* ---------- layout + render ---------- */
const COL_W=305, ROW_H=300, MARGIN_X=70, MARGIN_Y=64;
const world=document.getElementById('world'), edgesSvg=document.getElementById('edges'), canvas=document.getElementById('canvas');
const nodeById={}, nodeEls={};
function planeColor(p){return (PLANES[p]||PLANES.kernel).color;}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function md(s){ s=esc(s); s=s.replace(/\*\*([^*]+?)\*\*/g,'<strong>$1</strong>'); s=s.replace(/`([^`]+?)`/g,'<code>$1</code>'); return s; }

NODES.forEach(n=>{ n.x=MARGIN_X+n.col*COL_W; n.y=MARGIN_Y+n.row*ROW_H; nodeById[n.id]=n; });
BANDS.forEach(b=>{ const el=document.createElement('div'); el.className='band-label'; el.textContent=b.label;
  el.style.left=(MARGIN_X-46)+'px'; el.style.top=(MARGIN_Y+b.row*ROW_H-30)+'px'; world.appendChild(el); });

NODES.forEach(n=>{
  const el=document.createElement('div');
  el.className='node'+(n.hero?' hero':'')+(n.ghost?' ghost':'');
  el.style.left=n.x+'px'; el.style.top=n.y+'px'; el.style.setProperty('--accent',planeColor(n.plane)); el.dataset.id=n.id;
  const mods=(n.modules||[]).slice(0,3).map(m=>`<code title="${esc(m.path)} — ${esc(m.role)}">${esc(m.path)}</code>`).join('');
  const more=(n.modules||[]).length>3?`<div class="n-more">+${n.modules.length-3} more · click to open</div>`:(n.ghost?'':`<div class="n-more">click to open</div>`);
  el.innerHTML=`<div class="n-head"><div class="n-ico">${n.icon}</div>
      <div style="min-width:0"><div class="n-title">${esc(n.title)}</div><div class="n-tag">${esc(n.tagline)}</div></div>
      ${n.badge?`<span class="n-badge">${esc(n.badge)}</span>`:''}</div>
    ${n.ghost?`<div class="n-hero-note">${md(n.summary)}</div>`:`<div class="n-mods">${mods}</div>${more}`}`;
  world.appendChild(el); nodeEls[n.id]=el;
});

const sizes={};
NODES.forEach(n=>{ sizes[n.id]={w:nodeEls[n.id].offsetWidth,h:nodeEls[n.id].offsetHeight}; });
let contentW=0, contentH=0;
NODES.forEach(n=>{ contentW=Math.max(contentW,n.x+sizes[n.id].w); contentH=Math.max(contentH,n.y+sizes[n.id].h); });
contentW+=MARGIN_X; contentH+=MARGIN_Y;
edgesSvg.setAttribute('width',contentW); edgesSvg.setAttribute('height',contentH); edgesSvg.setAttribute('viewBox',`0 0 ${contentW} ${contentH}`);

const edgePaths=[];
EDGES.forEach(e=>{
  const na=nodeById[e.from], nb=nodeById[e.to]; if(!na||!nb) return;
  const sa=sizes[e.from], sb=sizes[e.to];
  let x1,y1,x2,y2;
  if(nb.y>=na.y){ x1=na.x+sa.w/2; y1=na.y+sa.h; x2=nb.x+sb.w/2; y2=nb.y; }
  else { x1=na.x+sa.w/2; y1=na.y; x2=nb.x+sb.w/2; y2=nb.y+sb.h; }
  const dir=(y2>=y1)?1:-1, c=Math.max(34,Math.abs(y2-y1)*0.45);
  const d=`M ${x1} ${y1} C ${x1} ${y1+dir*c}, ${x2} ${y2-dir*c}, ${x2} ${y2}`;
  const path=document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d',d); path.setAttribute('class','edge'+(e.dep?' dep':'')); path.setAttribute('marker-end','url(#ah)');
  path.dataset.a=e.from; path.dataset.b=e.to; edgesSvg.appendChild(path);
  let labelEl=null;
  if(e.label){ labelEl=document.createElementNS('http://www.w3.org/2000/svg','text');
    labelEl.setAttribute('class','elabel'); labelEl.setAttribute('x',(x1+x2)/2); labelEl.setAttribute('y',(y1+y2)/2-3);
    labelEl.setAttribute('text-anchor','middle'); labelEl.textContent=e.label; edgesSvg.appendChild(labelEl); }
  edgePaths.push({a:e.from,b:e.to,el:path,label:labelEl});
});

/* ---------- pan / zoom ---------- */
let tx=0,ty=0,k=1; const MINK=0.18,MAXK=2.6;
function apply(){ world.style.transform=`translate(${tx}px,${ty}px) scale(${k})`; document.getElementById('zlevel').textContent=Math.round(k*100)+'%'; }
function clampK(v){return Math.max(MINK,Math.min(MAXK,v));}
function fit(animate){
  stopAnim();
  const r=canvas.getBoundingClientRect(), pad=70;
  if(!contentW||!contentH){tx=20;ty=20;k=1;apply();return;}
  const nk=clampK(Math.min((r.width-pad*2)/contentW,(r.height-pad*2)/contentH,1));
  const ntx=(r.width-contentW*nk)/2, nty=Math.max(18,(r.height-contentH*nk)/2);
  if(animate) animateTo(ntx,nty,nk); else {tx=ntx;ty=nty;k=nk;apply();}
}
function home(animate){
  stopAnim();
  const r=canvas.getBoundingClientRect();
  if(!contentW){tx=20;ty=26;k=1;apply();return;}
  const nk=clampK(Math.min(Math.max((r.width-40)/contentW,0.5),0.92));
  const ntx=(r.width-contentW*nk)/2, nty=26;
  if(animate) animateTo(ntx,nty,nk); else {tx=ntx;ty=nty;k=nk;apply();}
}
function zoomAt(px,py,factor){ stopAnim(); const nk=clampK(k*factor); if(nk===k)return; const wx=(px-tx)/k,wy=(py-ty)/k; k=nk; tx=px-wx*k; ty=py-wy*k; apply(); }
let anim=null;
function stopAnim(){ if(anim){cancelAnimationFrame(anim);anim=null;} }
function animateTo(ntx,nty,nk){
  if(anim)cancelAnimationFrame(anim);
  const sx=tx,sy=ty,sk=k,dur=460,t0=performance.now(), ease=t=>t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
  (function step(now){ let t=Math.min(1,(now-t0)/dur),e=ease(t); tx=sx+(ntx-sx)*e; ty=sy+(nty-sy)*e; k=sk+(nk-sk)*e; apply(); if(t<1)anim=requestAnimationFrame(step); else anim=null; })(t0);
}
function focusNode(id,zoom){
  const n=nodeById[id]; if(!n)return; const s=sizes[id], r=canvas.getBoundingClientRect();
  const nk=clampK(zoom||1.05), cx=n.x+s.w/2, cy=n.y+s.h/2;
  const panelW=panel.classList.contains('open')?Math.min(438,r.width*0.92):0;
  animateTo((r.width-panelW)/2-cx*nk, r.height/2-cy*nk, nk);
}
function frameNodes(ids){
  if(!ids.length)return;
  let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;
  ids.forEach(id=>{const n=nodeById[id],s=sizes[id];if(!n)return;minX=Math.min(minX,n.x);minY=Math.min(minY,n.y);maxX=Math.max(maxX,n.x+s.w);maxY=Math.max(maxY,n.y+s.h);});
  const r=canvas.getBoundingClientRect(),pad=60,bw=maxX-minX,bh=maxY-minY;
  const nk=clampK(Math.min((r.width-pad*2)/bw,(r.height-pad*2)/bh,1.25));
  animateTo((r.width-bw*nk)/2-minX*nk,(r.height-bh*nk)/2-minY*nk,nk);
}
canvas.addEventListener('wheel',e=>{ e.preventDefault(); const r=canvas.getBoundingClientRect(); zoomAt(e.clientX-r.left,e.clientY-r.top,Math.exp(-e.deltaY*0.0016)); },{passive:false});
let down=false,moved=false,sx0=0,sy0=0,stx=0,sty=0,downId=null;
canvas.addEventListener('pointerdown',e=>{ if(e.button!==0)return; stopAnim(); down=true;moved=false;sx0=e.clientX;sy0=e.clientY;stx=tx;sty=ty;
  const nd=e.target.closest('.node'); downId=nd?nd.dataset.id:null; canvas.setPointerCapture(e.pointerId); canvas.classList.add('grabbing'); hideHint(); });
canvas.addEventListener('pointermove',e=>{ if(!down)return; const dx=e.clientX-sx0,dy=e.clientY-sy0; if(!moved&&Math.hypot(dx,dy)>4)moved=true; if(moved){tx=stx+dx;ty=sty+dy;apply();} });
canvas.addEventListener('pointerup',e=>{ canvas.classList.remove('grabbing'); if(down&&!moved){ if(downId)selectNode(downId,false); else clearSelection(); } down=false; downId=null; });
canvas.addEventListener('dblclick',e=>{ const nd=e.target.closest('.node'); if(nd)selectNode(nd.dataset.id,true); });

/* ---------- selection + panel ---------- */
const panel=document.getElementById('panel');
let selected=null, activeTour=null;
function setEdgeStates(ids,opts){
  const set=ids?new Set(ids):null;
  edgePaths.forEach(({a,b,el,label})=>{
    el.classList.remove('active','dim'); if(label)label.classList.remove('active');
    if(!set)return;
    const inA=set.has(a),inB=set.has(b), hit=(opts&&opts.both)?(inA&&inB):(inA||inB);
    if(hit){el.classList.add('active');el.setAttribute('marker-end','url(#ah-a)');if(label)label.classList.add('active');}
    else{el.classList.add('dim');el.setAttribute('marker-end','url(#ah)');}
  });
}
function resetEdgeStates(){ edgePaths.forEach(({el,label})=>{el.classList.remove('active','dim');el.setAttribute('marker-end','url(#ah)');if(label)label.classList.remove('active');}); }
function selectNode(id,doZoom){
  const n=nodeById[id]; if(!n)return; clearTour(); selected=id;
  Object.values(nodeEls).forEach(el=>el.classList.remove('selected','dim','match'));
  nodeEls[id].classList.add('selected');
  const neigh=new Set([id]); EDGES.forEach(e=>{ if(e.from===id)neigh.add(e.to); if(e.to===id)neigh.add(e.from); });
  Object.keys(nodeEls).forEach(k2=>{ if(!neigh.has(k2)) nodeEls[k2].classList.add('dim'); });
  setEdgeStates([id]); renderPanel(n);
  panel.classList.add('open'); panel.setAttribute('aria-hidden','false');
  if(doZoom) focusNode(id,Math.max(k,0.9));
}
function clearSelection(){ selected=null; Object.values(nodeEls).forEach(el=>el.classList.remove('selected','dim','match')); resetEdgeStates(); panel.classList.remove('open'); panel.setAttribute('aria-hidden','true'); }
function renderPanel(n){
  const accent=planeColor(n.plane);
  document.getElementById('pHead').style.setProperty('--accent',accent);
  document.getElementById('pChip').style.setProperty('--accent',accent);
  document.getElementById('pChipText').textContent=(PLANES[n.plane]||{}).name||'';
  const ico=document.getElementById('pIco'); ico.textContent=n.icon; ico.style.setProperty('--accent',accent);
  document.getElementById('pTitle').textContent=n.title;
  document.getElementById('pTag').textContent=n.tagline;
  document.getElementById('pFocus').onclick=()=>focusNode(n.id,1.15);
  const src=document.getElementById('pSrc');
  if(n.githubDir){ src.style.display='inline-flex'; src.href=REPO+n.githubDir; src.style.setProperty('--accent',accent); }
  else src.style.display='none';

  let html=`<p class="p-summary">${md(n.summary)}</p>`;
  if(n.dataflow){ const f=esc(n.dataflow).replace(/-&gt;|→/g,'<span class="arr">→</span>'); html+=`<div class="p-sec"><h3>Data flow</h3><div class="dataflow">${f}</div></div>`; }
  if(n.responsibilities&&n.responsibilities.length){ html+=`<div class="p-sec"><h3>Responsibilities</h3><ul class="resp">`+n.responsibilities.map(r=>`<li>${md(r)}</li>`).join('')+`</ul></div>`; }
  if(n.modules&&n.modules.length){ html+=`<div class="p-sec"><h3>Key modules</h3>`+n.modules.map(m=>`<div class="mod"><code>${esc(m.path)}</code><span>${esc(m.role)}</span></div>`).join('')+`</div>`; }
  if(n.symbols&&n.symbols.length){ html+=`<div class="p-sec"><h3>Key types &amp; functions</h3><div class="syms">`+n.symbols.map(s=>`<span class="sym">${esc(s)}</span>`).join('')+`</div></div>`; }
  (n.extra||[]).forEach(x=>{ html+=`<div class="p-sec"><h3>${esc(x.label)}</h3><div class="pills">`+x.items.map(it=>`<span class="pill">${esc(it)}</span>`).join('')+`</div></div>`; });
  const conns=(n.connections||[]).filter(c=>nodeById[c]);
  if(conns.length){ html+=`<div class="p-sec"><h3>Connections</h3><div class="conns">`+conns.map(c=>{const t=nodeById[c];return `<span class="conn" data-goto="${c}"><span class="sw" style="background:${planeColor(t.plane)}"></span>${esc(t.title)}</span>`;}).join('')+`</div></div>`; }
  const body=document.getElementById('pBody'); body.innerHTML=html; body.scrollTop=0;
  body.querySelectorAll('.conn').forEach(c=>c.onclick=()=>{ selectNode(c.dataset.goto,false); focusNode(c.dataset.goto,Math.max(k,0.85)); });
}
document.getElementById('pClose').onclick=clearSelection;

/* ---------- guided tours (dynamic) ---------- */
const toursEl=document.getElementById('tours');
function clearTour(){ activeTour=null; document.querySelectorAll('.tour').forEach(b=>b.classList.remove('on')); }
function runTour(id,btn){
  if(activeTour===id){ clearTour(); Object.values(nodeEls).forEach(el=>el.classList.remove('dim')); resetEdgeStates(); return; }
  clearSelection(); clearTour(); activeTour=id; btn.classList.add('on');
  const set=new Set(TOURS[id].nodes);
  Object.keys(nodeEls).forEach(k2=>nodeEls[k2].classList.toggle('dim',!set.has(k2)));
  setEdgeStates([...set],{both:true}); frameNodes([...set]);
}
Object.entries(TOURS).forEach(([id,t])=>{ const b=document.createElement('button'); b.className='tour'; b.dataset.tour=id;
  b.innerHTML=`<span class="dot"></span>${esc(t.label)}`; b.onclick=()=>runTour(id,b); toursEl.appendChild(b); });

/* ---------- search ---------- */
const searchInput=document.getElementById('search'), searchClr=document.getElementById('searchClr');
function runSearch(q){
  q=q.trim().toLowerCase(); searchClr.style.display=q?'block':'none';
  if(!q){ Object.values(nodeEls).forEach(el=>el.classList.remove('match','dim')); if(!selected&&!activeTour)resetEdgeStates(); return; }
  clearTour();
  NODES.forEach(n=>{
    const hay=(n.title+' '+n.tagline+' '+n.summary+' '+(n.symbols||[]).join(' ')+' '+(n.responsibilities||[]).join(' ')+' '+(n.modules||[]).map(m=>m.path+' '+m.role).join(' ')+' '+((PLANES[n.plane]||{}).name||'')).toLowerCase();
    const hit=hay.includes(q); nodeEls[n.id].classList.toggle('match',hit); nodeEls[n.id].classList.toggle('dim',!hit);
  });
  const matches=NODES.filter(n=>nodeEls[n.id].classList.contains('match')).map(n=>n.id);
  if(matches.length&&q.length>1)frameNodes(matches);
}
searchInput.addEventListener('input',e=>runSearch(e.target.value));
searchInput.addEventListener('keydown',e=>{ if(e.key==='Enter'){const m=NODES.find(n=>nodeEls[n.id].classList.contains('match')); if(m)selectNode(m.id,true);} if(e.key==='Escape'){searchInput.value='';runSearch('');} });
searchClr.onclick=()=>{searchInput.value='';runSearch('');searchInput.focus();};

/* ---------- legend ---------- */
const legendBox=document.getElementById('legendBox');
document.getElementById('legToggle').onclick=()=>legendBox.classList.toggle('collapsed');
const legend=document.getElementById('legend');
Object.entries(PLANES).forEach(([key,p])=>{
  if(!NODES.some(n=>n.plane===key))return;
  const el=document.createElement('div'); el.className='leg'; el.innerHTML=`<span class="sw" style="background:${p.color}"></span>${p.name}`;
  el.onclick=()=>{ clearSelection(); const set=new Set(NODES.filter(n=>n.plane===key).map(n=>n.id)); if(!set.size)return;
    Object.keys(nodeEls).forEach(k2=>nodeEls[k2].classList.toggle('dim',!set.has(k2))); setEdgeStates([...set],{both:true}); frameNodes([...set]); };
  legend.appendChild(el);
});

/* ---------- controls + theme ---------- */
document.getElementById('zin').onclick=()=>{const r=canvas.getBoundingClientRect();zoomAt(r.width/2,r.height/2,1.25);};
document.getElementById('zout').onclick=()=>{const r=canvas.getBoundingClientRect();zoomAt(r.width/2,r.height/2,0.8);};
document.getElementById('zfit').onclick=()=>{clearSelection();clearTour();Object.values(nodeEls).forEach(el=>el.classList.remove('dim'));fit(true);};
const themeBtn=document.getElementById('themeBtn');
function setTheme(t){ document.documentElement.setAttribute('data-theme',t); try{localStorage.setItem('bf-theme',t);}catch(e){} }
themeBtn.onclick=()=>setTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');
try{const s=localStorage.getItem('bf-theme'); if(s)setTheme(s); else if(matchMedia('(prefers-color-scheme:dark)').matches)setTheme('dark');}catch(e){}
function hideHint(){const h=document.getElementById('hint');if(h){h.style.opacity='0';setTimeout(()=>h.style.display='none',400);}}
setTimeout(hideHint,6500);
window.addEventListener('keydown',e=>{ if(e.key==='Escape'){clearSelection();clearTour();Object.values(nodeEls).forEach(el=>el.classList.remove('dim','match'));}
  if(e.key==='/'&&document.activeElement!==searchInput){e.preventDefault();searchInput.focus();}
  if(e.key==='f'&&document.activeElement!==searchInput){document.getElementById('zfit').click();} });
let rT; window.addEventListener('resize',()=>{clearTimeout(rT);rT=setTimeout(()=>{ if(!selected&&!activeTour)home(false); },180);});

home(false);
</script>
</body>
</html>
