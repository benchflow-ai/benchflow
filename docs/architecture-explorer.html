<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>BenchFlow · Interactive Architecture</title>
<meta name="description" content="An interactive, zoomable map of the BenchFlow architecture — the environment-and-rollout engine for agentic RL." />
<style>
  :root{
    --bg:#f6f7f9; --bg-2:#eef0f3; --panel:#ffffff; --ink:#0b1020; --ink-2:#3b4252;
    --muted:#6b7280; --line:#e2e5ea; --line-2:#d4d8df; --code-bg:#f1f3f6;
    --shadow:0 1px 2px rgba(16,24,40,.06),0 8px 24px rgba(16,24,40,.08);
    --shadow-lg:0 12px 40px rgba(16,24,40,.18);
    --ring:rgba(79,70,229,.35); --grid:rgba(11,16,32,.05);
    --c-entry:#64748b; --c-kernel:#4f46e5; --c-agent:#7c3aed; --c-sandbox:#0d9488;
    --c-environment:#d97706; --c-reward:#e11d48; --c-data:#0891b2; --c-skills:#65a30d;
    --c-edges:#db2777; --c-surround:#64748b;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,"Apple Color Emoji","Segoe UI Emoji",sans-serif;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace;
  }
  html[data-theme="dark"]{
    --bg:#0a0d16; --bg-2:#0f1320; --panel:#121726; --ink:#eef1f7; --ink-2:#c2c8d6;
    --muted:#8b93a7; --line:#222838; --line-2:#2c3346; --code-bg:#171d2e;
    --shadow:0 1px 2px rgba(0,0,0,.4),0 10px 30px rgba(0,0,0,.45);
    --shadow-lg:0 16px 50px rgba(0,0,0,.6); --ring:rgba(129,140,248,.5); --grid:rgba(255,255,255,.045);
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font-family:var(--font);color:var(--ink);background:var(--bg);
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;display:flex;flex-direction:column;overflow:hidden}
  ::selection{background:rgba(124,58,237,.22)}

  header.app{flex:0 0 auto;display:flex;align-items:center;gap:18px;padding:12px 20px;
    background:var(--panel);border-bottom:1px solid var(--line);z-index:30;position:relative}
  .brand{display:flex;align-items:center;gap:12px;min-width:0}
  .logo{width:34px;height:34px;border-radius:9px;flex:0 0 auto;
    background:conic-gradient(from 210deg,#4f46e5,#7c3aed,#0d9488,#d97706,#e11d48,#4f46e5);
    box-shadow:0 2px 10px rgba(79,70,229,.4);position:relative}
  .logo::after{content:"";position:absolute;inset:6px;border-radius:5px;background:var(--panel)}
  .logo::before{content:"";position:absolute;inset:12px;border-radius:50%;
    background:conic-gradient(from 30deg,#4f46e5,#7c3aed,#0d9488,#d97706,#e11d48,#4f46e5);z-index:1}
  .titles h1{font-size:15px;margin:0;line-height:1.15;font-weight:700;letter-spacing:-.01em}
  .titles p{font-size:11.5px;margin:1px 0 0;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .titles b{color:var(--c-kernel);font-weight:600}
  .modes{display:flex;gap:6px;margin-left:4px}
  .mode{font-size:11px;font-weight:600;color:var(--ink-2);background:var(--bg-2);
    border:1px solid var(--line);border-radius:999px;padding:3px 10px;white-space:nowrap}
  .mode i{font-style:normal;color:var(--c-kernel)}
  .spacer{flex:1 1 auto}
  .search{position:relative;display:flex;align-items:center}
  .search input{width:210px;max-width:32vw;font-family:var(--font);font-size:13px;color:var(--ink);
    background:var(--bg-2);border:1px solid var(--line);border-radius:9px;padding:7px 30px 7px 31px;outline:none}
  .search input:focus{border-color:var(--ring);box-shadow:0 0 0 3px var(--ring)}
  .search svg{position:absolute;left:9px;width:15px;height:15px;color:var(--muted);pointer-events:none}
  .search .clr{position:absolute;right:7px;width:17px;height:17px;border:none;background:none;color:var(--muted);
    cursor:pointer;display:none;font-size:15px;line-height:1;border-radius:4px}
  .search .clr:hover{color:var(--ink)}
  .hbtns{display:flex;gap:6px}
  .iconbtn{width:34px;height:34px;display:inline-flex;align-items:center;justify-content:center;
    border:1px solid var(--line);background:var(--bg-2);border-radius:9px;cursor:pointer;color:var(--ink-2);font-size:15px;transition:.15s}
  .iconbtn:hover{background:var(--panel);color:var(--ink);border-color:var(--line-2)}
  .iconbtn svg{width:16px;height:16px}

  .tours{flex:0 0 auto;display:flex;align-items:center;gap:8px;padding:8px 20px;
    background:var(--panel);border-bottom:1px solid var(--line);overflow-x:auto;z-index:20}
  .tours .lbl{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);flex:0 0 auto;margin-right:2px}
  .tour{flex:0 0 auto;font-size:12.5px;font-weight:500;color:var(--ink-2);background:var(--bg-2);
    border:1px solid var(--line);border-radius:8px;padding:5px 11px;cursor:pointer;white-space:nowrap;transition:.15s;
    display:inline-flex;align-items:center;gap:6px}
  .tour:hover{color:var(--ink);border-color:var(--line-2)}
  .tour.on{background:var(--c-kernel);color:#fff;border-color:transparent;box-shadow:0 2px 10px var(--ring)}
  .tour .dot{width:7px;height:7px;border-radius:50%;background:currentColor;opacity:.85}

  .stage{flex:1 1 auto;position:relative;overflow:hidden;min-height:0}
  #canvas{position:absolute;inset:0;cursor:grab;
    background:radial-gradient(circle at 1px 1px,var(--grid) 1.4px,transparent 0) 0 0/26px 26px,linear-gradient(var(--bg),var(--bg-2));
    touch-action:none}
  #canvas.grabbing{cursor:grabbing}
  #world{position:absolute;left:0;top:0;transform-origin:0 0;will-change:transform}
  #edges{position:absolute;left:0;top:0;overflow:visible;pointer-events:none}
  .edge{fill:none;stroke:var(--line-2);stroke-width:1.6;opacity:.55;transition:stroke .2s,opacity .2s,stroke-width .2s}
  .edge.dep{stroke-dasharray:5 5}
  .edge.active{stroke:var(--c-kernel);opacity:.95;stroke-width:2.4}
  .edge.dim{opacity:.07}
  .ehead{fill:var(--line-2);opacity:.55;transition:.2s}
  .ehead.active{fill:var(--c-kernel);opacity:.95}
  .elabel{font-family:var(--font);font-size:10px;font-weight:600;fill:var(--muted);opacity:0;transition:opacity .2s}
  .elabel.active{opacity:.9}

  .node{position:absolute;width:250px;background:var(--panel);border:1px solid var(--line);
    border-radius:14px;box-shadow:var(--shadow);padding:13px 14px 12px;cursor:pointer;
    transition:transform .16s ease,box-shadow .16s ease,border-color .16s,opacity .2s;--accent:var(--c-kernel)}
  .node::before{content:"";position:absolute;left:0;top:14px;bottom:14px;width:3.5px;border-radius:3px;background:var(--accent)}
  .node:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:var(--accent)}
  .node.selected{border-color:var(--accent);box-shadow:0 0 0 3px var(--ring),var(--shadow-lg)}
  .node.dim{opacity:.28;filter:saturate(.5)}
  .node.match{box-shadow:0 0 0 3px rgba(217,119,6,.5),var(--shadow)}
  .node.hero{width:266px}
  .node.ghost{border-style:dashed;background:transparent;box-shadow:none;opacity:.8}
  .node.ghost::before{opacity:.5}
  .n-head{display:flex;align-items:center;gap:9px;margin-bottom:5px}
  .n-ico{width:27px;height:27px;flex:0 0 auto;border-radius:8px;display:grid;place-items:center;font-size:15px;
    background:color-mix(in srgb,var(--accent) 15%,transparent)}
  .n-title{font-size:13.5px;font-weight:700;letter-spacing:-.01em;line-height:1.15;min-width:0}
  .n-tag{font-size:11px;color:var(--accent);font-weight:600;margin-top:1px;line-height:1.2}
  .n-badge{margin-left:auto;font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
    color:var(--muted);border:1px solid var(--line);border-radius:5px;padding:2px 5px;flex:0 0 auto}
  .n-mods{margin-top:8px;display:flex;flex-direction:column;gap:2px}
  .n-mods code{font-family:var(--mono);font-size:10.5px;color:var(--ink-2);background:var(--code-bg);
    border-radius:5px;padding:2px 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
  .n-more{font-size:10.5px;color:var(--muted);margin-top:5px;font-weight:600}
  .n-hero-note{font-size:11px;color:var(--muted);margin-top:7px;line-height:1.35}
  .band-label{position:absolute;font-size:11px;font-weight:800;letter-spacing:.13em;text-transform:uppercase;
    color:var(--muted);opacity:.7;white-space:nowrap;pointer-events:none;display:flex;align-items:center;gap:8px}
  .band-label::after{content:"";height:1px;width:46px;background:var(--line-2)}

  .panel{position:absolute;top:0;right:0;height:100%;width:438px;max-width:92vw;background:var(--panel);
    border-left:1px solid var(--line);box-shadow:-12px 0 40px rgba(16,24,40,.10);
    transform:translateX(102%);transition:transform .34s cubic-bezier(.4,0,.15,1);z-index:40;display:flex;flex-direction:column}
  .panel.open{transform:translateX(0)}
  .p-head{flex:0 0 auto;padding:18px 20px 14px;border-bottom:1px solid var(--line);position:relative;--accent:var(--c-kernel)}
  .p-head::before{content:"";position:absolute;left:0;top:0;height:100%;width:4px;background:var(--accent)}
  .p-chip{display:inline-flex;align-items:center;gap:6px;font-size:10.5px;font-weight:700;letter-spacing:.05em;
    text-transform:uppercase;color:var(--accent);background:color-mix(in srgb,var(--accent) 13%,transparent);
    border-radius:999px;padding:3px 10px;margin-bottom:10px}
  .p-chip .sw{width:8px;height:8px;border-radius:50%;background:currentColor}
  .p-titlerow{display:flex;align-items:flex-start;gap:11px}
  .p-ico{width:38px;height:38px;flex:0 0 auto;border-radius:10px;display:grid;place-items:center;font-size:21px;
    background:color-mix(in srgb,var(--accent) 15%,transparent)}
  .p-title{font-size:19px;font-weight:800;letter-spacing:-.02em;line-height:1.1;margin:1px 0 3px}
  .p-tag{font-size:13px;color:var(--accent);font-weight:600}
  .p-actions{margin-top:8px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .p-act{font-size:12.5px;font-weight:600;color:var(--accent);background:none;border:none;cursor:pointer;padding:0;
    display:inline-flex;align-items:center;gap:6px;text-decoration:none}
  .p-act:hover{text-decoration:underline}
  .p-act.muted{color:var(--muted)}
  .p-act.muted:hover{color:var(--accent)}
  .p-close{position:absolute;top:15px;right:16px;width:30px;height:30px;border:1px solid var(--line);
    background:var(--bg-2);border-radius:8px;cursor:pointer;color:var(--ink-2);font-size:17px;line-height:1;display:grid;place-items:center}
  .p-close:hover{color:var(--ink);background:var(--panel)}
  .p-body{flex:1 1 auto;overflow-y:auto;padding:18px 20px 40px}
  .p-summary{font-size:14px;line-height:1.6;color:var(--ink-2);margin:0 0 4px}
  .p-summary strong{color:var(--ink);font-weight:650}
  .p-summary code,.dataflow code{font-family:var(--mono);font-size:12px;background:var(--code-bg);border-radius:4px;padding:1px 5px}
  .p-sec{margin-top:20px}
  .p-sec h3{font-size:11px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);
    margin:0 0 10px;display:flex;align-items:center;gap:8px}
  .p-sec h3::after{content:"";flex:1;height:1px;background:var(--line)}
  .dataflow{display:block;font-family:var(--mono);font-size:11.5px;background:var(--code-bg);border:1px solid var(--line);
    border-radius:8px;padding:9px 11px;color:var(--ink-2);line-height:1.6}
  .dataflow .arr{color:var(--accent);font-weight:700;padding:0 4px}
  .resp{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:7px}
  .resp li{position:relative;padding-left:17px;font-size:13px;color:var(--ink-2);line-height:1.45}
  .resp li::before{content:"";position:absolute;left:2px;top:7px;width:6px;height:6px;border-radius:2px;background:var(--accent);opacity:.85}
  .mod{display:flex;gap:10px;padding:7px 0;border-bottom:1px dashed var(--line)}
  .mod:last-child{border-bottom:none}
  .mod code{font-family:var(--mono);font-size:11.5px;color:var(--accent);background:var(--code-bg);
    border-radius:5px;padding:2px 6px;height:fit-content;white-space:nowrap;flex:0 0 auto;max-width:50%;overflow:hidden;text-overflow:ellipsis}
  .mod span{font-size:12.5px;color:var(--ink-2);line-height:1.4}
  .syms{display:flex;flex-wrap:wrap;gap:6px}
  .sym{font-family:var(--mono);font-size:11.5px;color:var(--ink-2);background:var(--code-bg);
    border:1px solid var(--line);border-radius:6px;padding:3px 8px}
  .pills{display:flex;flex-wrap:wrap;gap:7px}
  .pill{font-size:12px;font-weight:600;color:var(--ink-2);background:var(--bg-2);border:1px solid var(--line);border-radius:999px;padding:4px 11px}
  .conns{display:flex;flex-wrap:wrap;gap:7px}
  .conn{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:var(--ink-2);
    background:var(--bg-2);border:1px solid var(--line);border-radius:8px;padding:5px 10px;cursor:pointer;transition:.15s}
  .conn:hover{color:var(--ink);border-color:var(--accent);background:var(--panel)}
  .conn .sw{width:9px;height:9px;border-radius:3px;flex:0 0 auto}

  .legend{position:absolute;left:16px;bottom:16px;background:color-mix(in srgb,var(--panel) 90%,transparent);
    backdrop-filter:blur(8px);border:1px solid var(--line);border-radius:12px;padding:9px 12px;box-shadow:var(--shadow);z-index:15;max-width:218px}
  .leg-toggle{display:flex;align-items:center;gap:8px;width:100%;background:none;border:none;cursor:pointer;padding:0;
    font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  .leg-toggle b{margin-left:auto;font-size:9px;transition:transform .2s;color:var(--muted)}
  .legend.collapsed .leg-toggle b{transform:rotate(-90deg)}
  .leg-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 10px;margin-top:9px}
  .legend.collapsed .leg-grid{display:none}
  .leg{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--ink-2);cursor:pointer;padding:2px 3px;border-radius:5px;transition:.12s}
  .leg:hover{background:var(--bg-2);color:var(--ink)}
  .leg .sw{width:9px;height:9px;border-radius:3px;flex:0 0 auto}

  .zoomctl{position:absolute;right:16px;bottom:16px;display:flex;flex-direction:column;gap:6px;z-index:15}
  .zoomctl .iconbtn{width:36px;height:36px;background:color-mix(in srgb,var(--panel) 90%,transparent);backdrop-filter:blur(8px);box-shadow:var(--shadow);font-size:18px}
  .zlevel{font-size:10px;font-weight:700;color:var(--muted);text-align:center;background:color-mix(in srgb,var(--panel) 90%,transparent);
    border:1px solid var(--line);border-radius:7px;padding:3px 0;backdrop-filter:blur(8px)}
  .hint{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);z-index:14;
    background:color-mix(in srgb,var(--panel) 90%,transparent);backdrop-filter:blur(8px);
    border:1px solid var(--line);border-radius:999px;padding:7px 16px;font-size:12px;color:var(--muted);
    box-shadow:var(--shadow);display:flex;gap:14px;align-items:center;transition:opacity .4s}
  .hint b{color:var(--ink-2);font-weight:600}

  @media (max-width:760px){
    .modes,.titles p,#repoBtn{display:none}
    header.app{gap:9px;padding:9px 12px}
    .titles{min-width:0}
    .titles h1{font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:34vw}
    .logo{width:28px;height:28px}
    .panel{width:100%}
    .tours .lbl{display:none}
    .legend{display:none}
    .hint{display:none}
    .search input{width:100%;max-width:none}
    .search{flex:1 1 auto}
  }
</style>
</head>
<body>
<header class="app">
  <div class="brand">
    <div class="logo" aria-hidden="true"></div>
    <div class="titles">
      <h1>BenchFlow · Architecture Explorer</h1>
      <p>The environment-and-rollout engine for agentic RL — <b>it stops where the gradient starts</b></p>
    </div>
  </div>
  <div class="modes" title="One engine, three modes — all a scored rollout">
    <span class="mode"><i>Eval</i> · score &amp; stop</span>
    <span class="mode"><i>Train</i> · hand off the trajectory</span>
    <span class="mode"><i>Monitor</i> · score in production</span>
  </div>
  <div class="spacer"></div>
  <div class="search">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    <input id="search" type="text" placeholder="Search subsystems, files, types…" autocomplete="off" spellcheck="false"/>
    <button class="clr" id="searchClr" title="Clear">×</button>
  </div>
  <div class="hbtns">
    <button class="iconbtn" id="themeBtn" title="Toggle light / dark">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5 19 19M19 5l-1.5 1.5M6.5 17.5 5 19"/></svg>
    </button>
    <a class="iconbtn" id="repoBtn" href="https://github.com/benchflow-ai/benchflow" target="_blank" rel="noopener" title="GitHub repo">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.58 2 12.25c0 4.53 2.87 8.37 6.84 9.73.5.1.68-.22.68-.49 0-.24-.01-.88-.01-1.73-2.78.62-3.37-1.37-3.37-1.37-.46-1.18-1.11-1.5-1.11-1.5-.91-.64.07-.63.07-.63 1 .07 1.53 1.06 1.53 1.06.89 1.56 2.34 1.11 2.91.85.09-.66.35-1.11.63-1.36-2.22-.26-4.56-1.14-4.56-5.07 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.3.1-2.71 0 0 .84-.28 2.75 1.05a9.3 9.3 0 0 1 5 0c1.91-1.33 2.75-1.05 2.75-1.05.55 1.41.2 2.45.1 2.71.64.72 1.03 1.63 1.03 2.75 0 3.94-2.34 4.81-4.57 5.06.36.32.68.94.68 1.9 0 1.37-.01 2.48-.01 2.82 0 .27.18.6.69.49A10.02 10.02 0 0 0 22 12.25C22 6.58 17.52 2 12 2Z"/></svg>
    </a>
  </div>
</header>

<div class="tours" id="tours"><span class="lbl">Guided views</span></div>

<div class="stage">
  <div id="canvas">
    <div id="world">
      <svg id="edges"><defs>
        <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path class="ehead" d="M0 0 L9 4.5 L0 9 Z"/></marker>
        <marker id="ah-a" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path class="ehead active" d="M0 0 L9 4.5 L0 9 Z"/></marker>
      </defs></svg>
    </div>
    <div class="hint" id="hint">
      <span><b>Drag</b> to pan</span><span><b>Scroll</b> to zoom</span><span><b>Click</b> a node for details</span>
    </div>
  </div>

  <div class="legend" id="legendBox">
    <button class="leg-toggle" id="legToggle"><span>Planes &amp; layers</span><b>▾</b></button>
    <div class="leg-grid" id="legend"></div>
  </div>

  <div class="zoomctl">
    <button class="iconbtn" id="zin" title="Zoom in">+</button>
    <div class="zlevel" id="zlevel">100%</div>
    <button class="iconbtn" id="zout" title="Zoom out">−</button>
    <button class="iconbtn" id="zfit" title="Fit to screen">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/></svg>
    </button>
  </div>

  <aside class="panel" id="panel" aria-hidden="true">
    <div class="p-head" id="pHead">
      <button class="p-close" id="pClose" title="Close">×</button>
      <span class="p-chip" id="pChip"><span class="sw"></span><span id="pChipText">Kernel</span></span>
      <div class="p-titlerow">
        <div class="p-ico" id="pIco">⬡</div>
        <div style="min-width:0">
          <div class="p-title" id="pTitle">—</div>
          <div class="p-tag" id="pTag">—</div>
          <div class="p-actions">
            <button class="p-act" id="pFocus">⤢ Zoom to this node</button>
            <a class="p-act muted" id="pSrc" target="_blank" rel="noopener" href="#">↗ View source</a>
          </div>
        </div>
      </div>
    </div>
    <div class="p-body" id="pBody"></div>
  </aside>
</div>

<!-- Architecture dataset — generated by the `benchflow-arch-dataset` multi-agent workflow, updated for main @ 0.5.0 (#613 LiteLLM runtime, #615 skill modes). -->
<script id="arch-data" type="application/json">
{"nodes":[{"id":"cli","title":"Bench CLI","tagline":"Typer-based agent benchmarking command-line interface","summary":"The complete **bench/benchflow command-line interface** implemented in Typer. Exposes seven command groups (agent, eval, skills, tasks, environment, compat, monitor) managing agent selection, single-task and batch evaluations, skill discovery/installation/evaluation, task scaffolding, hosted environment listing, Harbor registry compatibility checking, and production monitor scoring (scaffolded, not yet implemented).","responsibilities":["Route user input across seven command subgroups and ~25 individual commands","Parse CLI arguments, normalize inputs, apply defaults (agent, sandbox, environment, model)","Load manifests, resolve source repositories, apply CLI overrides to YAML configs","Orchestrate single-task and batch evaluations by delegating to Evaluation","Manage hosted environment references and PrimeIntellect hub queries","Emit structured results tables and summary reports to the console","Exit with appropriate status codes and error messages on validation failure"],"dataflow":"User CLI args -\u003e argument parsing -\u003e config normalization -\u003e task/eval/skill orchestration -\u003e console output + result summaries","modules":[{"path":"src/benchflow/cli/main.py","role":"Root app (Typer instance), all top-level and subgroup command definitions"},{"path":"src/benchflow/cli/trace_import.py","role":"Task generation from Claude Code sessions, JSONL traces, and HuggingFace datasets"},{"path":"src/benchflow/evaluation.py","role":"Evaluation orchestration (called by eval_create and eval_run)"},{"path":"src/benchflow/skill_eval/_core.py","role":"Skill evaluation runner (called by skills_eval)"},{"path":"src/benchflow/hosted_env.py","role":"Hosted environment reference parsing and PrimeIntellect API queries"},{"path":"src/benchflow/agents/registry.py","role":"Agent lookup, alias resolution, and protocol validation"}],"symbols":["app","agent_app","eval_app","skills_app","tasks_app","env_app","compat_app","monitor_app","eval_create","agent_list","skills_eval","environment_create","tasks_generate"],"connections":["sdk","evaluation","rollout","manifest"],"githubDir":"src/benchflow/cli","extra":[{"label":"Command groups (subapps)","items":["agent \u2014 list, show (registered agents)","eval \u2014 create, list (single/batch evaluations)","skills \u2014 list, eval (skill discovery and evaluation)","tasks \u2014 init, check, generate, list-sources (task authoring)","environment \u2014 create, list, show, inspect, cleanup (sandbox management)","compat \u2014 harbor-registry (third-party framework checks)","monitor \u2014 run, replay, watch (production scoring, scaffolded)"]}]},{"id":"sdk","title":"SDK & Runtime","tagline":"High-level Python API for single/multi-agent execution","summary":"The public Python SDK surface (`bf.run()`, `Runtime`, `Agent`, `Environment`, `RolloutConfig`) enabling declarative and imperative rollout execution. **`bf.run()`** is the unified entry point supporting three calling conventions: `RolloutConfig` (scene-based, full control), `Agent` + `Environment` (0.3-style), and agent name string (simplest). `Runtime.execute()` is the stable execution center; `RolloutConfig` and `Scene` enable scene-based composition. `SDK` class provides backward-compat shim.","responsibilities":["Expose unified `bf.run()` entry point accepting RolloutConfig, Agent, or agent name string","Implement Runtime execution loop and lifecycle management (env start/stop, agent setup, verification)","Provide Agent wrapper (name, model, env) and Environment wrapper (task_path, sandbox lifecycle)","Build RolloutConfig from legacy kwargs for SDK.run() backward-compatibility","Dispatch to Rollout.create() and Rollout.run() for the actual execution","Support self-gen mode detection and delegation to run_self_gen()","Return RuntimeResult with artifacts paths, trajectories, rewards, and timing"],"dataflow":"Agent + Environment or RolloutConfig -\u003e Runtime/Rollout instantiation -\u003e rollout.run() -\u003e RuntimeResult with trajectories and rewards","modules":[{"path":"src/benchflow/__init__.py","role":"Public API surface exports (run, Runtime, Agent, Environment, RolloutConfig, SDK, etc.)"},{"path":"src/benchflow/_run.py","role":"Unified bf.run() dispatcher, accepts RolloutConfig or legacy kwargs"},{"path":"src/benchflow/runtime.py","role":"Runtime class, Agent wrapper, Environment wrapper, RuntimeResult, RuntimeConfig"},{"path":"src/benchflow/sdk.py","role":"SDK backward-compat shim delegating to rollout module"},{"path":"src/benchflow/rollout.py","role":"RolloutConfig definition, Rollout class, scene lowering to steps"},{"path":"src/benchflow/agents/registry.py","role":"Agent resolution and credential lookup"}],"symbols":["run","Runtime","RuntimeConfig","RuntimeResult","Agent","Environment","RolloutConfig","SDK"],"connections":["cli","rollout","manifest","task","evaluation"],"githubDir":"src/benchflow","extra":[{"label":"Calling conventions for bf.run()","items":["bf.run(RolloutConfig(...)) \u2014 full control, scene-based","bf.run(Agent('name', 'model'), Environment.from_task(...)) \u2014 0.3 style","bf.run('agent-name', task_path='tasks/X') \u2014 simplest string shortcut"]}]},{"id":"manifest","title":"Environment Manifest","tagline":"Declarative stateful environment specification for benchmarks","summary":"The **zero-modification integration seam** for benchmarks: authors write a declarative `environment.toml` file specifying sandbox services, readiness probes, task-selection strategy, and optional state-snapshot paths. `EnvironmentManifest` (Pydantic model) validates and parses TOML; `ManifestEnvironment` implements the manifest over any Sandbox provider (Docker/Daytona/Modal). Supports both smolclaws-style (per-task images + framework-started services) and chi-bench-style (single image with entrypoint-owned lifecycle).","responsibilities":["Parse and validate environment.toml TOML into EnvironmentManifest Pydantic model","Ensure consistency: either image or base_image, lifecycle ownership, service declarations","Provide helpers (effective_http, all_ports, resolve_manifest_runtime_env, resolve_manifest_image)","Implement ManifestEnvironment adapter: provision, readiness, snapshot, restore, reset over Sandbox","Start declared services inside the sandbox, probing only those actually installed per task","Gate rollout start on HTTP and TCP readiness probes with timeout","Capture and restore SQLite state snapshots for roll-back, distinct from arbitrary checkpoint snapshots"],"dataflow":"environment.toml file -\u003e EnvironmentManifest model -\u003e ManifestEnvironment.provision() -\u003e services + readiness -\u003e agent run -\u003e snapshot/restore/reset","modules":[{"path":"src/benchflow/environment/manifest.py","role":"EnvironmentManifest Pydantic model, ServiceSpec, TaskSelection, Readiness, StateSpec, helper functions"},{"path":"src/benchflow/environment/manifest_env.py","role":"ManifestEnvironment adapter: provision, readiness, snapshot, restore, reset, teardown"},{"path":"src/benchflow/environment/readiness.py","role":"Readiness probing: HTTP and TCP checks with polling and timeout"},{"path":"src/benchflow/environment/protocol.py","role":"Protocol types (EnvHandle, EnvState, ReadinessProbe, StateSnapshot)"},{"path":"src/benchflow/sandbox/__init__.py","role":"Sandbox protocol and provider registration for Docker/Daytona/Modal"}],"symbols":["EnvironmentManifest","ServiceSpec","TaskSelection","Readiness","StateSpec","ForwardEnv","ManifestEnvironment","EnvironmentSnapshotError","load_manifest","resolve_manifest_runtime_env","resolve_manifest_image"],"connections":["rollout","sandbox","evaluation","cli"],"githubDir":"src/benchflow/environment","extra":[{"label":"Task-selection strategies","items":["image \u2014 task seed data baked into per-task images (smolclaws style)","env_var \u2014 single image, task id passed at runtime via env var (chi-bench style)"]},{"label":"Environment state","items":["Stateless \u2014 snapshot/restore unsupported (default)","Stateful (SQLite) \u2014 capture baseline and snapshots for roll-back via sqlite3 .backup"]}]},{"id":"contracts","title":"Protocol Contracts","tagline":"The four planes composition boundary","summary":"Defines the **RolloutPlanes protocol** \u2014 the composition boundary separating the kernel (rollout.py) from concrete Agent/Sandbox/Environment/Reward implementations. The default `DefaultRolloutPlanes` binds each plane at startup, enabling the kernel to orchestrate any compatible backend without import coupling. Includes **BaseUser**, **RoundResult**, and **Session** contracts for progressive-disclosure user loops.","responsibilities":["Define runtime contracts for Agent, Sandbox, Environment, and Reward planes","Provide composition boundary so kernel avoids importing concrete implementations","Support progressive-disclosure rollout loops via BaseUser/RoundResult","Bind default concrete plane adapters at startup"],"dataflow":"RolloutConfig \u2192 RolloutPlanes (kernel consumes contract) \u2192 concrete Agent/Sandbox/Environment/Reward backends","modules":[{"path":"src/benchflow/contracts/planes.py","role":"RolloutPlanes protocol definition \u2014 all methods the kernel needs from four planes"},{"path":"src/benchflow/contracts/user.py","role":"BaseUser/RoundResult/FunctionUser for multi-round progressive-disclosure loops"},{"path":"src/benchflow/rollout_planes.py","role":"DefaultRolloutPlanes implementation binding four concrete plane adapters"}],"symbols":["RolloutPlanes","DefaultRolloutPlanes","BaseUser","RoundResult","FunctionUser","default_rollout_planes"],"extra":[{"label":"Plane operations","items":["agent_launch, agent_config, resolve_agent_env","create_environment, manifest_environment","setup_sandbox_user, lockdown_paths, snapshot_build_config","install_agent, deploy_skills, execute_prompts","connect_acp, harden_before_verify, verifier"]}],"connections":["rollout","agent_plane","sandbox","environment_plane","reward_plane","acp"],"githubDir":"src/benchflow/contracts"},{"id":"rollout","title":"Rollout Engine","tagline":"5-phase lifecycle orchestration and tree-native execution","summary":"The **Rollout** class owns the single-rollout lifecycle: setup/start/install_agent/connect/execute/verify/cleanup. Decomposes agents' work into **scenes** (multi-agent scenarios) and **turns** (role-specific prompts), executing multi-round workflows in a shared sandbox. **RolloutTree** records all steps linearly; **branch()** forks execution at any cursor for exploration, with state snapshot/restore ensuring isolation. The kernel is orthogonal to concrete plane bindings \u2014 it only calls the **RolloutPlanes** contract.","responsibilities":["Orchestrate 7-phase rollout lifecycle (create \u2192 setup \u2192 start \u2192 install \u2192 connect \u2192 execute \u2192 verify \u2192 cleanup)","Manage multi-scene, multi-role, multi-round execution within shared sandbox","Grow RolloutTree incrementally as execute() runs, enabling branch() forking at any node","Collect trajectory events, tool calls, and rewards into RolloutResult","Support multi-agent scene composition with role-specific agents and models","Snapshot/restore environment state for branch operations"],"dataflow":"RolloutConfig \u2192 Rollout.setup/start/execute \u2192 RolloutResult (trajectory + rewards + tree)","modules":[{"path":"src/benchflow/rollout.py","role":"Rollout lifecycle manager \u2014 the kernel; 2600+ LOC covering all 7 phases"},{"path":"src/benchflow/rollout_branch.py","role":"Branch engine \u2014 isolates child rollouts via state snapshot/restore"},{"path":"src/benchflow/branch.py","role":"Pure Branch primitives: checkpoint/fork/restore/aggregate (tree-independent)"},{"path":"src/benchflow/_types.py","role":"Scene/Role/Turn/Step type definitions for multi-agent composition"}],"symbols":["Rollout","RolloutConfig","RolloutTree","RolloutNode","Scene","Role","Turn","Step"],"extra":[{"label":"Execution modes","items":["Linear: single-scene, single-role sequential execution","Multi-scene: heterogeneous agents per role across scenes","Multi-round: progressive-disclosure with user loop feedback","Branching: exploration with isolated child continuations","Oracle: solution/solve.sh execution mode"]},{"label":"Skill modes","items":["default: bundled or explicit skills_dir","self-gen: agent-generated skill packs (continual learning)","skill-nudge: inject skill names/descriptions/full text into instruction"]}],"connections":["contracts","evaluation","agent_plane","sandbox","environment_plane","reward_plane","trajectories","scenes_user","tree"],"githubDir":"src/benchflow/rollout.py"},{"id":"evaluation","title":"Job Orchestration","tagline":"Batch concurrency, retries, resume, sharding, continual learning","summary":"The **Evaluation** class (alias Job) orchestrates a benchmark batch across many tasks with **two scheduling modes**: (1) **parallel-independent** (default) \u2014 rollouts run concurrently & isolated with configurable concurrency and exponential-backoff retry policy; (2) **sequential-shared** (continual learning, capability 5) \u2014 rollouts run in order over one persistent, generation-versioned `LearnerStore` capturing evolved skills and memory deltas. Supports **task discovery** with include/exclude filtering, **resume** from disk (skipping completed tasks), and **worker sharding** via `eval_sharding.py` for ultra-high concurrency. Aggregates results into `summary.json` with error breakdowns, usage telemetry, and timing phases.","responsibilities":["Discover tasks and filter via include/exclude patterns","Run rollouts in parallel-independent mode with configurable concurrency and backoff retry","Run rollouts in sequential-shared mode with LearnerStore generation versioning","Resume from disk \u2014 skip completed tasks, optionally rebuild LearnerStore on resume","Shard tasks across worker subprocesses for ultra-high concurrency","Aggregate results, compute pass rates, categorize errors, and write summary.json"],"dataflow":"tasks_dir + EvaluationConfig \u2192 Evaluation \u2192 [parallel or sequential] \u2192 EvaluationResult (score, error breakdown, memory curve)","modules":[{"path":"src/benchflow/evaluation.py","role":"Job orchestration \u2014 task discovery, retry policy, parallel/sequential scheduling, resume, aggregation"},{"path":"src/benchflow/eval_worker.py","role":"Subprocess worker for sharded runs \u2014 one Evaluation per shard with local concurrency"},{"path":"src/benchflow/eval_sharding.py","role":"Shard planner and control plane \u2014 splits tasks, spawns workers, aggregates results"},{"path":"src/benchflow/metrics.py","role":"TaskMetrics and BenchmarkMetrics \u2014 score/error/telemetry aggregation"}],"symbols":["Evaluation","EvaluationConfig","EvaluationResult","RetryConfig","EvalShardPlan","EvalShard"],"extra":[{"label":"Scheduling modes","items":["parallel-independent: concurrent rollouts, isolated, exponential-backoff retry","sequential-shared: order-preserving continual learning with LearnerStore versioning"]},{"label":"Retry policy categories","items":["install_failure, pipe_closed, acp_error, idle_timeout, infra_error, verifier_infra","Configurable: max_retries, exclude_categories, exponential backoff (2.0x, min=1s, max=30s)"]},{"label":"Result aggregation","items":["Pass rate (score), pass rate excl. errors, error_categories, verifier_error_categories","Telemetry: input/output/cache tokens, cost_usd, usage_source","Memory: learned skills, memory deltas, generation curve (continual learning only)","Timing: phase breakdown (setup, environment, agent install, verify, total)"]}],"connections":["rollout","contracts","metrics","learner","trajectories","reward_internals"],"githubDir":"src/benchflow/evaluation.py"},{"id":"scenes_user","title":"Scenes & User","tagline":"Authoring sugar for role turns and progressive-disclosure loops","summary":"**Scenes** declare role/skill attribution over a sequence of **Turns**, then compile to Step objects via `compile_scenes_to_steps()`. **BaseUser** is a progressive-disclosure abstraction that drives multi-round rollouts: each round, `user.run()` accepts the instruction and prior `RoundResult`, returns the next prompt or `None` to stop, forming a user-in-the-loop orchestration layer.","responsibilities":["Desugar declarative Scene/Role/Turn structures into executable Step objects","Attach role metadata (name, agent, model, timeout, skills_dir) to each Turn's compiled Step","Implement progressive-disclosure loop: setup() once, then multi-round user.run() \u2192 agent.execute() cycles","Pass RoundResult (trajectory, rewards, verifier_output) to inform next round's prompt","Stop when user.run() returns None or max_user_rounds is reached"],"dataflow":"Scene {roles, turns, skills_dir} + BaseUser \u2192 compile_scenes_to_steps() \u2192 Step list; user.run(round, instruction, RoundResult) \u2192 str | None prompt","modules":[{"path":"src/benchflow/scenes.py","role":"Scene compilation: desugars Scene/Role/Turn to Step objects, attaches metadata"},{"path":"src/benchflow/_types.py","role":"Data types: Role, Scene, Turn class definitions with agent/model/env/timeout/skills_dir fields"},{"path":"src/benchflow/contracts/user.py","role":"User contracts: BaseUser, FunctionUser, PassthroughUser, RoundResult class definitions"},{"path":"src/benchflow/rollout.py","role":"Integration: _run_user_loop() orchestrates connect\u2192execute\u2192soft_verify\u2192RoundResult\u2192repeat"},{"path":"src/benchflow/sandbox/user.py","role":"Backward-compatible imports for BaseUser and RoundResult"}],"symbols":["compile_scenes_to_steps","scene_step_role","scene_step_prompt","BaseUser","RoundResult","FunctionUser","PassthroughUser"],"extra":[{"label":"Scene fields","items":["name (str)","roles (list[Role])","turns (list[Turn])","skills_dir (str | Path | None)"]},{"label":"Role fields","items":["name, agent, model, reasoning_effort","env (dict), timeout_sec, idle_timeout_sec","skills_dir, capabilities"]}],"connections":["rollout","contracts","tree","trajectories"],"githubDir":"src/benchflow"},{"id":"tree","title":"Tree & Trajectories","tagline":"Tree-native execution model: branching, snapshots, and paths","summary":"**RolloutTree** wraps a root **RolloutNode**, growing via `advance()` (add child with Step) and `attach()` (pending child). **Step** is one edge: the reason\u2192act\u2192tool cycle. **Trajectory** is a derived view\u2014the ordered Steps from root to leaf\u2014computed on-demand by `trajectory()`. **Branch points** occur where a node forks into N children via `checkpoint()` + `fork()` for credit assignment.","responsibilities":["Grow the tree by one edge per advance() call; multiple children make a branch point","Provide attach()/populate() for pending branch children (child exists before its Step)","Compute Trajectory as root-to-leaf Step path, never stored, derived from tree structure","Store checkpoint snapshots and reward values in RolloutNode.state for branch credit assignment","Maintain node identity (eq=False) so two nodes are equal only if the same object"],"dataflow":"RolloutTree (root RolloutNode) + Step \u2192 advance() \u2192 RolloutNode; leaf \u2192 trajectory() \u2192 list[Step]","modules":[{"path":"src/benchflow/trajectories/tree.py","role":"Core data model: Step, RolloutNode, RolloutTree, trajectory() function"},{"path":"src/benchflow/branch.py","role":"Branch operations: checkpoint, fork, restore, aggregate on tree nodes"},{"path":"src/benchflow/rollout.py","role":"Integration: uses RolloutTree.advance() during execute() to add steps"},{"path":"src/benchflow/rollout_branch.py","role":"Branch engine: orchestrates restore\u2192execute\u2192score on forked children"}],"symbols":["Step","RolloutNode","RolloutTree","trajectory","branch_points","RolloutTree.advance","RolloutTree.attach","RolloutTree.populate"],"extra":[{"label":"Tree operations","items":["advance(node, step): add child via step edge","attach(node): add pending child (no step yet)","populate(node, step): fill pending node's incoming step","find(node_id): locate node by id","nodes(): pre-order iteration"]},{"label":"Node fields","items":["id (str)","parent, children (references)","step_in (Step from parent)","state (dict: snapshot, reward, etc.)"]}],"connections":["rollout","branch.py","trajectories","evaluation"],"githubDir":"src/benchflow/trajectories"},{"id":"agent_plane","title":"Agent Plane","tagline":"Registry, install, credentials, and environment setup.","summary":"The **agent registry** and provisioning system that manages every supported agent (Claude, Codex, OpenClaw, Pi, Harvey Lab, OpenHands, Gemini, etc.). Owns **agent configuration** (install/launch commands, skill paths, credential files), **provider registry** (LLM endpoints, auth), **environment resolution** (API key injection, subscription auth detection, env_mapping to agent-native vars), and **credential writing** (both agent and provider auth files into the sandbox).","responsibilities":["Register and configure all supported agents with install/launch commands","Resolve model providers and translate BENCHFLOW_PROVIDER_* environment variables","Detect and apply subscription authentication from host login files","Write API key and credential files into the sandbox before agent launch","Manage skill paths and sandboxed home directories across agents","Handle agent-specific ACP shims (openclaw, pi, harvey-lab); the Bedrock 4.8+ thinking patch now lives in the LiteLLM runtime","Validate required environment variables for chosen model/provider","Install agents inside sandbox and deploy skills to discovery paths"],"dataflow":"Agent spec + model ID + env vars + host credentials \u2192 resolved agent config + full environment dict ready for ACP connection","modules":[{"path":"src/benchflow/agents/registry.py","role":"Agent registry: AgentConfig dataclass, AGENTS dict, agent aliases, parse/resolve functions, protocol wrapping (acpx:)"},{"path":"src/benchflow/agents/providers.py","role":"LLM provider registry: ProviderConfig, model metadata, API protocol endpoints, auth types, URL template resolution"},{"path":"src/benchflow/agents/env.py","role":"Environment resolution: auto_inherit_env, Vertex ADC injection, provider_env, subscription auth check, env_mapping translation"},{"path":"src/benchflow/agents/credentials.py","role":"Credential writing: upload_credential, provider credential files, subscription auth file copy, Gemini Vertex settings"},{"path":"src/benchflow/agents/install.py","role":"Sandbox provisioning: install_agent, deploy_skills, skill path linking, web-tool policy application"},{"path":"src/benchflow/agents/errors.py","role":"Agent-plane error types: AgentProtocolError base"}],"symbols":["AgentConfig","ProviderConfig","resolve_agent","resolve_agent_env","install_agent","deploy_skills","upload_credential","check_subscription_auth"],"extra":[{"label":"Registered agents","items":["claude-agent-acp (Claude via ACP; supports set_model via effort config)","pi-acp (Pi coding agent; multi-protocol, registered-provider/model format)","openclaw (OpenClaw via ACP shim; model set at runtime)","codex-acp (OpenAI Codex; subscription auth support)","gemini (Google Gemini CLI; Vertex AI ADC support)","opencode (OpenCode open-source agent; provider/model format)","harvey-lab-harness (Harvey LAB 6-tool loop via ACP shim)","openhands (OpenHands multi-model Python agent; Bedrock Opus 4.8 thinking shim)"]},{"label":"Provider auth types","items":["api_key \u2014 standard bearer token (ANTHROPIC_API_KEY, OPENAI_API_KEY, etc.)","adc \u2014 Application Default Credentials (Google Vertex AI)","aws \u2014 AWS Bedrock with bearer token + region","none \u2014 no authentication"]}],"connections":["acp","sandbox","environment_plane","providers"],"githubDir":"src/benchflow/agents"},{"id":"acp","title":"ACP Layer","tagline":"Client, session, transports, and the connect/prompt runtime.","summary":"The **Agent Client Protocol** (ACP) implementation \u2014 BenchFlow's client that speaks JSON-RPC 2.0 to agents over **stdio or container pipes**. Owns the **ACPClient** (initialize handshake, session lifecycle, model/config negotiation, prompt loop), **ACPSession** (stateful event log of tool calls, message chunks, thoughts), **transports** (stdio for local agents, ContainerTransport for sandboxed), and **runtime** (bring-up sequence: connect \u2192 initialize \u2192 session_new \u2192 configure model/effort \u2192 prompt loop with idle watchdog).","responsibilities":["Establish JSON-RPC 2.0 transport to agent process (stdio or sandbox pipe)","Execute ACP handshake: initialize, authenticate, session/new, model/config setup","Send prompts and receive streaming responses with tool calls and thoughts","Manage session state: tool call records, message/thought chunks, chronological events","Handle ACP permissions: auto-approve or route to registered handlers","Implement idle timeout watchdog to detect hung agents","Support model format negotiation: bare, provider/model, registered-provider/model","Capture session trajectory: events, tool calls, message history for storage"],"dataflow":"agent process + launch command + env dict + sandbox connection \u2192 ACPClient + live ACPSession \u2192 prompt loop with trajectory capture","modules":[{"path":"src/benchflow/acp/client.py","role":"ACPClient: JSON-RPC request/response, initialize, session/new, session/load, set_model, set_config_option, prompt, session/request_permission handling"},{"path":"src/benchflow/acp/session.py","role":"ACPSession: mutable session state, tool call records, message/thought chunks, events log, streaming updates, change callbacks"},{"path":"src/benchflow/acp/transport.py","role":"Transport base class; StdioTransport for local agent processes (async subprocess)"},{"path":"src/benchflow/acp/container_transport.py","role":"ContainerTransport: live stdio pipe to agent in Daytona/Docker sandbox, log file capture"},{"path":"src/benchflow/acp/runtime.py","role":"connect_acp: bring-up sequence (install check, privilege drop, transport init, handshake, model/effort config); execute_prompts: multi-turn loop with idle watchdog"},{"path":"src/benchflow/acp/types.py","role":"ACP schema types from SDK: InitializeParams/Result, PromptParams/Result, NewSessionParams, StopReason, ToolCallStatus enums"}],"symbols":["ACPClient","ACPSession","Transport","StdioTransport","ContainerTransport","connect_acp","execute_prompts","StopReason","ToolCallStatus"],"extra":[{"label":"ACP handshake sequence","items":["Transport.start() \u2014 spawn agent process or connect to container","ACPClient.initialize() \u2014 negotiate protocol version, capabilities, auth methods","ACPClient.authenticate() \u2014 optional in-protocol auth (rarely used)","ACPClient.session_new() \u2014 create session, retrieve model state and config options","_configure_acp_session() \u2014 set model ID and reasoning effort if supported"]},{"label":"Session lifecycle","items":["tool_call \u2014 agent begins a tool call with title/kind","tool_call_update \u2014 tool call status change (in_progress/completed/failed/cancelled) with content","agent_message_chunk \u2014 streamed text content","agent_thought_chunk \u2014 streamed reasoning/thought content","events list \u2014 chronological interleaving of user prompts, tool calls, agent text"]}],"connections":["agent_plane","sandbox","task","trajectories","traces"],"githubDir":"src/benchflow/acp"},{"id":"sandbox","title":"Sandbox","tagline":"Provider-agnostic execution environment protocol","summary":"The **Sandbox** is the core abstraction layer for isolated, containerized execution. It defines the `Sandbox` protocol (runtime contract), three pluggable backends (`DockerSandbox`, `DaytonaSandbox`, `ModalSandbox`), live process pipes (`DockerProcess`, `DaytonaProcess`, `DaytonaPtyProcess`), and container snapshots (`SandboxImage`). Backends handle image building, startup lifecycle, command execution via `exec()`, file I/O, and optional snapshot/restore for the Branch rollout substrate.","responsibilities":["Define the `Sandbox` protocol with exec, file I/O, lifecycle, and optional snapshot/restore methods","Implement Docker backend with docker-compose orchestration and native snapshots via `docker commit`","Implement Daytona backend with direct (single-container) and DinD (Docker-in-Docker) strategies, supporting snapshots","Implement Modal backend for cloud-based execution with GPU support","Provide live stdin/stdout pipes (DockerProcess, DaytonaProcess, DaytonaPtyProcess) for ACP agent control","Build and manage container images, handle resource allocation, and enforce network policies"],"dataflow":"Dockerfile + task config -\u003e image build/cached -\u003e sandbox start -\u003e agent exec via pipes -\u003e agent output -\u003e snapshot (optional) -\u003e sandbox stop","modules":[{"path":"src/benchflow/sandbox/protocol.py","role":"Sandbox protocol contract, SandboxImage, exception types (SandboxStartupError)"},{"path":"src/benchflow/sandbox/docker.py","role":"DockerSandbox backend: docker-compose orchestration, exec via compose, native snapshots"},{"path":"src/benchflow/sandbox/daytona.py","role":"DaytonaSandbox with strategy pattern: _DaytonaDirect and _DaytonaDinD for single/multi-container"},{"path":"src/benchflow/sandbox/modal_impl.py","role":"ModalSandbox backend: cloud-based execution, GPU support, Modal SDK integration"},{"path":"src/benchflow/sandbox/process.py","role":"LiveProcess pipes: DockerProcess, DaytonaProcess, DaytonaPtyProcess for agent control"},{"path":"src/benchflow/sandbox/setup.py","role":"Dockerfile preprocessing, DinD patching, sandbox creation, image setup"},{"path":"src/benchflow/sandbox/snapshot.py","role":"Workspace-level tar/untar snapshots (distinct from container-level snapshots)"},{"path":"src/benchflow/sandbox/_base.py","role":"BaseSandbox abstract base with common lifecycle, env resolution, resource override"},{"path":"src/benchflow/sandbox/metadata.py","role":"Persist sandbox.json (provider sandbox ID) for audit & cleanup"}],"symbols":["Sandbox","SandboxImage","DockerSandbox","DaytonaSandbox","ModalSandbox","LiveProcess","DockerProcess","DaytonaProcess","ExecResult","persist_sandbox_info"],"extra":[{"label":"Backends","items":["Docker: local docker-compose with native snapshots","Daytona: direct (single-container) or DinD (Docker-in-Docker) with snapshots","Modal: cloud-based with GPU support, no snapshots"]},{"label":"Key contracts","items":["start(force_build) - build image and launch container","exec(cmd) - run command, return ExecResult","snapshot/restore - container-level checkpoints (optional)","upload_file/download_file - bidirectional file transfer"]}],"connections":["setup","hardening","rollout","agent_plane","environment_plane"],"githubDir":"src/benchflow/sandbox"},{"id":"hardening","title":"Hardening","tagline":"Anti-tampering locks and verifier environment isolation","summary":"The **Hardening** module prevents **reward-hacking** through privilege-drop, path lockdown, build-config snapshotting, and verifier environment **purification**. It creates non-root sandbox users, restricts access to solution/test directories, captures build-config files (setup.py, pyproject.toml) before agent execution and restores them pre-verification, purges injected Python hooks (conftest.py, .pth, sitecustomize.py), and hardens PATH/PYTHONPATH to trusted image entries only. The `VERIFIER_ENV` dict pins security-critical variables (PYTHONBREAKPOINT=0, PYTHONPYCACHEPREFIX=/nonexistent, PYTEST_DISABLE_PLUGIN_AUTOLOAD=1) to block code injection vectors.","responsibilities":["Create non-root sandbox user and set up minimal home environment for agent execution","Lock down solution and test directories (chown root, chmod 700) so sandbox_user cannot read them","Snapshot build-config files before agent runs and restore them before verification","Kill sandbox-user processes and clear /logs/verifier/ to prevent post-run tampering","Purge injected Python hooks (conftest.py outside /tests, .pth, sitecustomize.py, usercustomize.py)","Build hardened verifier environment with safe PATH, PYTHONPATH, and fixed security variables"],"dataflow":"Task + sandbox_user config -\u003e setup_sandbox_user -\u003e _snapshot_build_config -\u003e (agent runs) -\u003e harden_before_verify -\u003e restore_build_config + purge hooks -\u003e verifier runs with VERIFIER_ENV","modules":[{"path":"src/benchflow/sandbox/lockdown.py","role":"User setup, path lockdown, build-config snapshot/restore, verifier hardening orchestration"},{"path":"src/benchflow/task/config.py","role":"SandboxConfig with sandbox_user and sandbox_locked_paths fields"},{"path":"src/benchflow/agents/registry.py","role":"get_sandbox_home_dirs() to copy agent-specific home state to sandbox user"}],"symbols":["setup_sandbox_user","lockdown_paths","_snapshot_build_config","_restore_build_config","harden_before_verify","VERIFIER_ENV","build_priv_drop_cmd","_build_cleanup_cmd"],"extra":[{"label":"Locked paths (defaults)","items":["/solution - prevents agent from reading oracle code","/tests - prevents agent from reading test expectations","Custom paths via task.toml [verifier] sandbox_locked_paths"]},{"label":"Build-config files snapshotted","items":["setup.py, pyproject.toml, setup.cfg, tox.ini, noxfile.py, hatch.toml, flit.ini, MANIFEST.in","requirements*.txt, Makefile (control how tests install/run)"]},{"label":"VERIFIER_ENV hardening","items":["PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin (no /tmp or workspace)","PYTHONPYCACHEPREFIX=/nonexistent (blocks agent-compiled bytecode)","PYTEST_ADDOPTS includes -c /dev/null --confcutdir=/tests to block config hijacks","PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 (entry-point plugin injection blocked)"]}],"connections":["sandbox","rollout","agent_plane","reward_plane","task"],"githubDir":"src/benchflow/sandbox"},{"id":"environment_plane","title":"Environment Plane","tagline":"Provision, gate, snapshot, and reset stateful worlds","summary":"The **Environment plane** (Han's S) manages the stateful execution world an agent acts in. `ManifestEnvironment` implements the `Environment` protocol over any `Sandbox` provider using a declarative `EnvironmentManifest`. It provisions framework-started services or entrypoint-owned services, gates on readiness probes, captures and restores SQLite-backed state for branching/rollback, resets the environment to baseline for episode reuse, and tears down on completion.","responsibilities":["Provision manifest-declared services inside the sandbox (or validate entrypoint ownership)","Gate agent execution on HTTP/TCP readiness probes until timeout","Capture and restore environment state snapshots for rollout branching","Reset environment to per-task baseline without sandbox teardown","Snapshot/restore SQLite databases for deterministic rollback","Teardown framework-started service processes"],"dataflow":"EnvironmentManifest + Sandbox \u2192 provision/readiness/query/snapshot/restore/reset/teardown","modules":[{"path":"src/benchflow/environment/manifest_env.py","role":"Default Environment adapter; implements provision/readiness/snapshot/restore/reset over Sandbox"},{"path":"src/benchflow/environment/protocol.py","role":"Environment contract; defines provision/readiness/query/teardown/snapshot/restore/reset interface"},{"path":"src/benchflow/environment/manifest.py","role":"Manifest schema; validates EnvironmentManifest, ServiceSpec, TaskSelection, Readiness, StateSpec"},{"path":"src/benchflow/environment/readiness.py","role":"Readiness gating; polls HTTP and TCP endpoints until timeout or success"},{"path":"src/benchflow/sandbox/services.py","role":"Legacy service registry; defines built-in smolclaws services (gmail, slack, gcal, gdoc, gdrive)"},{"path":"src/benchflow/hosted_env.py","role":"Hosted environment adapter; wraps external Verifiers environments as rollout artifacts"}],"symbols":["ManifestEnvironment","Environment","EnvironmentManifest","EnvHandle","StateSnapshot","ReadinessProbe","ServiceSpec"],"extra":[{"label":"Built-in Services","items":["gmail (claw-gmail:9001, FastAPI+SQLite)","slack (claw-slack:9002)","gcal (claw-gcal:9003, Google Calendar mock)","gdoc (claw-gdoc:9004, Google Docs mock)","gdrive (claw-gdrive:9005, Google Drive mock)"]},{"label":"Manifest Modes","items":["image (ready-to-run, chi-bench style)","base_image (per-task builds FROM, smolclaws style)","owns_lifecycle=true (entrypoint starts services)","owns_lifecycle=false (framework starts services)","stateless (no [environment.state], no snapshot/restore)","stateful (declares [environment.state] for snapshot/restore)"]}],"connections":["sandbox","manifest","rollout","hosted_env"],"githubDir":"src/benchflow/environment"},{"id":"task","title":"Task Specification","tagline":"Problem definition, on-disk layout, and verifier orchestration","summary":"A **Task** (Han's T) is the problem specification an agent solves. It captures the on-disk directory layout (`task.toml`, `instruction.md`, environment/, solution/, tests/), the configuration (`TaskConfig` with verifier, sandbox, agent settings), and **verifies agent completion** through either test-script verifiers (run `test.sh`, parse rewards) or LLM-judge verifiers (download deliverables, grade against rubric, score with LLM). Paths are normalized via `TaskPaths` and `SandboxPaths`.","responsibilities":["Load and parse task.toml configuration into TaskConfig","Manage task filesystem layout via TaskPaths (instruction, config, environment, tests, solution)","Run test-script verifier (upload tests/, exec test.sh, parse reward.txt/reward.json)","Run llm-judge verifier (download deliverables, score against rubric with LLM)","Resolve environment variables for verifier and agent configuration","Maintain hidden Memory-space fixtures (expected_skills, answer keys)"],"dataflow":"task_dir + TaskConfig \u2192 Verifier \u2192 reward signal (test-script or llm-judge)","modules":[{"path":"src/benchflow/task/task.py","role":"Task class; loads task_dir, instruction.md, task.toml into unified Task object"},{"path":"src/benchflow/task/config.py","role":"TaskConfig schema; validates task.toml sections (task, verifier, sandbox, agent, solution)"},{"path":"src/benchflow/task/paths.py","role":"Path models; defines TaskPaths, RolloutPaths, SandboxPaths directory structures"},{"path":"src/benchflow/task/verifier.py","role":"Verifier orchestration; runs test-script or llm-judge and parses reward outputs"},{"path":"src/benchflow/task/env.py","role":"Environment variable resolution; handles ${VAR} and ${VAR:-default} templating"}],"symbols":["Task","TaskConfig","TaskPaths","RolloutPaths","SandboxPaths","Verifier","VerifierResult","VerifierConfig"],"extra":[{"label":"Verifier Types","items":["test-script (default): run tests/test.sh, parse reward.txt or reward.json","llm-judge: download deliverables, score against rubric.toml/rubric.json with LLM judge"]},{"label":"Hidden Fixtures","items":["expected_skills (Memory-space answer key for skill scoring)","judge.rubric_path (LLM judge rubric location)","verifier.env (API keys, credentials for verifier)"]}],"connections":["sandbox","manifest","rollout","evaluation","reward_plane"],"githubDir":"src/benchflow/task"},{"id":"reward_plane","title":"Reward Plane","tagline":"Node-scoped scoring contract and architecture","summary":"The Reward plane implements the architecture's canonical **score(node) -\u003e VerifyResult** contract. The `Reward` protocol defines how any scorer evaluates a `RolloutNode` to produce a tagged result carrying outcome reward, per-dimension scores, dense events, and error state. Five evaluation spaces (output/action/reasoning/memory/latent) tag every reward; the headline signal is outcome space (did the job finish?). The plane composes legacy path-based scorers via `PathReward` adapters with native node-scoped dimensions via `score_node`, aggregating them into one canonical contract-shaped result.","responsibilities":["Define the Reward protocol and VerifyResult contract matched by all scorers","Tag rewards with (space, granularity) and distinguish outcome from process signals","Adapt legacy path-based RewardFunc to the canonical node-scoped contract via PathReward","Aggregate per-dimension scorer results and preserve all dense reward events","Validate reward scalars stay within [0.0, 1.0] and handle error cases explicitly"],"dataflow":"RolloutNode + list[Scorer] -\u003e VerifyResult(reward, items, events, space, granularity)","modules":[{"path":"src/benchflow/rewards/protocol.py","role":"Core contracts: Reward protocol, RewardFunc legacy shape, VerifyResult dataclass"},{"path":"src/benchflow/rewards/node.py","role":"score_node entry point, NodeScorer protocol, PathReward adapter for legacy path-based scorers"},{"path":"src/benchflow/rewards/events.py","role":"RewardEvent dataclass, Space/Granularity type definitions, five spaces and terminal/step granularity"},{"path":"src/benchflow/rewards/validation.py","role":"Reward scalar validation (is_valid_reward_number), reward map validation helpers"},{"path":"src/benchflow/rewards/__init__.py","role":"Public API exports: Reward, VerifyResult, PathReward, score_node, NodeScorer"}],"symbols":["Reward","RewardFunc","VerifyResult","NodeScorer","score_node","PathReward","RewardEvent","is_valid_reward_number"],"extra":[{"label":"Five Evaluation Spaces","items":["output: did the agent finish the job (outcome reward)","action: quality of tool calls / actions taken (process)","reasoning: quality of chain-of-thought (process)","memory: skill/knowledge updates (process)","latent: reserved for future use"]},{"label":"Reward Granularity","items":["terminal: whole trajectory, end-of-trial verifier result","step: one edge / tool call, mid-execution dense signal"]}],"connections":["reward_internals","evaluation","trajectories","tree"],"githubDir":"src/benchflow/rewards"},{"id":"reward_internals","title":"Reward Internals","tagline":"LLM judges, rubrics, memory scoring, file I/O","summary":"The Reward internals layer implements **subjective scoring** via LLM-as-judge with multi-provider routing (Claude/GPT/Gemini), declarative **rubric configuration** parsing (binary/Likert/numeric criteria with weights and aggregation), **memory-space scoring** via skill-store diffing (`SkillDelta`), and **deliverable file readers** extracting text from rich documents (DOCX/XLSX/PPTX/PDF/Markdown). The judge normalizes raw LLM verdicts to [0, 1], propagates per-criterion scores as dense events, and writes detailed `evaluation_details.json` alongside rollouts.","responsibilities":["Route judge calls to appropriate LLM provider (Anthropic/OpenAI/Google) with concurrent-safe credential handling","Parse rubric files (TOML/JSON) into Criterion objects with type, weight, and space tags","Build criterion-specific prompts (binary/Likert/numeric) and extract normalized scores from verdicts","Score memory space by diffing skill-store snapshots (before/after) and computing precision \u00d7 recall","Extract plain text from deliverables (DOCX/XLSX/PPTX/PDF) and present context to the judge"],"dataflow":"RolloutDir + RubricConfig + DeliverableFiles + Judge(model, env) -\u003e list[RewardEvent] + VerifyResult","modules":[{"path":"src/benchflow/rewards/llm.py","role":"Multi-provider LLM judge routing (Anthropic/OpenAI/Google), verdict parsing, JudgeEnvironmentError for missing SDKs"},{"path":"src/benchflow/rewards/rubric_config.py","role":"Criterion, JudgeConfig, RubricConfig, ScoringConfig dataclasses; TOML/JSON rubric file parsers"},{"path":"src/benchflow/rewards/rubric.py","role":"Rubric dataclass: weighted collection of RewardFuncs, gathers results via asyncio.gather"},{"path":"src/benchflow/rewards/builtins.py","role":"LLMJudgeRewardFunc, TestRewardFunc, StringMatchRewardFunc, CodeExecRewardFunc implementations"},{"path":"src/benchflow/rewards/memory_scorer.py","role":"MemoryScorer, SkillDelta, skill_delta diff primitive, precision-recall scoring for memory changes"},{"path":"src/benchflow/rewards/file_readers.py","role":"read_file_as_text, find_deliverables, format-specific text extraction (pandoc, python-docx, openpyxl, pdfplumber)"}],"symbols":["LLMJudgeRewardFunc","call_judge","parse_verdict","Criterion","RubricConfig","ScoringConfig","MemoryScorer","SkillDelta","skill_delta","read_file_as_text","find_deliverables"],"extra":[{"label":"Criterion Types","items":["binary: yes/no pass/fail verdict","likert: integer 1 to N points (e.g. 1-5 scale)","numeric: continuous score from min to max (e.g. 0-100)"]},{"label":"Judge Model Providers","items":["Anthropic: claude-* models via anthropic SDK","OpenAI: gpt-*, o1, o3, o4 models via openai SDK","Google: gemini-* models via google-genai SDK","Provider routing: prefix-based (claude-/*gpt-*/*gemini-*) + fallback to all providers for unknown prefixes"]},{"label":"Aggregation Modes","items":["weighted_mean: sum(score * weight) / sum(weight)","all_pass: 1.0 if all scores \u003e= 0.5, else 0.0","any_pass: 1.0 if any score \u003e= 0.5, else 0.0","threshold: 1.0 if weighted_mean \u003e= threshold, else 0.0"]},{"label":"Supported Document Formats","items":[".docx: pandoc (preferred) or python-docx",".xlsx: openpyxl (spreadsheet tables)",".pptx: markitdown",".pdf: pdfplumber",".md, .txt, .json, .csv: direct UTF-8 read"]}],"connections":["reward_plane","evaluation","providers"],"githubDir":"src/benchflow/rewards"},{"id":"providers","title":"Provider Runtime (LiteLLM)","tagline":"one LiteLLM proxy owns model routing","summary":"BenchFlow now owns **one** provider-side runtime: a **LiteLLM proxy** (`litellm[proxy]==1.88.0rc1`). It starts host-side or **inside the sandbox** (Daytona/Modal, bootstrapped via `uv`), and LiteLLM does all provider-specific translation \u2014 Anthropic, OpenAI, Bedrock, Azure, Vertex. A callback logger captures every exchange and token usage; a startup patch handles **Bedrock Claude 4.8+ adaptive thinking**. This replaced the old Bedrock + usage HTTP proxies (#613).","responsibilities":["Start one LiteLLM proxy per run \u2014 host-side or in-sandbox (uv-bootstrapped)","Route the agent's model through LiteLLM, which owns provider translation","Resolve the LiteLLM route/config from the benchflow model id (Azure, Bedrock effort, aliases)","Capture exchanges + token usage via a LiteLLM callback logger","Patch LiteLLM for Bedrock Claude 4.8+ adaptive thinking at proxy startup"],"dataflow":"benchflow model id + env -\u003e LiteLLM proxy endpoint (host/sandbox) -\u003e captured exchanges + usage","modules":[{"path":"src/benchflow/providers/litellm_runtime.py","role":"Orchestrate the LiteLLM proxy lifecycle (host + sandbox)"},{"path":"src/benchflow/providers/litellm_config.py","role":"Pure route/config resolution (LiteLLMRoute, proxy config)"},{"path":"src/benchflow/providers/litellm_logging.py","role":"Callback logger: captures usage + builds the Trajectory"},{"path":"src/benchflow/providers/litellm_bedrock_patch.py","role":"Bedrock Claude 4.8+ adaptive-thinking startup patch"},{"path":"src/benchflow/providers/runtime.py","role":"Thin ProviderRuntime boundary the kernel depends on"}],"symbols":["LiteLLMRoute","resolve_litellm_route","ensure_litellm_runtime","HostLiteLLMProcess","SandboxLiteLLMProcess","BenchFlowLiteLLMLogger","extract_usage"],"extra":[{"label":"LiteLLM runtime","items":["host-side or in-sandbox (Daytona / Modal)","litellm[proxy]==1.88.0rc1, uv-bootstrapped","callback logger captures usage","Bedrock 4.8+ adaptive-thinking patch"]}],"connections":["agents_providers","trajectories","usage","evaluation","rollout"],"githubDir":"src/benchflow/providers"},{"id":"usage","title":"Usage Tracking","tagline":"token metrics & cost via LiteLLM","summary":"A telemetry **policy** \u2014 `auto` / `required` / `off` \u2014 now wired through the **LiteLLM runtime** instead of a standalone proxy. LiteLLM's callback logger records token usage per call and **cost comes from LiteLLM's model cost map** (plus a `custom_cost_per_token` hook), so the old curated pricing table was removed. Cross-provider token counts are still normalized in `trajectories/types.py`. Legacy `usage_proxy*` config keys are now rejected.","responsibilities":["Hold the auto / required / off telemetry policy (UsageTrackingConfig)","Fail-closed when mode is 'required' and usage cannot be wired","Read usage from the LiteLLM callback log; surface 'unavailable' cleanly","Normalize token counts across Anthropic / OpenAI / Gemini / Bedrock","Reject removed usage-proxy configuration keys"],"dataflow":"policy + LiteLLM callback log -\u003e normalized tokens + cost on the Trajectory","modules":[{"path":"src/benchflow/usage_tracking.py","role":"UsageTrackingConfig policy (auto / required / off)"},{"path":"src/benchflow/providers/litellm_logging.py","role":"Extract usage from the LiteLLM callback log"},{"path":"src/benchflow/providers/litellm_config.py","role":"custom_cost_per_token / cost hooks"},{"path":"src/benchflow/trajectories/types.py","role":"Cross-provider token normalization"}],"symbols":["UsageTrackingConfig","UsageTrackingMode","normalize_usage_tracking_mode","extract_usage_from_trajectory","usage_unavailable","custom_cost_per_token"],"extra":[{"label":"Modes","items":["auto \u2014 capture when wired","required \u2014 fail-closed if not","off \u2014 leave traffic untouched"]}],"connections":["providers","trajectories","evaluation","rollout"],"githubDir":"src/benchflow/usage_tracking.py"},{"id":"trajectories","title":"Trajectories","tagline":"capture, export & visualize agent runs","summary":"Every agent action is captured as a trajectory event and **streamed incrementally** to `acp_trajectory.jsonl`. LLM exchanges and token usage now arrive through the **LiteLLM callback logger** (the in-process `TrajectoryProxy` was removed in #613). The plane also exports trainer-ready `verifiers.jsonl` records (Verifiers/ORS), renders an HTML viewer, runs an OpenTelemetry collector, and counts skill invocations.","responsibilities":["Stream ACP events incrementally to acp_trajectory.jsonl","Assemble the Trajectory from LiteLLM-callback exchanges (and OTel spans)","Export trainer-ready verifiers.jsonl records (the outbound seam)","Render an HTML trajectory viewer; count skill invocations"],"dataflow":"ACP events + LiteLLM exchanges -\u003e acp_trajectory.jsonl + verifiers.jsonl + HTML","modules":[{"path":"src/benchflow/trajectories/_capture.py","role":"Incremental TrajectoryWriter streaming"},{"path":"src/benchflow/trajectories/types.py","role":"Trajectory / LLMExchange + token properties"},{"path":"src/benchflow/trajectories/export.py","role":"verifiers.jsonl trainer records"},{"path":"src/benchflow/trajectories/viewer.py","role":"render_rollout() HTML viewer"},{"path":"src/benchflow/trajectories/otel.py","role":"OpenTelemetry collector"},{"path":"src/benchflow/trajectories/metrics.py","role":"Skill-invocation metrics"}],"symbols":["TrajectoryWriter","OTelCollector","trajectory_to_verifiers_record","acp_events_to_messages","LLMExchange","Trajectory","count_skill_invocations"],"extra":[{"label":"Artifacts","items":["acp_trajectory.jsonl (streaming ACP events)","verifiers.jsonl (scored rollouts for trainer)","OTel spans (GenAI semantic conventions)"]}],"connections":["providers","usage","export","evaluation","rollout"],"githubDir":"src/benchflow/trajectories"},{"id":"traces","title":"Traces","tagline":"Ingest and parse historical agent sessions into tasks","summary":"**Discover and load** historical traces from HuggingFace datasets (opentraces, Claude Code merged, Claude Code requests) and local Claude Code sessions (`~/.claude/projects/`). **Normalize** to `ParsedTrace` intermediate format. **Task generation** extracts instruction, verifiers, and difficulty from trace signals (tool calls, files edited, token count, duration). Generates `task.toml` and `instruction.md` for runnable BenchFlow tasks.","responsibilities":["Download and cache HF datasets; pick split by convention (data/{split}.jsonl or sharded parquet)","Discover local Claude Code JSONL sessions; decode project directory names","Parse three dataset formats (opentraces, Claude Code messages, Claude Code requests) into ParsedTrace","Extract git context, model, tool calls, and timestamps from raw traces","Estimate task difficulty from weighted signals (tool calls, files, tokens, duration)","Generate verifier expectations (file content, git status) and slug task IDs from first user prompt"],"dataflow":"HF datasets or local Claude Code -\u003e parse_claude_code_session() or parse_opentraces_record() -\u003e ParsedTrace -\u003e task_dir with task.toml + instruction.md","modules":[{"path":"src/benchflow/traces/huggingface.py","role":"Download HF datasets; cache under .cache/traces/; pick split files; KNOWN_DATASETS registry"},{"path":"src/benchflow/traces/local.py","role":"Discover and load local Claude Code sessions from ~/.claude/projects/; decode encoded paths"},{"path":"src/benchflow/traces/models.py","role":"ParsedTrace, TraceStep, ToolCall, GitContext dataclasses; properties for duration, tool names, files edited"},{"path":"src/benchflow/traces/parsers.py","role":"parse_claude_code_session() and parse_opentraces_record(); extract content, tool calls, timestamps, git context"},{"path":"src/benchflow/traces/task_gen.py","role":"_estimate_difficulty(); _FileExpectation verifiers; generate task.toml + instruction.md with globified paths"}],"symbols":["ParsedTrace","TraceStep","ToolCall","GitContext","parse_claude_code_session","parse_opentraces_record","_estimate_difficulty","KNOWN_DATASETS"],"extra":[{"label":"Dataset Formats","items":["opentraces (Jayfarei/opentraces-test schema)","Claude Code merged (nlile/misc-merged-claude-code-traces-v1)","Claude Code requests (semianalysisai/cc-traces-weka metadata)"]},{"label":"Difficulty Levels","items":["easy (0-15 score), medium (16-45), hard (46-75), expert (76+)"]}],"connections":["task","task_gen","evaluation","scenes_user"],"githubDir":"src/benchflow/traces"},{"id":"skills","title":"Skills System","tagline":"discovery, injection & the 3 skill modes","summary":"Mounted skills are agent-native **memory**, not prompt text. The policy resolves one of **three canonical skill modes \u2014 `no-skill` / `with-skill` / `self-gen`** (#615) \u2014 plus a skill *source* (none / task-bundled / custom-runtime / self-generated). It discovers `SKILL.md` packs, injects them via the agent's registry `skill_paths`, and strips task-bundled `environment/skills` so a no-skill run can't pick them up through `COPY .`.","responsibilities":["Resolve the skill mode (no-skill / with-skill / self-gen) and its source","Discover & parse SKILL.md packs (agentskills.io frontmatter)","Decide host_dir / sandbox mount and whether to strip bundled skills","Keep no-skill runs clean by stripping environment/skills from build context"],"dataflow":"skill_mode + skills_dir + task bundle -\u003e TaskSkillPolicy (mode, source, mount, strip)","modules":[{"path":"src/benchflow/skill_policy.py","role":"TaskSkillPolicy \u2014 mode/source/mount/strip decision"},{"path":"src/benchflow/skills.py","role":"SKILL.md discovery, parsing, install"}],"symbols":["TaskSkillPolicy","resolve_task_skill_policy","normalize_skill_mode","SKILL_MODES","discover_skills","parse_skill","SkillInfo"],"connections":["rollout","skill_eval","self_gen","learner","sandbox","environment_plane"],"githubDir":"src/benchflow","extra":[{"label":"Skill modes","items":["no-skill \u2014 default, nothing mounted","with-skill \u2014 --skills-dir or task-bundled pack","self-gen \u2014 agent writes its own (BYOS)"]}]},{"id":"skill_eval","title":"Skill Evaluation","tagline":"Run evals.json with/without skill, compare lift","summary":"**Compares agent performance with-skill vs baseline** by parsing `evals.json` (Pydantic-validated), generating ephemeral BenchFlow tasks, running them via the Evaluation orchestrator, and computing per-case and per-agent lift. Exports GEPA-compatible traces (real ACP trajectories + tool calls + prompts) so downstream trainers can evolve skill text. Judge credentials and per-case environment overrides route through safely.","responsibilities":["Load and Pydantic-validate evals.json before artifact generation (guards #424)","Generate ephemeral tasks with injected Dockerfiles and judge templates","Run task batches concurrently via Evaluation orchestrator with retry","Collect rollout results and compute per-agent lift metrics","Export GEPA-compatible traces with execution trajectories and skill text"],"dataflow":"evals.json + skill_dir -\u003e tasks + runs -\u003e CaseResult[] -\u003e SkillEvalResult + GEPA traces","modules":[{"path":"src/benchflow/skill_eval/_core.py","role":"Dataset loading, task generation, SkillEvaluator orchestrator, lift computation"},{"path":"src/benchflow/skill_eval/schema.py","role":"Pydantic models that validate evals.json structure and field types"},{"path":"src/benchflow/skill_eval/gepa_export.py","role":"Export CaseResult to GEPA-shaped JSON: traces/ with ACP events, skill.md, summary"},{"path":"src/benchflow/skill_eval/__init__.py","role":"Public API re-exports"}],"symbols":["EvalDataset","EvalCase","CaseResult","SkillEvalResult","AgentLift","SkillEvaluator","load_eval_dataset","generate_tasks","export_gepa_traces"],"connections":["skills","evaluation","rollout","environment_plane","sandbox"],"githubDir":"src/benchflow/skill_eval"},{"id":"self_gen","title":"Self-Generation (BYOS)","tagline":"the self-gen skill mode (BYOS)","summary":"**Orchestrates single-trial creator-and-solver workflows** where a creator agent authors a `SKILL.md` then a solver agent immediately uses it in the same rollout. Uses two **scenes** (creator + solver) with separate skill directories: creator gets only `skill-creator`, solver gets the `generated_skills_root`. Prepares ephemeral paths and ensures the generated skills directory is writable in the sandbox via pre-agent hooks.","responsibilities":["Resolve skill-creator directory and identify the skill creator by name","Construct creator scene with skill-creator-only skills directory","Construct solver scene that reads from generated_skills_root","Copy skill-creator into artifact-rooted ephemeral directory","Install pre-agent hook to mkdir generated_skills_root with 777 perms"],"dataflow":"RolloutConfig + skill_creator_dir -\u003e two-scene config + pre-agent setup -\u003e Rollout","modules":[{"path":"src/benchflow/self_gen.py","role":"Scene construction, skill-creator discovery, ephemeral artifact layout, sandbox setup"}],"symbols":["run_self_gen","_creator_scene","_solver_scene","_find_skill_creator_dir","_self_gen_artifact_root","_ensure_generated_skills_hook","_single_trial_config"],"connections":["skills","rollout","environment_plane","sandbox"],"githubDir":"src/benchflow"},{"id":"learner","title":"Continual Learning","tagline":"Versioned memory+skills store with rollback","summary":"**Persistent, generation-versioned store** of an agent's evolving memory and skills across sequential-shared Job runs. `LearnerStore` maintains a monotonic generation counter (never reused), supports `commit_or_revert` logic (rejects regressions), and pairs with `materialize_skills` / `capture_skills` / `skill_memory_delta` to feed evolved skills back into rollouts and score Memory-space changes. Survives process death via JSON serialization.","responsibilities":["Initialize empty generation 0, manage monotonic generation numbers","Provide commit/revert lifecycle with deep-copy isolation","Compute learning curve and detect regressions by metric tolerance","Serialize and deserialize full history for Job resumption","Materialize skills from state into directory trees for rollout injection"],"dataflow":"LearnerState + metric -\u003e commit_or_revert -\u003e evolved skills + Memory-space score","modules":[{"path":"src/benchf
