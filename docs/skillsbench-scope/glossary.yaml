# SkillsBench-scope glossary — a FIXED controlled vocabulary that enriches the
# Harbor task-config surface so SkillsBench tasks round-trip without free-form drift.
#
# Three tiers:
#   1. controlled_*  — closed enums (lint-enforced). Mirror SkillsBench taxonomy.yaml.
#   2. network_class — the enrichment this branch adds (see network-modes below).
#   3. open tags + skills — uncontrolled domain keywords + SKILL.md triggers (advisory).
#
# Harbor mapping: SkillsBench metadata lives in Harbor's free-form [metadata]; this
# glossary promotes the load-bearing fields to a validated vocabulary while keeping
# them inside `metadata:` (no new root keys — see docs/task-standard.md root-key rule).

schema:
  version: "0.1-skillsbench"
  enriches: harbor.TaskConfig            # schema_version "1.3" surface
  scope: skillsbench                     # this glossary is intentionally SkillsBench-only
  lint: tasks/*/task.toml [metadata] must use controlled_* values; tags/skills are open

# ── Tier 1: controlled vocabulary (closed sets) — from SkillsBench taxonomy.yaml ──
controlled_categories:
  - software-engineering
  - cybersecurity
  - natural-science
  - finance-economics
  - office-white-collar
  - media-content-production
  - industrial-physical-systems
  - mathematics-or-formal-reasoning

controlled_task_types:
  - analysis
  - calculation
  - classification
  - detection
  - debugging
  - implementation
  - optimization
  - repair
  - transformation
  - extraction
  - generation
  - simulation
  - planning
  - verification
  - search
  - ranking
  - formatting

controlled_modalities:
  - source-code
  - binary
  - csv
  - spreadsheet
  - pdf
  - document
  - presentation
  - image
  - video
  - audio
  - network-logs
  - database
  - json
  - xml
  - geospatial-data
  - scientific-data
  - 3d-model
  - time-series
  - webpage

controlled_interfaces:
