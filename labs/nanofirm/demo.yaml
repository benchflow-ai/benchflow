# nanofirm — multi-agent legal negotiation demo
#
# Single benchflow job config. At the booth, trigger with:
#
#   cd repos/benchflow
#   benchflow job -f labs/nanofirm/demo.yaml
#
# A full run takes ~30 minutes (tenant agent negotiates with 6 simulated
# personas, judge scores the outcome). The demo flow is: kick this off,
# then walk the audience through jobs/nanofirm/comparison.html while the
# real job runs in the background.

tasks_dir: .
jobs_dir: ../../jobs/nanofirm

# Default agent for this run. The comparison page under jobs/nanofirm/
# shows pre-computed results for all three tenant models below — swap
# `agent` / `model` to rerun any of them live.
agent: gemini
model: gemini-3.1-pro-preview

# Other tenant models in the comparison (uncomment to rerun):
# agent: claude-agent-acp
# model: claude-opus-4-6
#
# agent: codex-acp
# model: gpt-5.4

environment: docker
concurrency: 1
max_retries: 0

# Sim-wide routing. These control which model backs each persona inside
# the FastMCP sidecar. The tenant agent above does NOT see these — the
# personas_server.py dispatches to them based on persona.side.
agent_env:
  TENANT_FIRM_MODEL: claude-opus-4-6   # partner, paralegal, receptionist
  ADVERSARY_MODEL: claude-opus-4-6     # apt legal, regional mgr, asst PM
  JUDGE_MODEL: claude-opus-4-6         # LLM-as-judge inside the verifier
  ADVERSARY_PROFILE: reasonable        # gentle | reasonable | crazy
