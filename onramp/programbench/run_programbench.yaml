# BenchFlow Job config for the full converted ProgramBench dataset.
#
# Usage:
#   # 1. Materialize the converted task directories under .ref/ (the standard
#   #    cache location for benchmark task repos — see benchmarks/run_skillsbench.py).
#   uv run python -m onramp.programbench.main --output-dir .ref/programbench-bf
#
#   # 2. Run the job.
#   uv run python -m benchflow.job onramp/programbench/run_programbench.yaml
#
# Override `agent` and `model` per run. The default is gemini-3.1-flash-lite-preview
# because it has the largest context window we can afford and is the model the
# parity check uses.

tasks_dir: .ref/programbench-bf
jobs_dir: ../jobs/programbench
agent: gemini
model: gemini-3.1-flash-lite-preview
environment: docker
concurrency: 4
max_retries: 0
