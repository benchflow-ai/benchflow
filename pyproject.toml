[project]
name = "benchflow"
version = "0.2.0"
description = "Multi-turn agent benchmarking with ACP — run any agent, any model, any provider."
readme = "README.md"
requires-python = ">=3.12"
keywords = ["benchmark", "llm-agents", "acp", "agent-evaluation", "multi-turn", "terminal-bench", "skillsbench"]
dependencies = [
    "harbor==0.3.0",
    "httpx>=0.27.0",
    "anyio>=4.0",
    "pydantic>=2.0",
    "pyyaml>=6.0",
    "rich>=13.0",
    "typer>=0.9",
]
authors = [
    { name = "Xiangyi Li", email = "xiangyi@benchflow.ai" },
    { name = "Kyoung Whan Choe", email = "choe.kyoung@gmail.com" },
]

maintainers = [
    { name = "Xiangyi Li", email = "xiangyi@benchflow.ai" },
    { name = "Kyoung Whan Choe", email = "choe.kyoung@gmail.com" },
]

license = { text = "Apache-2.0" }

classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24.0",
    "ruff>=0.7.0",
]

[project.scripts]
benchflow = "benchflow.cli.main:app"

[project.urls]
Homepage = "https://github.com/benchflow-ai/benchflow"
Repository = "https://github.com/benchflow-ai/benchflow"
Issues = "https://github.com/benchflow-ai/benchflow/issues"
Discord = "https://discord.gg/mZ9Rc8q8W3"
Changelog = "https://github.com/benchflow-ai/benchflow/blob/main/CHANGELOG.md"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.ruff]
target-version = "py312"
