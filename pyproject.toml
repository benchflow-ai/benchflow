[project]
name = "benchflow"
version = "2.0.0"
description = "ACP-native agent benchmarking framework. Superset of Harbor."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "harbor @ git+https://github.com/benchflow-ai/harbor.git@6c2c2938512fbb8165a597349759b2e4c50ec13e",
    "httpx>=0.27.0",
    "anyio>=4.0",
]
authors = [
    { name = "Hongji Xu", email = "kirk@benchflow.ai" },
    { name = "Xiangyi Li", email = "xiangyi@benchflow.ai" },
]

maintainers = [
    { name = "Hongji Xu", email = "kirk@benchflow.ai" },
    { name = "Xiangyi Li", email = "xiangyi@benchflow.ai" },
]

license = { text = "Apache-2.0" }

classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24.0",
    "ruff>=0.7.0",
]

[project.scripts]
benchflow = "benchflow.cli.main:app"

[project.urls]
Homepage = "https://github.com/benchflow-ai/benchflow"
"Bug Tracker" = "https://github.com/benchflow-ai/benchflow/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.hatch.metadata]
allow-direct-references = true

[tool.ruff]
target-version = "py312"
