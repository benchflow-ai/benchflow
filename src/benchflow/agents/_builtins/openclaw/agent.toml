schema_version = 1

[agent]
name = "openclaw"
description = "OpenClaw agent via ACP shim — model set at runtime via --model"
protocol = "acp"

[install]
cmd = "set -o pipefail; export DEBIAN_FRONTEND=noninteractive; NODE_OK=0; if command -v node >/dev/null 2>&1; then   NODE_VER=$(node -e 'console.log(process.versions.node.split(\".\")[0])' 2>/dev/null || echo 0);   [ \"$NODE_VER\" -ge 22 ] 2>/dev/null && NODE_OK=1; fi; if [ \"$NODE_OK\" = 0 ]; then   apt-get update -qq &&   apt-get install -y -qq curl ca-certificates &&   curl -fsSL https://deb.nodesource.com/setup_22.x | bash - &&   apt-get install -y -qq nodejs; fi >/dev/null 2>&1 && ( command -v openclaw >/dev/null 2>&1 || npm install -g openclaw@latest >/dev/null 2>&1 ) && command -v openclaw >/dev/null 2>&1 && mkdir -p ~/.openclaw && echo '{\"version\":1,\"defaults\":{\"allow_all\":true}}' > ~/.openclaw/exec-approvals.json && ( command -v python3 >/dev/null 2>&1 || (apt-get update -qq && apt-get install -y -qq python3 >/dev/null 2>&1) ) && echo  | base64 -d > /usr/local/bin/openclaw-acp-shim && chmod +x /usr/local/bin/openclaw-acp-shim"

[launch]
cmd = "python3 /usr/local/bin/openclaw-acp-shim"

[env]
home_dirs = [".openclaw"]

[skills]
mount_paths = ["$HOME/.claude/skills", "$WORKSPACE/skills"]

[reporting]
otel_enable_env = "OPENCLAW_OTEL_ENABLE"
