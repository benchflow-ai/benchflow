schema_version = 1

[agent]
name = "pi-acp"
description = "Pi agent via ACP"
protocol = "acp"

[install]
cmd = "set -o pipefail; export DEBIAN_FRONTEND=noninteractive; NODE_OK=0; if command -v node >/dev/null 2>&1; then   NODE_VER=$(node -e 'console.log(process.versions.node.split(\".\")[0])' 2>/dev/null || echo 0);   [ \"$NODE_VER\" -ge 22 ] 2>/dev/null && NODE_OK=1; fi; if [ \"$NODE_OK\" = 0 ]; then   apt-get update -qq &&   apt-get install -y -qq curl ca-certificates &&   curl -fsSL https://deb.nodesource.com/setup_22.x | bash - &&   apt-get install -y -qq nodejs; fi >/dev/null 2>&1 && ( command -v pi >/dev/null 2>&1 || npm install -g @mariozechner/pi-coding-agent@latest >/dev/null 2>&1 ) && ( command -v pi-acp >/dev/null 2>&1 || npm install -g pi-acp@latest >/dev/null 2>&1 ) && command -v pi-acp >/dev/null 2>&1 && ( command -v python3 >/dev/null 2>&1 || (apt-get update -qq && apt-get install -y -qq python3 >/dev/null 2>&1) ) && echo  | base64 -d > /usr/local/bin/pi-acp-launcher && chmod +x /usr/local/bin/pi-acp-launcher"

[launch]
cmd = "python3 /usr/local/bin/pi-acp-launcher"

[skills]
mount_paths = ["$HOME/.pi/agent/skills", "$HOME/.agents/skills"]
