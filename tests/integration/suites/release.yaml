# BenchFlow release-ready validation suite.
#
# This file is the declarative source of truth for release validation.
# Shell/Python runners should execute lanes from this manifest instead of
# hardcoding an agent x model x sandbox x task matrix.

suite: release
version: 1
description: Release-ready blockers for BenchFlow current release gates and backlog lanes.

policy:
  on_failure: block_release
  matrix_strategy: named_lanes
  avoid_full_cartesian_product: true

run_tracking:
  future_system: Linear
  current_mode: manual_artifacts_until_linear
  evidence_required:
    - linear_issue
    - suite_version
    - execution_profile
    - lane_id
    - agent
    - model
    - sandbox
    - task_or_adapter
    - job_path
    - result_status

execution_profiles:
  near-term:
    purpose: Keep release prep moving before every first-party sandbox lane is automated.
    tracker: manual_until_linear
    benchmark_suites:
      - SkillsBench
    preferred_sandboxes:
      - daytona
    lanes:
      - skillsbench-agent-matrix
      - adapter-release-set
    notes:
      - Use SkillsBench as the near-term benchmark-suite focus.
      - Use Daytona as the cloud sandbox for near-term release-prep runs.
      - Adapter coverage is capped at one representative smoke or parity task per adapter.
  release-gated-cli:
    purpose: Validate the release-gated CLI surface against the current sandbox backends.
    tracker: Linear
    benchmark_suites:
      - SkillsBench
    preferred_sandboxes:
      - docker
      - daytona
    lanes:
      - shared-sandbox-smoke
      - skillsbench-agent-matrix
      - adapter-release-set
      - decoupling-checks
    notes:
      - Firecracker and Kubernetes are future hard-isolation targets, not current CLI-supported sandboxes.
      - Modal is not part of the current release gate; keep any Modal smoke as optional follow-up evidence.
      - Use this profile when checking the release-gated CLI surface; use full-release for every current release blocker.
  full-release:
    purpose: Validate every current release blocker before a trial-ready release cut.
    tracker: Linear
    lanes:
      - shared-sandbox-smoke
      - skillsbench-agent-matrix
      - skillsbench-harbor-parity
      - adapter-release-set
      - hosted-env-compatibility-board
      - trace-to-task-e2e
      - decoupling-checks
  hosted-envs:
    purpose: Track hub-hosted environment compatibility and exact env UID selections.
    tracker: Linear
    lanes:
      - hosted-env-compatibility-board
  backlog:
    purpose: Track concrete validation lanes that are not part of the current release gate.
    tracker: Linear
    lanes:
      - security-dind-smoke
    notes:
      - Promote this lane when Firecracker/K8s are included as first-party CLI-supported sandboxes.

axes:
  agents:
    credentialed:
      - claude-agent-acp
      - codex-acp
      - gemini
      - harvey-lab-harness
      - openclaw
      - opencode
      - openhands
      - pi-acp
    cheap_representative:
      - gemini
  models:
    default:
      gemini: gemini-3.1-flash-lite-preview
      claude-agent-acp: claude-haiku-4-5-20251001
      codex-acp: gpt-5.4-nano
  sandboxes:
    release_gated:
      - docker
      - daytona
    optional_cloud:
      - modal
    future_hard_isolation:
      - firecracker
      - k8s
    aliases:
      kubernetes: k8s
    dind_required:
      - firecracker
      - k8s
  task_sets:
    skillsbench_release_subset:
      source:
        repo: benchflow-ai/skillsbench
        path: tasks
        ref: main
      include:
        - jax-computing-basics
        - python-scala-translation
        - jpg-ocr-stat
        - grid-dispatch-operator
        - threejs-to-obj
        - data-to-d3
        - lake-warming-attribution
        - weighted-gdp-calc
        - shock-analysis-supply
    shared_sandbox_smoke:
      source:
        kind: local_task
        path: tests/examples/hello-world-task
      scope: current release-gated sandbox smoke
    security_dind_smoke:
      source:
        kind: hosted_env
        platform: harbor
        hub_url: https://hub.harborframework.com/
        env_uid: harbor:termigen-environments/docker_escape_privileged_container_medium@dc329464161db64b0c670f46fa39b62e4719dddd
        registry: https://raw.githubusercontent.com/harbor-framework/harbor/main/registry.json
        dataset: termigen-environments
        task: docker_escape_privileged_container_medium
        source_repo: ucsb-mlsec/terminal-bench-env
        source_ref: dc329464161db64b0c670f46fa39b62e4719dddd
        source_path: environments_harbor/docker_escape_privileged_container_medium
      scope: future Firecracker/K8s nested-container security smoke
      requires:
        - docker-in-docker
        - privileged-container-behavior
    generated_trace_tasks:
      kind: generated_trace_tasks
      sources:
        - tests/examples/traces/minimal-claude.jsonl
        - tests/examples/traces/minimal-opentraces.jsonl
      evidence_dir: dogfood/2026-05-19-trace-to-task-e2e
      evidence_command: uv run python tests/integration/run_suite.py --lane trace-to-task-e2e --execute-trace-evidence --run-trace-eval
  benchmarks:
    merged:
      - name: Harvey LAB
        uid: benchflow-ai/benchmarks:datasets/harvey-lab/tasks@main
        source:
          repo: benchflow-ai/benchmarks
          path: datasets/harvey-lab/tasks
          ref: main
        adapter_path: benchmarks/harvey-lab
        upstream:
          repo: harveyai/harvey-labs
          path: tasks
      - name: ProgramBench
        uid: benchflow-ai/benchmarks:datasets/programbench/tasks@main
        source:
          repo: benchflow-ai/benchmarks
          path: datasets/programbench/tasks
          ref: main
        adapter_path: benchmarks/programbench
        upstream:
          repo: facebookresearch/programbench
          path: src/programbench/data/tasks
      - name: SkillsBench
        uid: benchflow-ai/skillsbench:tasks@main
        source:
          repo: benchflow-ai/skillsbench
          path: tasks
          ref: main
    open_prs:
      - name: HILBench
        uid: benchflow-ai/benchmarks:datasets/hilbench/tasks@main
        source:
          repo: benchflow-ai/benchmarks
          path: datasets/hilbench/tasks
          ref: main
        status: pending_pr
        adapter_path: benchmarks/hilbench
        upstream:
          kind: huggingface_dataset
          repo: ScaleAI/hil-bench
          artifacts:
            kind: huggingface_bucket
            repo: ScaleAI/hil-bench-swe-images
            url: https://huggingface.co/buckets/ScaleAI/hil-bench-swe-images
            uri_scheme: hf://buckets/ScaleAI/hil-bench-swe-images/
            resolve_base: https://huggingface.co/buckets/ScaleAI/hil-bench-swe-images/resolve/
        pr: 279
        url: https://github.com/benchflow-ai/benchflow/pull/279
      - name: OpaqueToolsBench
        uid: benchflow-ai/benchmarks:datasets/opaquetoolsbench/tasks@main
        source:
          repo: benchflow-ai/benchmarks
          path: datasets/opaquetoolsbench/tasks
          ref: main
        status: pending_pr
        adapter_path: benchmarks/opaquetoolsbench
        upstream:
          repo: shallinan1/OpaqueToolsBench
        pr: 280
        url: https://github.com/benchflow-ai/benchflow/pull/280
      - name: ContinualLearningBench
        uid: benchflow-ai/benchmarks:datasets/continuallearningbench/tasks@main
        source:
          repo: benchflow-ai/benchmarks
          path: datasets/continuallearningbench/tasks
          ref: main
        status: pending_pr
        adapter_path: benchmarks/continuallearningbench
        upstream:
          repo: pgasawa/continual-learning-bench
        pr: 283
        url: https://github.com/benchflow-ai/benchflow/pull/283
  hosted_env_hubs:
    current:
      - name: OpenReward environments
        platform: openreward
        hub_url: https://openreward.ai/environments
        env_uid_pattern: openreward:<owner>/<name>@<environment-id>
        source:
          kind: hosted_env_hub
          platform: openreward
        auth:
          hub_browse: public
          cli_inventory: account_required
          hosted_eval: account_required_with_credits
        inventory_command: orwd list -o json --limit 200
        selected_envs:
          - env_uid: openreward:GeneralReasoning/KellyBench@be14865a-3c70-422e-a2ba-f45c132cd29a
            environment: GeneralReasoning/KellyBench
            environment_id: be14865a-3c70-422e-a2ba-f45c132cd29a
            role: long_horizon_tool_sandbox
            split_types:
              - train
              - test
            total_task_count: 6
            updated_at: "2026-04-05T06:33:33.380Z"
            inspect_command: orwd get GeneralReasoning/KellyBench -o json
            session_check:
              status: pass_then_blocked
              note: Initial SDK inspection listed train/test splits, 4 train tasks, 2 test tasks, and bash/edit/search/betting tools; later session creation hit insufficient OpenReward credits.
            selection_reason: Public OpenReward environment with long-horizon multi-turn execution, sandbox tools, deterministic betting rewards, and no external API keys beyond OpenReward.
          - env_uid: openreward:GeneralReasoning/CTF@fcfcd0ef-1298-40e9-9492-83628fd98a1c
            environment: GeneralReasoning/CTF
            environment_id: fcfcd0ef-1298-40e9-9492-83628fd98a1c
            role: security_sandbox
            split_types:
              - train
              - test
            total_task_count: 172
            updated_at: "2026-03-19T10:52:05.131Z"
            inspect_command: orwd get GeneralReasoning/CTF -o json
            session_check:
              status: blocked_insufficient_openreward_credits
              note: Catalog and README metadata are available, but SDK split/task inspection required a session and returned insufficient credits with the current key.
            selection_reason: Public OpenReward security environment with sandboxed CTF challenges, verifiable flag rewards, and no external API key requirement beyond OpenReward credits.
      - name: Harbor Hub
        platform: harbor
        hub_url: https://hub.harborframework.com/
        env_uid_pattern: harbor:<dataset>/<env-or-task-slug>@<version-or-ref>
        source:
          kind: harbor_registry
          registry: https://raw.githubusercontent.com/harbor-framework/harbor/main/registry.json
        inventory_command: bench compat harbor-registry --limit 1 --level inventory
        selected_envs:
          - env_uid: harbor:terminal-bench/adaptive-rejection-sampler@69671fbaac6d67a7ef0dfec016cc38a64ef7a77c
            dataset: terminal-bench
            version: "2.0"
            task: adaptive-rejection-sampler
            role: terminal_style_packaging
            source_repo: laude-institute/terminal-bench-2
            source_ref: 69671fbaac6d67a7ef0dfec016cc38a64ef7a77c
            source_path: adaptive-rejection-sampler
            selection_reason: Harbor Hub-visible Terminal-Bench 2 task for shell/task packaging compatibility.
          - env_uid: harbor:binary-audit/caddy-backdoor-detect@75f3e6e331776b80f77faa3d2ff80627b8b5d069
            dataset: binary-audit
            version: "1.0"
            task: caddy-backdoor-detect
            role: security_style_nested_workload
            source_repo: QuesmaOrg/BinaryAudit
            source_ref: 75f3e6e331776b80f77faa3d2ff80627b8b5d069
            source_path: tasks/caddy-backdoor-detect
            selection_reason: Security-flavored Harbor task for future hard-isolation and DinD adaptation checks.
      - name: PrimeIntellect Environments Hub
        platform: primeintellect
        hub_url: https://app.primeintellect.ai/dashboard/environments?ex_sort=by_sections
        env_uid_pattern: primeintellect:<owner>/<name>@<version>
        source:
          kind: hosted_env_hub
          platform: primeintellect
        auth:
          hub_browse: public
          cli_inventory: account_required
          hosted_eval: account_required
        inventory_command: prime --plain env list --output json --sort stars --order desc --num 20
        selected_envs:
          - env_uid: primeintellect:primeintellect/reverse-text@0.1.4
            environment: primeintellect/reverse-text
            version: 0.1.4
            role: lightweight_no_secret
            inspect_command: prime --plain env inspect primeintellect/reverse-text@0.1.4 README.md
            selection_reason: Single-turn text transformation with LCS reward and no external tool or web-secret dependency.
          - env_uid: primeintellect:primeintellect/math-python@0.1.10
            environment: primeintellect/math-python
            version: 0.1.10
            role: representative_tool_sandbox
            inspect_command: prime --plain env inspect primeintellect/math-python@0.1.10 README.md
            selection_reason: Tool-using math environment that exercises Python tool calls through Prime sandboxes.

lanes:
  - id: shared-sandbox-smoke
    release_blocker: true
    purpose: Prove the same basic task contract works across every current release-gated sandbox.
    matrix:
      agents: cheap_representative
      models: default
      sandboxes: release_gated
      task_sets:
        - shared_sandbox_smoke
    acceptance:
      - bench eval run succeeds on Docker and Daytona without special user intervention beyond each backend's documented auth.
      - result.json, trajectory output, and summary schema are valid.

  - id: security-dind-smoke
    release_blocker: false
    status: backlog
    purpose: Prove nested-container workloads work for security benchmark adaptation.
    backlog_reason: Firecracker/K8s are not included in the current release gate.
    blocked_by:
      - Firecracker/K8s sandbox backends are not exposed by the current CLI.
      - Run evidence is blocked until those backends have runnable support.
    activation_criteria:
      - bench eval run --sandbox firecracker runs the task without questions.
      - bench eval run --sandbox k8s runs the task without questions.
      - Docker-in-Docker-style service/container operations work inside both sandboxes.
    matrix:
      agents: cheap_representative
      models: default
      sandboxes: dind_required
      task_sets:
        - security_dind_smoke
    acceptance:
      - Firecracker and K8s run the task through --sandbox without questions.
      - Docker-in-Docker-style service/container operations work inside the sandbox.
      - Verifier executes after sandbox hardening.

  - id: skillsbench-agent-matrix
    release_blocker: true
    purpose: Prove real agent execution across the registered-agent surface.
    matrix:
      agents: credentialed
      models: default
      sandboxes:
        - daytona
      task_sets:
        - skillsbench_release_subset
    acceptance:
      - Every credentialed agent produces valid result.json files.
      - "No infrastructure errors: agent install, timeout, pipe closed, or sandbox setup."
      - summary.json contains total, passed, failed, errored, and score.

  - id: skillsbench-harbor-parity
    release_blocker: true
    purpose: Compare BenchFlow SkillsBench outputs against a pinned Harbor trajectory/result baseline.
    evidence_command: uv run python tests/integration/run_suite.py --lane skillsbench-harbor-parity --execute-skillsbench-harbor-parity --skillsbench-harbor-benchflow-root <benchflow-jobs-root> --skillsbench-harbor-baseline-root <local-skillsbench-trajectories-checkout>
    sources:
      - kind: harbor_skillsbench_baseline
        repo: benchflow-ai/skillsbench-trajectories
        path: shenghan/gemini-cli/gemini3flash/noskills
        ref: 2d86fe82f6a06f7c7b3a22a3ae90d554d0e9655c
        schema_notes:
          - Harbor stores rewards under verifier_result.rewards.reward.
          - Harbor stores agent trajectories as ATIF JSON under agent/trajectory.json.
      - kind: benchflow_results
        path: jobs/integration-<run-id>/<agent>
        schema_notes:
          - BenchFlow stores rewards under rewards.reward.
          - BenchFlow stores ACP trajectories as trajectory/acp_trajectory.jsonl.
    matrix:
      task_sets:
        - skillsbench_release_subset
    acceptance:
      - Harbor baseline root is pinned to the recorded skillsbench-trajectories SHA.
      - Expected schema differences are normalized explicitly before comparison.
      - Compared tasks have result.json and trajectory artifacts on both sides.
      - BenchFlow result source provenance points to native SkillsBench task.md tasks in the expected skill lane.
      - Outcome-rate, mean-reward, and per-task reward drift remain within the configured parity thresholds.

  - id: adapter-release-set
    release_blocker: true
    purpose: Prove every merged adapter and open adapter PR preserves source-suite semantics.
    matrix:
      benchmarks:
        - merged
        - open_prs
    task_budget:
      per_adapter: 1
      mode: representative_smoke_or_parity
      escalation: Run more adapter tasks only when the smoke/parity result is ambiguous or fails in a way that needs narrowing.
    acceptance:
      - Each adapter has at least one representative smoke or parity run.
      - Verifier executes and reward schema matches the source benchmark expectation.
      - Open adapter PR failures block release until fixed.

  - id: hosted-env-compatibility-board
    release_blocker: true
    purpose: Track hosted environment hubs by env_uid and hub_url, including exact selected envs when available.
    evidence_dir: dogfood/2026-05-19-release-gate/hosted-envs
    evidence_command: uv run python tests/integration/run_suite.py --lane hosted-env-compatibility-board --execute-hosted-env-evidence
    matrix:
      hosted_env_hubs: current
    acceptance:
      - Each hub entry has a canonical hub_url and env_uid pattern.
      - Exact env_uid selections are recorded before claiming agent-smoke or parity.
      - Harbor inventory can emit env_uid and hub_url evidence through bench compat harbor-registry.

  - id: trace-to-task-e2e
    release_blocker: true
    purpose: Prove trace-generated tasks are runnable, not just emitted.
    sources:
      - kind: jsonl_trace
        path: tests/examples/traces/minimal-claude.jsonl
        format: claude-code
      - kind: opentraces_jsonl
        path: tests/examples/traces/minimal-opentraces.jsonl
        format: opentraces
    matrix:
      agents: cheap_representative
      models: default
      sandboxes:
        - docker
        - daytona
      task_sets:
        - generated_trace_tasks
    acceptance:
      - bench tasks generate emits valid task directories from both source classes.
      - Generated tasks pass bench tasks check.
      - At least one generated task runs through bench eval run and validates verifier outcome.

  - id: decoupling-checks
    release_blocker: true
    purpose: Prove agents and sandboxes are not hard-coupled to core.
    checks:
      - core_import_without_optional_agent_packages
      - core_import_without_optional_sandbox_packages
      - missing_optional_sandbox_dep_has_clear_install_guidance
    matrix:
      agents:
        - gemini
        - codex-acp
      models: default
      sandboxes:
        - docker
        - daytona
      task_sets:
        - shared_sandbox_smoke
    acceptance:
      - Core import and task validation work without optional packages.
      - Representative task runs on at least two agents and two sandboxes.
      - Missing optional sandbox dependencies produce actionable install guidance.

credential_rules:
  GEMINI_API_KEY:
    required_for:
      - gemini
      - harvey-lab-harness
      - openclaw
      - opencode
      - openhands
      - pi-acp
  GOOGLE_API_KEY:
    alternative_for: GEMINI_API_KEY
  DAYTONA_API_KEY:
    required_for:
      - daytona
  CLAUDE_CODE_OAUTH_TOKEN:
    required_for:
      - claude-agent-acp
  ANTHROPIC_API_KEY:
    alternative_for: CLAUDE_CODE_OAUTH_TOKEN
  OPENAI_API_KEY:
    required_for:
      - codex-acp
