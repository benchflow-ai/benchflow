# BenchFlow trial-ready release suite.
#
# This file is the declarative source of truth for release validation.
# Shell/Python runners should execute lanes from this manifest instead of
# hardcoding an agent x model x sandbox x task matrix.

suite: release
version: 1
description: Trial-ready release blockers for BenchFlow 1.0.

policy:
  on_failure: block_release
  matrix_strategy: named_lanes
  avoid_full_cartesian_product: true

run_tracking:
  future_system: Linear
  current_mode: manual_artifacts_until_linear
  evidence_required:
    - linear_issue
    - suite_version
    - execution_profile
    - lane_id
    - agent
    - model
    - sandbox
    - task_or_adapter
    - job_path
    - result_status

execution_profiles:
  near-term:
    purpose: Keep release prep moving before every first-party sandbox lane is automated.
    tracker: manual_until_linear
    benchmark_suites:
      - SkillsBench
    preferred_sandboxes:
      - daytona
    lanes:
      - skillsbench-agent-matrix
      - adapter-release-set
    notes:
      - Use SkillsBench as the near-term benchmark-suite focus.
      - Use Daytona as the cloud sandbox for near-term release-prep runs.
      - Adapter coverage is capped at one representative smoke or parity task per adapter.
  full-release:
    purpose: Validate every release blocker before publishing BenchFlow 1.0.
    tracker: Linear
    lanes: all

axes:
  agents:
    credentialed:
      - claude-agent-acp
      - codex-acp
      - gemini
      - harvey-lab-harness
      - openclaw
      - opencode
      - openhands
      - pi-acp
    cheap_representative:
      - gemini
  models:
    default:
      gemini: gemini-3.1-flash-lite-preview
      claude-agent-acp: claude-haiku-4-5-20251001
      codex-acp: gpt-5.4-nano
  sandboxes:
    first_party:
      - docker
      - daytona
      - modal
      - firecracker
      - k8s
    aliases:
      kubernetes: k8s
    dind_required:
      - firecracker
      - k8s
  task_sets:
    skillsbench_release_subset:
      source:
        repo: benchflow-ai/skillsbench
        path: tasks
        ref: main
      include:
        - jax-computing-basics
        - python-scala-translation
        - jpg-ocr-stat
        - grid-dispatch-operator
        - threejs-to-obj
        - data-to-d3
        - lake-warming-attribution
        - weighted-gdp-calc
        - shock-analysis-supply
    shared_sandbox_smoke:
      todo: Select one boring representative task that runs everywhere.
    terminal_bench_smoke:
      todo: Select one Terminal-Bench-style shell-verifier task.
    security_dind_smoke:
      todo: Select one nested-container security-style task for Firecracker and K8s.
    generated_trace_tasks:
      todo: Generated by the trace-to-task lane.
  adapters:
    merged:
      - Harvey LAB
      - ProgramBench
      - SkillsBench
    open_prs:
      - name: HILBench
        pr: 279
        url: https://github.com/benchflow-ai/benchflow/pull/279
      - name: OpaqueToolsBench
        pr: 280
        url: https://github.com/benchflow-ai/benchflow/pull/280
      - name: CLBench
        pr: 283
        url: https://github.com/benchflow-ai/benchflow/pull/283

lanes:
  - id: shared-sandbox-smoke
    release_blocker: true
    purpose: Prove the same basic task contract works across every first-party sandbox.
    matrix:
      agents: cheap_representative
      models: default
      sandboxes: first_party
      task_sets:
        - shared_sandbox_smoke
    acceptance:
      - bench eval create succeeds without special user intervention.
      - result.json, trajectory output, and summary schema are valid.

  - id: security-dind-smoke
    release_blocker: true
    purpose: Prove nested-container workloads work for security benchmark adaptation.
    matrix:
      agents: cheap_representative
      models: default
      sandboxes: dind_required
      task_sets:
        - security_dind_smoke
    acceptance:
      - Firecracker and K8s run the task through --sandbox without questions.
      - Docker-in-Docker-style service/container operations work inside the sandbox.
      - Verifier executes after sandbox hardening.

  - id: skillsbench-agent-matrix
    release_blocker: true
    purpose: Prove real agent execution across the registered-agent surface.
    matrix:
      agents: credentialed
      models: default
      sandboxes:
        - daytona
      task_sets:
        - skillsbench_release_subset
    acceptance:
      - Every credentialed agent produces valid result.json files.
      - "No infrastructure errors: agent install, timeout, pipe closed, or sandbox setup."
      - summary.json contains total, passed, failed, errored, and score.

  - id: adapter-release-set
    release_blocker: true
    purpose: Prove every merged adapter and open adapter PR preserves source-suite semantics.
    matrix:
      adapters:
        - merged
        - open_prs
    task_budget:
      per_adapter: 1
      mode: representative_smoke_or_parity
      escalation: Run more adapter tasks only when the smoke/parity result is ambiguous or fails in a way that needs narrowing.
    acceptance:
      - Each adapter has at least one representative smoke or parity run.
      - Verifier executes and reward schema matches the source benchmark expectation.
      - Open adapter PR failures block release until fixed.

  - id: terminal-bench-smoke
    release_blocker: true
    purpose: Prove Terminal-Bench-style packaging and shell verifier compatibility.
    matrix:
      agents: cheap_representative
      models: default
      sandboxes:
        - docker
        - daytona
      task_sets:
        - terminal_bench_smoke
    acceptance:
      - bench eval create succeeds on both sandboxes.
      - Shell verifier executes from task tests.
      - Sandbox hardening does not break normal task execution.

  - id: trace-to-task-e2e
    release_blocker: true
    purpose: Prove trace-generated tasks are runnable, not just emitted.
    sources:
      - local_or_jsonl_trace
      - huggingface_or_opentraces
    matrix:
      agents: cheap_representative
      models: default
      sandboxes:
        - docker
        - daytona
      task_sets:
        - generated_trace_tasks
    acceptance:
      - bench tasks generate emits valid task directories from both source classes.
      - Generated tasks pass bench tasks check.
      - At least one generated task runs through bench eval create and validates verifier outcome.

  - id: decoupling-checks
    release_blocker: true
    purpose: Prove agents and sandboxes are not hard-coupled to core.
    checks:
      - core_import_without_optional_agent_packages
      - core_import_without_optional_sandbox_packages
      - missing_optional_sandbox_dep_has_clear_install_guidance
    matrix:
      agents:
        - gemini
        - codex-acp
      models: default
      sandboxes:
        - docker
        - daytona
      task_sets:
        - shared_sandbox_smoke
    acceptance:
      - Core import and task validation work without optional packages.
      - Representative task runs on at least two agents and two sandboxes.
      - Missing optional sandbox dependencies produce actionable install guidance.

credential_rules:
  GEMINI_API_KEY:
    required_for:
      - gemini
      - harvey-lab-harness
      - openclaw
      - opencode
      - openhands
      - pi-acp
  GOOGLE_API_KEY:
    alternative_for: GEMINI_API_KEY
  DAYTONA_API_KEY:
    required_for:
      - daytona
  CLAUDE_CODE_OAUTH_TOKEN:
    required_for:
      - claude-agent-acp
  ANTHROPIC_API_KEY:
    alternative_for: CLAUDE_CODE_OAUTH_TOKEN
  OPENAI_API_KEY:
    required_for:
      - codex-acp
